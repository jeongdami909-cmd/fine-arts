<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Lacey Fine Art | Gallery</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400;700&family=Whisper&display=swap" rel="stylesheet"/>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { galleryGold: '#cfa752', galleryTeal: '#d0e4e0' },
          fontFamily: {
            serif: ['"Noto Serif KR"', 'serif'],
            sans: ['"Gowun Dodum"', 'sans-serif'],
            diary: ['"Whisper"', 'cursive'],
          },
        }
      }
    }
  </script>
  
  <style data-purpose="custom-styles">
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Serif KR', serif;
      -webkit-font-smoothing: antialiased;
      background-color: #d0e4e0; 
      transition: background-image 0.5s ease-in-out;
      overflow-x: hidden;
      min-height: 180vh;
    }

    #gallery-section { scroll-margin-top: 120px; }

    /* 🌟 스크롤바 디자인 */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(207, 167, 82, 0.3); border-radius: 10px; }

    /* 🌟 글 접기/펴기 */
    .collapsed-text {
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; transition: all 0.3s ease;
    }
    
    .intro-handwriting { font-family: 'Whisper', cursive; color: #FF6347; font-size: 1.5rem; }
    .intro-desc { color: rgba(255, 255, 255, 0.9); text-shadow: 0 1px 2px rgba(0,0,0,0.1); }

    .glass-panel {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    
    .glass-panel-light {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(15px);
    }

    /* 🌟 아름답고 미니멀한 버튼 */
    .mini-icon-btn {
      font-size: 10px; padding: 4px; border-radius: 50%;
      background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(255, 255, 255, 0.8);
      color: #1a4142; cursor: pointer; transition: all 0.2s;
      display: flex; items-center; justify-content: center;
      width: 22px; height: 22px;
    }
    .mini-icon-btn:active { transform: scale(0.9); background: white; }

    .fixed-menu-btn {
      font-size: 9px; font-weight: 800; letter-spacing: 0.1em;
      padding: 4px 10px; border-radius: 5px;
      background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(0,0,0,0.1);
      transition: all 0.3s; cursor: pointer;
    }
    .fixed-menu-btn:hover { background: white; border-color: #cfa752; }

    .slide-panel { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .slide-hide { transform: translateX(calc(100% - 2.8rem)); }
    .arrow-icon { transition: transform 0.6s ease; opacity: 0.5; }

    .draggable { cursor: grab; }
    .draggable:active { cursor: grabbing; }
    .diary-modal-bg { background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px); }
  </style>
</head>
<body class="text-[#1a4142]">

  <input type="file" id="hidden-file-input" style="display: none;" accept="image/*">

  <div class="fixed inset-0 z-[-1] pointer-events-none">
    <img id="global-bg" src="" alt="" class="w-full h-full object-cover opacity-100 transition-opacity duration-1000" style="display:none;" />
  </div>

  <div class="fixed top-24 right-4 z-[10001] flex flex-col items-end space-y-2">
    <div class="bg-white/30 backdrop-blur-md p-2 rounded-xl border border-white/40 flex flex-col items-end space-y-1 shadow-sm">
        <div class="flex items-center space-x-2 mb-1">
            <span class="text-[8px] font-bold opacity-40">TTS SPEED</span>
            <input type="range" id="tts-rate" min="0.5" max="2.0" step="0.1" value="1.0" class="w-12 h-1 accent-galleryGold">
        </div>
        <button class="fixed-menu-btn" onclick="event.stopPropagation(); addNewBoard()">+ TAB</button>
        <button class="fixed-menu-btn" onclick="event.stopPropagation(); triggerFileUpload('global-bg')">SET BG</button>
        <button class="fixed-menu-btn" onclick="event.stopPropagation(); removeBackground()">DEL BG</button>
        <button class="fixed-menu-btn !bg-galleryGold !text-white !border-0 shadow-lg mt-2 px-4 py-2" onclick="event.stopPropagation(); saveToBrowser()">FIX SITE</button>
    </div>
  </div>

  <header class="fixed top-0 left-0 w-full z-40 py-6 px-10 flex justify-between items-center bg-white/5 backdrop-blur-sm border-b border-white/10">
    <div class="flex items-center space-x-3 group">
      <h1 class="text-[11px] tracking-[0.5em] font-bold text-[#1a4142] opacity-80 text-target" id="header-title">LACEY FINE ART</h1>
      <button class="mini-icon-btn !opacity-30 group-hover:!opacity-100" onclick="event.stopPropagation(); openTextEditor(document.getElementById('header-title'))">✎</button>
    </div>
    
    <div class="relative">
      <button id="menu-toggle" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-white/30 transition-all">
        <div class="w-6 h-[1px] bg-[#1a4142] opacity-60"></div>
      </button>

      <div id="dropdown-menu" class="hidden absolute right-0 mt-3 w-60 bg-white/95 backdrop-blur-3xl border border-white/40 shadow-2xl rounded-2xl flex flex-col z-50 overflow-hidden">
        <div class="p-4 space-y-6">
          <div class="flex flex-col space-y-3">
             <div class="flex justify-between items-center group/nav">
                <a href="#gallery-section" class="text-[12px] font-bold text-target opacity-90 flex-grow" onclick="closeMenu()">🌍 COUNTRY</a>
                <button class="mini-icon-btn !w-4 !h-4 !text-[8px] opacity-0 group-hover/nav:opacity-100" onclick="event.stopPropagation(); openTextEditor(this.previousElementSibling)">✎</button>
             </div>
             <div class="pl-4 space-y-2 border-l border-gray-100">
                <div class="flex justify-between items-center group/nav">
                   <a href="#gallery-section" class="text-[11px] text-target opacity-60 flex-grow" onclick="closeMenu()">- [COUNTRY NAME]</a>
                   <button class="mini-icon-btn !w-4 !h-4 !text-[8px] opacity-0 group-hover/nav:opacity-100" onclick="event.stopPropagation(); openTextEditor(this.previousElementSibling)">✎</button>
                </div>
             </div>
          </div>
          <div class="flex flex-col space-y-3 border-t border-gray-100 pt-4">
             <div class="flex justify-between items-center group/nav">
                <a href="#gallery-section" class="text-[12px] font-bold text-target opacity-90 flex-grow" onclick="closeMenu()">⏳ ERA</a>
                <button class="mini-icon-btn !w-4 !h-4 !text-[8px] opacity-0 group-hover/nav:opacity-100" onclick="event.stopPropagation(); openTextEditor(this.previousElementSibling)">✎</button>
             </div>
             <div class="pl-4 space-y-2 border-l border-gray-100">
                <div class="flex justify-between items-center group/nav">
                   <a href="#gallery-section" class="text-[11px] text-target opacity-60 flex-grow" onclick="closeMenu()">- [ERA NAME]</a>
                   <button class="mini-icon-btn !w-4 !h-4 !text-[8px] opacity-0 group-hover/nav:opacity-100" onclick="event.stopPropagation(); openTextEditor(this.previousElementSibling)">✎</button>
                </div>
             </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="h-[55vh] pointer-events-none"></div>

  <main class="px-6 md:px-12 max-w-7xl mx-auto" id="main-content">
    
    <section class="mb-24">
      <div class="glass-panel rounded-[2.5rem] p-10 relative flex flex-col items-center text-center draggable mx-auto max-w-md shadow-2xl group" id="draggable-desc">
        
        <div class="absolute top-6 right-8 flex space-x-2">
          <button class="mini-icon-btn" title="읽기" onclick="event.stopPropagation(); playTTS(this.closest('#draggable-desc'))">🔊</button>
          <button class="mini-icon-btn" title="스타일" onclick="event.stopPropagation(); openStyleEditor(this.closest('#draggable-desc'))">🎨</button>
          <button class="mini-icon-btn !text-galleryGold" title="수정" onclick="event.stopPropagation(); openTextEditor(this.closest('#draggable-desc'))">✎</button>
        </div>
        
        <p class="intro-handwriting text-target mb-1">[Label]</p>
        <h2 class="text-2xl font-serif text-target mb-6 opacity-90">[Title]</h2>
        <div class="w-10 h-[1px] bg-galleryGold mb-6 opacity-40"></div>
        <div class="w-full">
            <p class="text-[13px] leading-relaxed text-target intro-desc collapsed-text">[Description]</p>
            <button class="text-[10px] opacity-50 mt-4 underline tracking-tighter" onclick="event.stopPropagation(); toggleExpand(this)">READ MORE</button>
        </div>
      </div>
    </section>

    <section class="pb-40" id="gallery-section">
      <div class="text-center mb-16">
        <h3 class="text-[10px] tracking-[0.8em] font-bold opacity-30 text-target uppercase">Exhibition</h3>
      </div>

      <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
        <div class="relative w-full h-[450px] overflow-hidden rounded-3xl shadow-xl bg-transparent gallery-item group/item">
          <img id="art-img-base" src="" alt="" class="absolute inset-0 w-full h-full object-contain bg-transparent">
          
          <div class="absolute top-4 left-6 z-20 flex flex-col space-y-2 opacity-0 group-hover/item:opacity-100">
             <button class="mini-icon-btn" onclick="event.stopPropagation(); triggerFileUpload('art-img-base')">🖼</button>
             <button class="mini-icon-btn !text-red-400" onclick="event.stopPropagation(); deleteElement(this.closest('.gallery-item'))">✕</button>
          </div>

          <div class="slide-panel absolute inset-0 w-full h-full flex z-10 slide-hide">
             <div class="w-11 h-full flex flex-col justify-center items-center cursor-pointer bg-white/10 border-r border-white/10 backdrop-blur-md" onclick="toggleSlide(this)">
                <svg class="w-4 h-4 text-[#1a4142] arrow-icon rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
             </div>
             <div class="flex-1 h-full px-8 py-12 flex flex-col relative glass-panel-light overflow-hidden">
                <div class="absolute top-6 right-6 flex space-x-1.5">
                  <button class="mini-icon-btn" onclick="event.stopPropagation(); playTTS(this.closest('.flex-1'))">🔊</button>
                  <button class="mini-icon-btn" onclick="event.stopPropagation(); openStyleEditor(this.closest('.flex-1'))">🎨</button>
                  <button class="mini-icon-btn" onclick="event.stopPropagation(); openTextEditor(this.closest('.flex-1'))">✎</button>
                </div>
                <h4 class="text-xl font-serif mb-6 mt-4 text-[#1a4142] text-target">[Art Title]</h4>
                <div class="flex-1 overflow-y-auto pr-2 custom-scroll">
                  <p class="text-[13px] leading-relaxed text-target opacity-80 collapsed-text">[Description]</p>
                  <button class="text-[10px] opacity-40 mt-4 underline" onclick="event.stopPropagation(); toggleExpand(this)">MORE</button>
                </div>
             </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="text-editor-modal" class="fixed inset-0 z-[10005] hidden items-center justify-center diary-modal-bg">
    <div class="bg-white/95 backdrop-blur-2xl w-[90%] max-w-sm p-8 rounded-[2rem] shadow-2xl border border-white/20">
      <h3 class="text-[10px] font-bold mb-6 tracking-widest text-gray-400">EDIT TEXT</h3>
      <textarea id="modal-textarea" class="w-full h-48 p-4 border-0 rounded-2xl font-serif text-sm text-gray-700 bg-gray-50 focus:ring-1 focus:ring-galleryGold outline-none"></textarea>
      <div class="flex justify-end space-x-2 mt-8">
        <button class="fixed-menu-btn" onclick="closeTextEditor()">CLOSE</button>
        <button class="fixed-menu-btn !bg-galleryGold !text-white" onclick="saveTextChanges()">SAVE</button>
      </div>
    </div>
  </div>

  <div id="style-editor-modal" class="fixed inset-0 z-[10005] hidden items-end md:items-center justify-center diary-modal-bg">
    <div id="style-bottom-sheet" class="bottom-sheet bg-white/95 backdrop-blur-2xl w-full md:w-80 p-10 rounded-t-[3rem] md:rounded-[2.5rem] shadow-2xl">
      <div class="flex justify-between items-center mb-8 px-2">
        <h3 class="text-[10px] font-bold tracking-[0.3em] text-gray-400 uppercase">Typography</h3>
        <button class="text-gray-300 text-2xl" onclick="closeStyleEditor()">×</button>
      </div>
      <div class="space-y-8 px-2">
        <div class="flex justify-between items-center"><label class="text-[11px] font-bold opacity-50">COLOR</label><input type="color" id="val-color" class="w-8 h-8 rounded-full border-0 p-0 bg-transparent cursor-pointer"></div>
        <div><label class="text-[11px] font-bold opacity-50 block mb-2">FONT FAMILY</label><select id="val-font" class="w-full border-0 bg-gray-50 rounded-xl p-3 text-[11px] font-bold focus:ring-1 focus:ring-galleryGold"><option value="'Noto Serif KR', serif">SERIF</option><option value="'Gowun Dodum', sans-serif">SANS</option><option value="'Whisper', cursive">HAND</option></select></div>
        <div><div class="flex justify-between mb-2"><label class="text-[11px] font-bold opacity-50">SIZE</label><span id="label-size" class="text-[10px] opacity-30">16px</span></div><input type="range" id="val-size" min="10" max="50" value="16" class="w-full accent-galleryGold h-1"></div>
      </div>
      <button class="mt-12 w-full py-4 bg-galleryGold text-white rounded-2xl text-[11px] font-bold tracking-widest" onclick="closeStyleEditor()">APPLY STYLE</button>
    </div>
  </div>

  <script>
    const menuToggle = document.getElementById('menu-toggle');
    const dropdownMenu = document.getElementById('dropdown-menu');

    // 🌟 메뉴 제어
    menuToggle.onclick = (e) => {
        e.stopPropagation();
        dropdownMenu.classList.toggle('hidden');
    };
    function closeMenu() { dropdownMenu.classList.add('hidden'); }
    document.onclick = (e) => { if (!dropdownMenu.contains(e.target)) closeMenu(); };

    // 🌟 게시판 슬라이드 & 확장
    function toggleSlide(handle) {
      const panel = handle.closest('.slide-panel');
      panel.classList.toggle('slide-hide');
      handle.querySelector('.arrow-icon').classList.toggle('rotate-180');
    }
    function toggleExpand(btn) {
        const p = btn.previousElementSibling;
        p.classList.toggle('collapsed-text');
        btn.innerText = p.classList.contains('collapsed-text') ? 'READ MORE' : 'FOLD CONTENT';
    }

    // 🌟 드래그 기능 (모바일 대응)
    function makeDraggable(el) {
        let p1=0, p2=0, p3=0, p4=0;
        el.onmousedown = (e) => {
            if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.tagName === 'A') return;
            p3 = e.clientX; p4 = e.clientY;
            document.onmouseup = () => { document.onmousemove = null; };
            document.onmousemove = (e) => {
                p1 = p3 - e.clientX; p2 = p4 - e.clientY; p3 = e.clientX; p4 = e.clientY;
                el.style.top = (el.offsetTop - p2) + "px"; el.style.left = (el.offsetLeft - p1) + "px";
            };
        };
    }

    // 🌟 탭 추가
    function addNewBoard() {
      const id = 'art-' + Date.now();
      const html = `<div class="relative w-full h-[450px] overflow-hidden rounded-3xl shadow-xl bg-transparent gallery-item group/item">
          <img id="${id}" src="" class="absolute inset-0 w-full h-full object-contain bg-transparent">
          <div class="absolute top-4 left-6 z-20 flex flex-col space-y-2 opacity-0 group-hover/item:opacity-100">
             <button class="mini-icon-btn" onclick="event.stopPropagation(); triggerFileUpload('${id}')">🖼</button>
             <button class="mini-icon-btn !text-red-400" onclick="event.stopPropagation(); deleteElement(this.closest('.gallery-item'))">✕</button>
          </div>
          <div class="slide-panel absolute inset-0 w-full h-full flex z-10 slide-hide">
             <div class="w-11 h-full flex justify-center items-center cursor-pointer bg-white/10 border-r border-white/10 backdrop-blur-md" onclick="toggleSlide(this)"><svg class="w-4 h-4 text-[#1a4142] arrow-icon rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 5l7 7-7 7"/></svg></div>
             <div class="flex-1 h-full px-8 py-12 flex flex-col relative glass-panel-light overflow-hidden">
                <div class="absolute top-6 right-6 flex space-x-1.5"><button class="mini-icon-btn" onclick="event.stopPropagation(); playTTS(this.closest('.flex-1'))">🔊</button><button class="mini-icon-btn" onclick="event.stopPropagation(); openStyleEditor(this.closest('.flex-1'))">🎨</button><button class="mini-icon-btn" onclick="event.stopPropagation(); openTextEditor(this.closest('.flex-1'))">✎</button></div>
                <h4 class="text-xl font-serif mb-6 mt-4 text-target">[New Art]</h4>
                <div class="flex-1 overflow-y-auto pr-2 custom-scroll"><p class="text-[13px] text-target opacity-80 collapsed-text">[Description]</p><button class="text-[10px] opacity-40 mt-4 underline" onclick="event.stopPropagation(); toggleExpand(this)">MORE</button></div>
             </div>
          </div></div>`;
      document.getElementById('gallery-grid').insertAdjacentHTML('beforeend', html);
    }

    // 🌟 TTS & 사진 제어
    function playTTS(container) {
        window.speechSynthesis.cancel();
        let text = ""; container.querySelectorAll('.text-target').forEach(t => text += t.innerText + " ");
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ko-KR'; utterance.rate = document.getElementById('tts-rate').value;
        window.speechSynthesis.speak(utterance);
    }

    let curId = null;
    function triggerFileUpload(id) { curId = id; document.getElementById('hidden-file-input').click(); }
    document.getElementById('hidden-file-input').onchange = (e) => {
      if (e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX = 1000; let w=img.width, h=img.height;
            if (w>h && w>MAX) { h*=MAX/w; w=MAX; } else if (h>w && h>MAX) { w*=MAX/h; h=MAX; }
            canvas.width=w; canvas.height=h;
            canvas.getContext('2d').drawImage(img,0,0,w,h);
            const data = canvas.toDataURL('image/webp', 0.8);
            if (curId === 'global-bg') {
              document.body.style.backgroundImage = `url('${data}')`; 
              document.body.style.backgroundSize='cover'; document.body.style.backgroundAttachment='fixed';
              document.getElementById('global-bg').src=data; document.getElementById('global-bg').style.display='block';
            } else document.getElementById(curId).src = data;
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
      }
    };
    function removeBackground() { document.body.style.backgroundImage = 'none'; document.getElementById('global-bg').style.display='none'; }

    // 🌟 에디터
    let editTargs = [];
    const textModal = document.getElementById('text-editor-modal');
    function openTextEditor(el) {
      editTargs = el.classList.contains('text-target') ? [el] : Array.from(el.querySelectorAll('.text-target'));
      document.getElementById('modal-textarea').value = editTargs.map(t => t.innerText).join('\n');
      textModal.classList.remove('hidden'); textModal.classList.add('flex');
    }
    function closeTextEditor() { textModal.classList.remove('hidden'); textModal.classList.add('flex'); }
    function saveTextChanges() {
      const lines = document.getElementById('modal-textarea').value.split('\n');
      editTargs.forEach((t, i) => { if(lines[i] !== undefined) t.innerText = lines[i]; });
      closeTextEditor();
    }
    function deleteElement(el) { if(confirm('Delete?')) el.remove(); }

    const styleModal = document.getElementById('style-editor-modal');
    const styleSheet = document.getElementById('style-bottom-sheet');
    let styleTargs = [];
    function openStyleEditor(el) {
      styleTargs = el.querySelectorAll('.text-target');
      styleModal.classList.remove('hidden'); styleModal.classList.add('flex');
      setTimeout(()=>styleSheet.classList.add('open'), 10);
    }
    function closeStyleEditor() { styleSheet.classList.remove('open'); setTimeout(()=>styleModal.classList.add('hidden'), 300); }
    
    document.getElementById('val-color').oninput=(e)=>styleTargs.forEach(t=>t.style.setProperty('color', e.target.value, 'important'));
    document.getElementById('val-font').onchange=(e)=>styleTargs.forEach(t=>t.style.fontFamily=e.target.value);
    document.getElementById('val-size').oninput=(e)=>{styleTargs.forEach(t=>t.style.fontSize=e.target.value+'px'); document.getElementById('label-size').innerText=e.target.value+'px';};

    // 🌟 로컬 저장 시스템 (최신 버전 V6)
    function saveToBrowser() {
      try {
        localStorage.setItem('gallery_grid_v6', document.getElementById('gallery-grid').innerHTML);
        const textMap={}; const styleMap={};
        document.querySelectorAll('.text-target').forEach((el, i) => { textMap[i]=el.innerHTML; styleMap[i]=el.getAttribute('style')||''; });
        localStorage.setItem('gallery_texts_v6', JSON.stringify(textMap));
        localStorage.setItem('gallery_styles_v6', JSON.stringify(styleMap));
        const imgMap={}; document.querySelectorAll('img').forEach(img => { if(img.id && img.src.startsWith('data:image')) imgMap[img.id]=img.src; });
        localStorage.setItem('gallery_images_v6', JSON.stringify(imgMap));
        localStorage.setItem('gallery_bg_v6', document.getElementById('global-bg').src);
        alert("✅ SITE LOCKED & SAVED.");
      } catch(e) { alert("ERROR: MEMORY FULL."); }
    }

    function loadFromBrowser() {
      const layout = localStorage.getItem('gallery_grid_v6');
      if (layout) document.getElementById('gallery-grid').innerHTML = layout;
      const texts = JSON.parse(localStorage.getItem('gallery_texts_v6'));
      const styles = JSON.parse(localStorage.getItem('gallery_styles_v6'));
      if (texts) document.querySelectorAll('.text-target').forEach((el, i) => { if(texts[i]) el.innerHTML=texts[i]; if(styles[i]) el.setAttribute('style', styles[i]); });
      const imgs = JSON.parse(localStorage.getItem('gallery_images_v6'));
      if (imgs) Object.keys(imgs).forEach(id => { const img=document.getElementById(id); if(img) img.src=imgs[id]; });
      const bg = localStorage.getItem('gallery_bg_v6');
      if (bg && bg.startsWith('data:image')) {
        document.body.style.backgroundImage = `url('${bg}')`; document.body.style.backgroundSize='cover'; document.body.style.backgroundAttachment='fixed';
        document.getElementById('global-bg').src=bg; document.getElementById('global-bg').style.display='block';
      }
      if(document.getElementById("draggable-desc")) makeDraggable(document.getElementById("draggable-desc"));
    }

    window.onload = loadFromBrowser;
  </script>
</body>
</html>
