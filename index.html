<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Lacey Fine Art | Gallery</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400;700&family=Whisper&display=swap" rel="stylesheet"/>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            galleryGold: '#cfa752',
            galleryTeal: '#d0e4e0', 
          },
          fontFamily: {
            serif: ['"Noto Serif KR"', 'serif'],
            sans: ['"Gowun Dodum"', 'sans-serif'],
            diary: ['"Whisper"', 'cursive'],
          },
        }
      }
    }
  </script>
  
  <style data-purpose="custom-styles">
    body {
      font-family: 'Noto Serif KR', serif;
      -webkit-font-smoothing: antialiased;
      background-color: #d0e4e0; 
      transition: background-image 0.5s ease-in-out;
      overflow-x: hidden;
    }

    .text-target {
      transition: all 0.2s ease;
      word-break: break-all;
    }

    /* 유리 패널 스타일 */
    .glass-panel {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    .glass-panel-light {
      background: rgba(240, 240, 240, 0.85);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-left: 1px solid rgba(230, 230, 230, 0.9);
    }

    .slide-panel { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }
    .arrow-icon { transition: transform 0.6s ease; }
    .slide-hide { transform: translateX(calc(100% - 3.5rem)); }

    /* 버튼 스타일 */
    .water-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.35rem 0.75rem; color: #3b6b6d;
      background-color: rgba(255, 255, 255, 0.8); border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 20px; font-size: 0.75rem; font-weight: 700; cursor: pointer;
    }
    
    .ghost-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.4rem 1rem; color: rgba(80, 90, 90, 0.8);
      background-color: rgba(255, 255, 255, 0.3); border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 20px; font-size: 0.75rem; font-weight: 600; cursor: pointer; backdrop-filter: blur(4px);
    }

    /* TTS 컨트롤바 */
    .tts-bar {
      background: rgba(255, 255, 255, 0.4);
      border-radius: 12px;
      padding: 4px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: auto;
    }

    /* 🌟 길이 조절 핸들 (게시판 하단) */
    .resize-handle {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 12px;
      background: linear-gradient(transparent, rgba(207, 167, 82, 0.2));
      cursor: ns-resize;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 30;
    }
    .resize-handle::after {
      content: "";
      width: 30px;
      height: 2px;
      background: rgba(0,0,0,0.1);
      border-radius: 2px;
    }

    .bottom-sheet {
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .bottom-sheet.open { transform: translateY(0); }

    .diary-modal-bg { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
    
    /* 갤러리 아이템 기본 설정 (높이 가변) */
    .gallery-item {
      min-height: 300px;
      height: 450px; /* 초기 높이 */
      position: relative;
    }
  </style>
</head>
<body class="text-[#1a4142]">

  <input type="file" id="hidden-file-input" style="display: none;" accept="image/*">

  <div class="fixed inset-0 z-[-1] pointer-events-none">
    <img id="global-bg" src="" alt="" class="w-full h-full object-cover opacity-90 transition-opacity duration-1000" style="display:none;" />
  </div>

  <div class="fixed top-[90px] right-4 md:right-8 z-[9999] flex flex-col space-y-2">
    <button class="ghost-btn shadow-md border-galleryGold text-white bg-galleryGold font-bold" onclick="saveToBrowser()">
      ✅ 전체 레이아웃 저장
    </button>
  </div>

  <header class="sticky top-0 z-40 py-6 px-8 flex justify-between items-start bg-[#d0e4e0]/60 backdrop-blur-md border-b border-white/20">
    <h1 class="text-xs tracking-widest font-bold text-[#1a4142] text-target">LACEY FINE ART</h1>
    <button class="water-btn !bg-white/40 !text-[#1a4142]">MENU</button>
  </header>

  <main class="px-4 md:px-8 max-w-6xl mx-auto pt-16">
    <section class="pb-20">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="gallery-grid">
        
        <div class="relative w-full rounded-2xl shadow-xl bg-white gallery-item" id="item-1">
          <img id="art-img-1" src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=600" alt="Art 1" class="absolute inset-0 w-full h-full object-cover">
          
          <div class="absolute top-4 left-4 z-20">
             <button class="ghost-btn !text-[10px]" onclick="triggerFileUpload('art-img-1')">사진 교체</button>
          </div>

          <div class="slide-panel absolute inset-0 w-full h-full flex z-10">
             <div class="w-14 h-full flex flex-col justify-center items-center cursor-pointer bg-white/40 backdrop-blur-md border-r border-white/60" onclick="toggleSlide(this)">
                <svg class="w-6 h-6 text-[#1a4142] arrow-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
             </div>

             <div class="flex-1 h-full px-6 py-8 flex flex-col relative glass-panel-light text-content">
                <div class="absolute top-4 right-4 flex space-x-1 z-20">
                  <button class="water-btn !text-[10px] !bg-galleryGold !text-white" onclick="openStyleEditor(this.closest('.text-content'))">스타일</button>
                  <button class="water-btn !text-[10px]" onclick="openTextEditor(this.closest('.text-content'))">수정</button>
                </div>

                <h4 class="text-xl font-serif mb-3 mt-6 text-[#1a4142] text-target">[작품 제목]</h4>
                <div class="flex-grow overflow-hidden">
                  <p id="tts-art-1" class="text-sm leading-relaxed text-[#555] text-target">
                    [이 게시판 하단의 골드 그라데이션 부분을 잡고 아래로 끌어보세요. 게시판 전체 길이가 무한으로 늘어납니다.]
                  </p>
                </div>

                <div class="tts-bar mb-4">
                  <button onclick="speakText('tts-art-1')" class="text-xs font-bold">▶ 읽기</button>
                  <input type="range" class="tts-rate w-12 accent-galleryGold" min="0.5" max="2" step="0.1" value="1" onchange="updateRate(this)">
                </div>
             </div>
          </div>

          <div class="resize-handle" onmousedown="initResize(event, 'item-1')"></div>
        </div>

      </div>
    </section>
  </main>

  <div id="text-editor-modal" class="fixed inset-0 z-[10000] hidden items-center justify-center diary-modal-bg">
    <div class="bg-white w-[90%] max-w-md p-6 rounded-2xl shadow-2xl">
      <textarea id="modal-textarea" class="w-full h-48 p-4 border rounded-xl font-serif"></textarea>
      <div class="flex justify-end space-x-3 mt-4">
        <button class="px-5 py-2 bg-[#8ac6b8] text-white rounded-full font-bold text-sm" onclick="saveTextChanges()">적용</button>
      </div>
    </div>
  </div>

  <div id="style-editor-modal" class="fixed inset-0 z-[10000] hidden items-end md:items-center justify-center diary-modal-bg">
    <div id="style-bottom-sheet" class="bottom-sheet bg-white w-full md:w-[90%] md:max-w-md p-6 rounded-t-3xl md:rounded-2xl">
      <div class="space-y-5">
        <div class="flex justify-between items-center"><label class="text-sm font-bold">글자색</label><input type="color" id="val-color" oninput="applyRealtimeStyle()"></div>
        <div>
            <label class="text-sm font-bold">글씨 크기</label>
            <input type="range" id="val-size" min="12" max="60" value="16" class="w-full accent-galleryGold" oninput="applyRealtimeStyle()">
        </div>
      </div>
      <button class="mt-6 px-5 py-3 bg-galleryGold text-white rounded-xl font-bold w-full" onclick="closeStyleEditor()">설정 완료</button>
    </div>
  </div>

  <script>
    // ---------------- 🌟 게시판 길이 조절 (무한 리사이즈) ----------------
    function initResize(e, id) {
      e.preventDefault();
      const element = document.getElementById(id);
      const startHeight = element.offsetHeight;
      const startY = e.clientY;

      function doResize(e) {
        const newHeight = startHeight + (e.clientY - startY);
        element.style.height = newHeight + 'px';
      }

      function stopResize() {
        window.removeEventListener('mousemove', doResize);
        window.removeEventListener('mouseup', stopResize);
      }

      window.addEventListener('mousemove', doResize);
      window.addEventListener('mouseup', stopResize);
    }

    // ---------------- TTS ----------------
    let currentRate = 1;
    function updateRate(el) { currentRate = el.value; }
    function speakText(id) {
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(document.getElementById(id).innerText);
      utterance.lang = 'ko-KR'; utterance.rate = currentRate;
      window.speechSynthesis.speak(utterance);
    }

    // ---------------- 슬라이드 & 편집기 ----------------
    function toggleSlide(h) {
      h.closest('.slide-panel').classList.toggle('slide-hide');
      h.querySelector('.arrow-icon').classList.toggle('rotate-180');
    }

    let styleTargets = [];
    function openStyleEditor(container) {
      styleTargets = container.querySelectorAll('.text-target');
      document.getElementById('style-editor-modal').classList.remove('hidden');
      document.getElementById('style-editor-modal').classList.add('flex');
      setTimeout(() => document.getElementById('style-bottom-sheet').classList.add('open'), 10);
    }

    function applyRealtimeStyle() {
      const color = document.getElementById('val-color').value;
      const size = document.getElementById('val-size').value;
      styleTargets.forEach(el => { el.style.color = color; el.style.fontSize = size + 'px'; });
    }

    function closeStyleEditor() {
      document.getElementById('style-bottom-sheet').classList.remove('open');
      setTimeout(() => document.getElementById('style-editor-modal').classList.add('hidden'), 300);
    }

    function triggerFileUpload(id) { document.getElementById('hidden-file-input').click(); }

    function saveToBrowser() {
      const items = [];
      document.querySelectorAll('.gallery-item').forEach(el => {
        items.push({ id: el.id, height: el.style.height });
      });
      localStorage.setItem('gallery_layout', JSON.stringify(items));
      alert("게시판 길이와 레이아웃이 저장되었습니다.");
    }

    window.onload = () => {
      const layout = JSON.parse(localStorage.getItem('gallery_layout'));
      if(layout) layout.forEach(item => {
        const el = document.getElementById(item.id);
        if(el) el.style.height = item.height;
      });
    };
  </script>
</body>
</html>
