<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Lacey Fine Art | Gallery</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@200;300;400&family=Whisper&display=swap" rel="stylesheet"/>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { galleryGold: '#cfa752', galleryTeal: '#d0e4e0' },
          fontFamily: {
            serif: ['"Noto Serif KR"', 'serif'],
            sans: ['"Gowun Dodum"', 'sans-serif'],
            diary: ['"Whisper"', 'cursive'],
          },
        }
      }
    }
  </script>
  
  <style data-purpose="custom-styles">
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Serif KR', serif;
      -webkit-font-smoothing: antialiased;
      background-color: #d0e4e0; 
      transition: background-image 0.5s ease-in-out;
      overflow-x: hidden;
      min-height: 180vh;
    }

    #gallery-section { scroll-margin-top: 120px; }
    ::-webkit-scrollbar { width: 0px; }

    .collapsed-text {
      display: -webkit-box !important; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; max-height: 4.5em; transition: all 0.4s ease;
    }
    .expanded-text { display: block !important; overflow: visible !important; max-height: 10000px !important; }
    
    .intro-handwriting { font-family: 'Whisper', cursive; color: #FF6347; font-size: 1.5rem; opacity: 0.7; }
    .text-target { transition: all 0.2s ease; white-space: pre-wrap; word-break: break-word; opacity: 0.8; }

    /* 🌟 반 불투명 게시판 설정 (작품 설명창 전용) */
    .glass-panel-light {
      background: rgba(255, 255, 255, 0.65) !important; /* 반 불투명 수치 조절 */
      backdrop-filter: blur(15px) !important;
      border-left: 0.5px solid rgba(255, 255, 255, 0.3) !important;
      transition: padding 0.3s ease;
    }

    .mini-icon-btn {
      font-size: 14px; width: 32px; height: 32px;
      background: rgba(255, 255, 255, 0.4); border: 0.5px solid rgba(255, 255, 255, 0.8);
      color: #1a4142; cursor: pointer; opacity: 0.6; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; z-index: 100;
    }
    .mini-icon-btn:active { transform: scale(0.9); background: white; }

    .fixed-menu-btn {
      font-size: 9px; font-weight: 300; letter-spacing: 0.1em;
      padding: 6px 12px; border-radius: 5px;
      background: rgba(255, 255, 255, 0.6); border: 0.5px solid rgba(0,0,0,0.05);
      transition: all 0.3s; cursor: pointer;
    }

    #admin-panel { transition: all 0.4s ease; max-height: 0; opacity: 0; overflow: hidden; }
    #admin-panel.open { max-height: 500px; opacity: 1; margin-top: 10px; }

    .slide-panel { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); z-index: 30; }
    .slide-hide { transform: translateX(calc(100% - 3rem)); }

    .draggable { cursor: grab; }
    .draggable:active { cursor: grabbing; }
    .diary-modal-bg { background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); }
  </style>
</head>
<body class="text-[#1a4142]">

  <input type="file" id="hidden-file-input" style="display: none;" accept="image/*">

  <div class="fixed inset-0 z-[-1] pointer-events-none">
    <img id="global-bg" src="" alt="" class="w-full h-full object-cover transition-opacity duration-1000" style="display:none;" />
  </div>

  <div class="fixed top-24 right-6 z-[10005] flex flex-col items-end">
    <button onclick="toggleAdmin()" class="w-8 h-8 rounded-full border border-black/5 flex items-center justify-center opacity-30 hover:opacity-100 bg-white/20">
      <span id="admin-icon" class="text-[14px] font-light">＋</span>
    </button>
    
    <div id="admin-panel" class="flex flex-col items-end space-y-2 bg-white/30 backdrop-blur-2xl p-4 rounded-xl border border-white/20 shadow-sm">
        <button class="fixed-menu-btn" onclick="addNewBoard()">+ TAB</button>
        <button class="fixed-menu-btn" onclick="triggerFileUpload('global-bg')">BG SET</button>
        <button class="fixed-menu-btn !bg-galleryGold !text-white !border-0 shadow-lg mt-1 px-5 py-2.5" onclick="saveToBrowser()">FIX SITE</button>
    </div>
  </div>

  <header class="fixed top-0 left-0 w-full z-[10001] py-8 px-12 flex justify-between items-center pointer-events-none">
    <div class="flex items-center space-x-4 group pointer-events-auto logo-container">
      <h1 class="text-[11px] tracking-[0.5em] font-light text-[#1a4142] text-target" id="header-title">LACEY FINE ART</h1>
      <button class="mini-icon-btn !w-6 !h-6 !text-[10px] opacity-0 group-hover:opacity-100" onclick="event.stopPropagation(); openTextEditor(this.closest('.logo-container'))">✎</button>
    </div>
    
    <div class="relative pointer-events-auto">
      <button id="menu-toggle" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-white/30 transition-all">
        <div class="w-6 h-[1px] bg-[#1a4142] opacity-60"></div>
      </button>

      <div id="dropdown-menu" class="hidden absolute right-0 mt-4 w-60 bg-white/80 backdrop-blur-3xl shadow-2xl rounded-3xl flex flex-col z-[101] border border-white/30">
        <div class="p-8 space-y-8">
          <div class="flex flex-col space-y-4">
             <div class="flex justify-between items-center group/nav">
                <a href="#gallery-section" class="text-[12px] font-bold text-target flex-grow" onclick="closeMenu()">🌍 COUNTRY</a>
                <button class="mini-icon-btn !w-5 !h-5 !text-[9px] opacity-20 group-hover/nav:opacity-100" onclick="event.stopPropagation(); openTextEditor(this.previousElementSibling)">✎</button>
             </div>
             <div class="pl-4 space-y-3 border-l border-gray-100">
                <div class="flex justify-between items-center group/nav">
                   <a href="#gallery-section" class="text-[11px] text-target flex-grow opacity-60" onclick="closeMenu()">- [NAME]</a>
                   <button class="mini-icon-btn !w-5 !h-5 !text-[9px] opacity-20 group-hover/nav:opacity-100" onclick="event.stopPropagation(); openTextEditor(this.previousElementSibling)">✎</button>
                </div>
             </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="h-[55vh] pointer-events-none"></div>

  <main class="px-6 md:px-12 max-w-7xl mx-auto" id="main-content">
    
    <section class="mb-32">
      <div class="relative flex flex-col items-center text-center draggable mx-auto max-w-md group" id="draggable-desc">
        <div class="absolute top-0 right-0 flex space-x-3 opacity-0 group-hover:opacity-100">
          <button class="mini-icon-btn" onclick="event.stopPropagation(); playTTS(this.closest('#draggable-desc'))">🔊</button>
          <button class="mini-icon-btn" onclick="event.stopPropagation(); openStyleEditor(this.closest('#draggable-desc'))">🎨</button>
          <button class="mini-icon-btn !text-galleryGold" onclick="event.stopPropagation(); openTextEditor(this.closest('#draggable-desc'))">✎</button>
        </div>
        <p class="intro-handwriting text-target mb-1">[Label]</p>
        <h2 class="text-2xl font-light tracking-widest text-target mb-6">[Title]</h2>
        <div class="w-8 h-[0.5px] bg-black mb-8 opacity-10"></div>
        <div class="w-full flex flex-col items-center text-content">
            <p class="text-[13px] leading-relaxed text-target collapsed-text w-full">[Description]</p>
            <button class="text-[9px] opacity-30 mt-6 tracking-widest hover:opacity-100 uppercase" onclick="event.stopPropagation(); toggleExpand(this)">More</button>
        </div>
      </div>
    </section>

    <section class="pb-48" id="gallery-section">
      <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
        <div class="relative w-full h-[480px] overflow-hidden rounded-3xl shadow-xl gallery-item group/item">
          <img id="art-img-base" src="" alt="" class="absolute inset-0 w-full h-full object-contain">
          
          <div class="absolute top-4 left-6 z-20 flex flex-col space-y-2 opacity-0 group-hover/item:opacity-100 transition-all">
             <button class="mini-icon-btn" onclick="event.stopPropagation(); triggerFileUpload('art-img-base')">🖼</button>
             <button class="mini-icon-btn !text-red-400" onclick="event.stopPropagation(); deleteElement(this.closest('.gallery-item'))">✕</button>
          </div>

          <div class="slide-panel absolute inset-0 w-full h-full flex z-10 slide-hide">
             <div class="w-12 h-full flex items-center justify-center cursor-pointer bg-white/5" onclick="toggleSlide(this)">
                <div class="w-4 h-[1px] bg-black/50"></div>
             </div>
             <div class="flex-1 h-full px-10 py-16 flex flex-col relative glass-panel-light overflow-hidden shadow-2xl text-container-inner">
                <div class="absolute top-6 right-8 flex space-x-2 z-[110]">
                  <button class="mini-icon-btn" onclick="event.stopPropagation(); playTTS(this.closest('.flex-1'))">🔊</button>
                  <button class="mini-icon-btn" onclick="event.stopPropagation(); openStyleEditor(this.closest('.flex-1'))">🎨</button>
                  <button class="mini-icon-btn !opacity-100 !text-galleryGold" onclick="event.stopPropagation(); openTextEditor(this.closest('.flex-1'))">✎</button>
                </div>
                <h4 class="text-xl font-light mb-8 mt-4 text-[#1a4142] text-target">[Art Title]</h4>
                <div class="flex-1 overflow-y-auto pr-2 custom-scroll flex flex-col items-start text-content">
                  <p class="text-[14px] font-light text-target collapsed-text w-full">[Description Text]</p>
                  <button class="text-[10px] opacity-40 mt-5 underline tracking-tighter" onclick="event.stopPropagation(); toggleExpand(this)">MORE</button>
                </div>
             </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="text-editor-modal" class="fixed inset-0 z-[100006] hidden items-center justify-center diary-modal-bg">
    <div class="bg-white/95 backdrop-blur-3xl w-[90%] max-w-sm p-10 rounded-[2.5rem] shadow-2xl">
      <h3 class="text-[10px] font-bold mb-6 tracking-widest text-gray-400">EDIT CONTENT</h3>
      <textarea id="modal-textarea" class="w-full h-56 p-5 border-0 rounded-2xl font-light text-[15px] text-gray-700 bg-gray-50 focus:ring-1 focus:ring-galleryGold outline-none"></textarea>
      <div class="flex justify-end space-x-3 mt-10">
        <button class="fixed-menu-btn" onclick="closeTextEditor()">CLOSE</button>
        <button class="fixed-menu-btn !bg-galleryGold !text-white" onclick="saveTextChanges()">SAVE</button>
      </div>
    </div>
  </div>

  <div id="style-editor-modal" class="fixed inset-0 z-[100006] hidden items-end md:items-center justify-center diary-modal-bg">
    <div id="style-bottom-sheet" class="bg-white/95 backdrop-blur-3xl w-full md:w-80 p-10 rounded-t-[3.5rem] md:rounded-[2.5rem] shadow-2xl">
      <div class="flex justify-between items-center mb-10 px-2">
        <h3 class="text-[10px] font-bold tracking-[0.3em] text-gray-400 uppercase">Typography</h3>
        <button class="text-gray-300 text-3xl" onclick="closeStyleEditor()">×</button>
      </div>
      <div class="space-y-8 px-2 max-h-[50vh] overflow-y-auto custom-scroll">
        <div class="flex justify-between items-center"><label class="text-[11px] font-bold opacity-50">COLOR</label><input type="color" id="val-color" class="w-8 h-8 rounded-full border-0 p-0 cursor-pointer"></div>
        <div><label class="text-[11px] font-bold opacity-50 block mb-2">FONT</label><select id="val-font" class="w-full border-0 bg-gray-50 rounded-xl p-3 text-[11px] font-bold"><option value="'Noto Serif KR', serif">SERIF</option><option value="'Gowun Dodum', sans-serif">SANS</option><option value="'Whisper', cursive">HAND</option></select></div>
        <div><div class="flex justify-between mb-2"><label class="text-[11px] font-bold opacity-50">SIZE</label><span id="label-size" class="text-[10px] opacity-30">16px</span></div><input type="range" id="val-size" min="10" max="40" value="16" class="w-full accent-galleryGold h-0.5"></div>
        <div><div class="flex justify-between mb-2"><label class="text-[11px] font-bold opacity-50">LINE SPACE</label><span id="label-line" class="text-[10px] opacity-30">1.6</span></div><input type="range" id="val-line" min="1" max="3" step="0.1" value="1.6" class="w-full accent-galleryGold h-0.5"></div>
        <div><div class="flex justify-between mb-2"><label class="text-[11px] font-bold opacity-50">PADDING</label><span id="label-padding" class="text-[10px] opacity-30">40px</span></div><input type="range" id="val-padding" min="10" max="80" value="40" class="w-full accent-galleryGold h-0.5"></div>
      </div>
      <button class="mt-12 w-full py-4 bg-galleryGold text-white rounded-2xl text-[11px] font-bold tracking-widest" onclick="closeStyleEditor()">APPLY</button>
    </div>
  </div>

  <script>
    function toggleAdmin() {
        const panel = document.getElementById('admin-panel');
        const icon = document.getElementById('admin-icon');
        panel.classList.toggle('open');
        icon.innerText = panel.classList.contains('open') ? '－' : '＋';
    }
    const menuToggle = document.getElementById('menu-toggle');
    const dropdownMenu = document.getElementById('dropdown-menu');
    menuToggle.onclick = (e) => { e.stopPropagation(); dropdownMenu.classList.toggle('hidden'); };
    function closeMenu() { dropdownMenu.classList.add('hidden'); }
    document.onclick = (e) => { if (!dropdownMenu.contains(e.target)) closeMenu(); };

    function toggleSlide(handle) { handle.closest('.slide-panel').classList.toggle('slide-hide'); }
    function toggleExpand(btn) {
      const p = btn.closest('.text-content').querySelector('p.text-target');
      if (p.classList.contains('collapsed-text')) {
        p.classList.replace('collapsed-text', 'expanded-text');
        btn.innerText = 'Fold';
      } else {
        p.classList.replace('expanded-text', 'collapsed-text');
        btn.innerText = 'More';
      }
    }

    function makeDraggable(el) {
        let p1=0, p2=0, p3=0, p4=0;
        el.onmousedown = (e) => {
            if(e.target.closest('button') || e.target.tagName === 'INPUT') return;
            p3 = e.clientX; p4 = e.clientY;
            document.onmouseup = () => { document.onmousemove = null; };
            document.onmousemove = (e) => {
                p1 = p3 - e.clientX; p2 = p4 - e.clientY; p3 = e.clientX; p4 = e.clientY;
                el.style.top = (el.offsetTop - p2) + "px"; el.style.left = (el.offsetLeft - p1) + "px";
            };
        };
    }

    function addNewBoard() {
      const id = 'art-' + Date.now();
      const html = `<div class="relative w-full h-[480px] overflow-hidden rounded-3xl shadow-xl gallery-item group/item">
          <img id="${id}" src="" class="absolute inset-0 w-full h-full object-contain">
          <div class="absolute top-4 left-6 z-20 flex flex-col space-y-2 opacity-0 group-hover/item:opacity-100 transition-all">
             <button class="mini-icon-btn" onclick="event.stopPropagation(); triggerFileUpload('${id}')">🖼</button>
             <button class="mini-icon-btn !text-red-300" onclick="event.stopPropagation(); deleteElement(this.closest('.gallery-item'))">✕</button>
          </div>
          <div class="slide-panel absolute inset-0 w-full h-full flex z-10 slide-hide">
             <div class="w-12 h-full flex items-center justify-center cursor-pointer bg-white/5" onclick="toggleSlide(this)"><div class="w-4 h-[1px] bg-black/50"></div></div>
             <div class="flex-1 h-full px-10 py-16 flex flex-col relative glass-panel-light overflow-hidden shadow-2xl text-container-inner">
                <div class="absolute top-6 right-8 flex space-x-2 z-[110]"><button class="mini-icon-btn" onclick="event.stopPropagation(); playTTS(this.closest('.flex-1'))">🔊</button><button class="mini-icon-btn" onclick="event.stopPropagation(); openStyleEditor(this.closest('.flex-1'))">🎨</button><button class="mini-icon-btn !opacity-100 !text-galleryGold" onclick="event.stopPropagation(); openTextEditor(this.closest('.flex-1'))">✎</button></div>
                <h4 class="text-xl font-light mb-8 mt-4 text-target">[New Title]</h4>
                <div class="flex-1 overflow-y-auto pr-2 flex flex-col items-start text-content"><p class="text-[14px] text-target collapsed-text w-full">[Description]</p><button class="text-[10px] opacity-40 mt-5 underline tracking-tighter" onclick="event.stopPropagation(); toggleExpand(this)">MORE</button></div>
             </div>
          </div></div>`;
      document.getElementById('gallery-grid').insertAdjacentHTML('beforeend', html);
    }

    function playTTS(container) {
        window.speechSynthesis.cancel();
        let text = ""; container.querySelectorAll('.text-target').forEach(t => text += t.innerText + " ");
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ko-KR'; utterance.rate = 1.0;
        window.speechSynthesis.speak(utterance);
    }

    let curId = null;
    function triggerFileUpload(id) { curId = id; document.getElementById('hidden-file-input').click(); }
    document.getElementById('hidden-file-input').onchange = (e) => {
      if (e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX = 1000; let w=img.width, h=img.height;
            if (w>h && w>MAX) { h*=MAX/w; w=MAX; } else if (h>w && h>MAX) { w*=MAX/h; h=MAX; }
            canvas.width=w; canvas.height=h;
            canvas.getContext('2d').drawImage(img,0,0,w,h);
            const data = canvas.toDataURL('image/webp', 0.4); // 용량 극적 최적화
            if (curId === 'global-bg') {
              document.body.style.backgroundImage = `url('${data}')`; document.body.style.backgroundSize='cover'; document.body.style.backgroundAttachment='fixed';
              document.getElementById('global-bg').src=data; document.getElementById('global-bg').style.display='block';
            } else document.getElementById(curId).src = data;
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
      }
    };

    let editTargs = [];
    const textModal = document.getElementById('text-editor-modal');
    function openTextEditor(el) {
      editTargs = el.classList.contains('text-target') ? [el] : Array.from(el.querySelectorAll('.text-target'));
      document.getElementById('modal-textarea').value = editTargs.map(t => t.innerText).join('\n');
      textModal.classList.replace('hidden', 'flex');
    }
    function closeTextEditor() { textModal.classList.replace('flex', 'hidden'); }
    function saveTextChanges() {
      const lines = document.getElementById('modal-textarea').value.split('\n');
      editTargs.forEach((t, i) => { 
        if (i === editTargs.length - 1) t.innerText = lines.slice(i).join('\n');
        else t.innerText = lines[i] || "";
      });
      closeTextEditor();
    }
    function deleteElement(el) { if(confirm('Delete?')) el.remove(); }

    let styleTargs = [];
    let activePanel = null;
    function openStyleEditor(el) {
      styleTargs = el.querySelectorAll('.text-target');
      activePanel = el.closest('.glass-panel-light') || el.closest('.draggable');
      document.getElementById('style-editor-modal').classList.replace('hidden', 'flex');
    }
    function closeStyleEditor() { document.getElementById('style-editor-modal').classList.replace('flex', 'hidden'); }
    
    document.getElementById('val-color').oninput=(e)=>styleTargs.forEach(t=>t.style.setProperty('color', e.target.value, 'important'));
    document.getElementById('val-font').onchange=(e)=>styleTargs.forEach(t=>t.style.fontFamily=e.target.value);
    document.getElementById('val-size').oninput=(e)=>{styleTargs.forEach(t=>t.style.fontSize=e.target.value+'px'); document.getElementById('label-size').innerText=e.target.value+'px';};
    document.getElementById('val-line').oninput=(e)=>{styleTargs.forEach(t=>t.style.lineHeight=e.target.value); document.getElementById('label-line').innerText=e.target.value;};
    document.getElementById('val-padding').oninput=(e)=>{ if(activePanel) activePanel.style.padding = e.target.value + 'px'; document.getElementById('label-padding').innerText=e.target.value+'px';};

    function saveToBrowser() {
      try {
        const gridClone = document.getElementById('gallery-grid').cloneNode(true);
        gridClone.querySelectorAll('img').forEach(img => img.src = ""); 
        localStorage.setItem('gallery_grid_v14', gridClone.innerHTML);
        const textMap={}; const styleMap={};
        document.querySelectorAll('.text-target').forEach((el, i) => { textMap[i]=el.innerHTML; styleMap[i]=el.getAttribute('style')||''; });
        localStorage.setItem('gallery_texts_v14', JSON.stringify(textMap));
        localStorage.setItem('gallery_styles_v14', JSON.stringify(styleMap));
        const imgMap={}; document.querySelectorAll('img').forEach(img => { if(img.id && img.src.startsWith('data:image')) imgMap[img.id]=img.src; });
        localStorage.setItem('gallery_images_v14', JSON.stringify(imgMap));
        localStorage.setItem('gallery_bg_v14', document.getElementById('global-bg').src);
        alert("✅ SITE DATA SECURED.");
      } catch(e) { alert("ERROR: MEMORY FULL."); }
    }

    function loadFromBrowser() {
      const layout = localStorage.getItem('gallery_grid_v14');
      if (layout) document.getElementById('gallery-grid').innerHTML = layout;
      const texts = JSON.parse(localStorage.getItem('gallery_texts_v14'));
      const styles = JSON.parse(localStorage.getItem('gallery_styles_v14'));
      if (texts) document.querySelectorAll('.text-target').forEach((el, i) => { if(texts[i]) el.innerHTML=texts[i]; if(styles[i]) el.setAttribute('style', styles[i]); });
      const imgs = JSON.parse(localStorage.getItem('gallery_images_v14'));
      if (imgs) Object.keys(imgs).forEach(id => { const img=document.getElementById(id); if(img) img.src=imgs[id]; });
      const bg = localStorage.getItem('gallery_bg_v14');
      if (bg && bg.startsWith('data:image')) {
        document.body.style.backgroundImage = `url('${bg}')`; document.body.style.backgroundSize='cover'; document.body.style.backgroundAttachment='fixed';
        document.getElementById('global-bg').src=bg; document.getElementById('global-bg').style.display='block';
      }
      if(document.getElementById("draggable-desc")) makeDraggable(document.getElementById("draggable-desc"));
    }
    window.onload = loadFromBrowser;
  </script>
</body>
</html>
