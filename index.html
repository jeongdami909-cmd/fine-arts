<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Lacey Fine Art | Gallery</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400;700&family=Whisper&display=swap" rel="stylesheet"/>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { galleryGold: '#cfa752', galleryTeal: '#d0e4e0' },
          fontFamily: {
            serif: ['"Noto Serif KR"', 'serif'],
            sans: ['"Gowun Dodum"', 'sans-serif'],
            diary: ['"Whisper"', 'cursive'],
          },
        }
      }
    }
  </script>
  
  <style data-purpose="custom-styles">
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Serif KR', serif;
      -webkit-font-smoothing: antialiased;
      background-color: #d0e4e0; 
      transition: background-image 0.5s ease-in-out;
      overflow-x: hidden;
      min-height: 200vh; /* 게시판을 아래로 내리기 위한 여유 공간 */
    }

    /* 🌟 스크롤바 최소화 */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(207, 167, 82, 0.3); border-radius: 10px; }

    /* 🌟 게시판 하단 배치 및 버튼 최소화 */
    .collapsed-text {
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; transition: all 0.3s ease;
    }
    
    .intro-handwriting {
      font-family: 'Whisper', cursive; color: #FF6347; 
      font-size: 1.5rem; opacity: 0.9;
    }

    .intro-desc { color: rgba(255, 255, 255, 0.9); text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }

    .glass-panel {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .glass-panel-light {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
    }

    /* 🌟 버튼 디자인: 극도의 미니멀리즘 */
    .mini-btn {
      font-size: 9px; font-weight: 700; color: #1a4142;
      background: rgba(255, 255, 255, 0.4); border: 1px solid rgba(255, 255, 255, 0.5);
      padding: 2px 8px; border-radius: 4px; opacity: 0.4; transition: all 0.3s;
      cursor: pointer; letter-spacing: 0.05em;
    }
    .mini-btn:hover { opacity: 1; background: rgba(255, 255, 255, 0.8); }
    .gold-btn { color: #cfa752; border-color: #cfa752; }

    .slide-panel { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .slide-hide { transform: translateX(calc(100% - 2.5rem)); }
    .arrow-icon { transition: transform 0.6s ease; opacity: 0.5; }

    .draggable { cursor: grab; }
    .draggable:active { cursor: grabbing; }
    .diary-modal-bg { background-color: rgba(0, 0, 0, 0.3); backdrop-filter: blur(4px); }
  </style>
</head>
<body class="text-[#1a4142]">

  <input type="file" id="hidden-file-input" style="display: none;" accept="image/*">

  <div class="fixed inset-0 z-[-1] pointer-events-none">
    <img id="global-bg" src="" alt="" class="w-full h-full object-cover opacity-100 transition-opacity duration-1000" style="display:none;" />
  </div>

  <div class="fixed top-24 right-4 z-[9999] flex flex-col items-end space-y-2 group">
    <div class="opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-end space-y-1">
        <div class="bg-white/40 p-1.5 rounded-lg flex flex-col items-center gap-1 mb-1 backdrop-blur-sm">
            <input type="range" id="tts-rate" min="0.5" max="2.0" step="0.1" value="1.0" class="w-16 h-1 accent-galleryGold">
            <span class="text-[8px] font-bold opacity-60">SPEED</span>
        </div>
        <button class="mini-btn" onclick="addNewBoard()">ADD TAB</button>
        <button class="mini-btn" onclick="triggerFileUpload('global-bg')">BG IMG</button>
        <button class="mini-btn" onclick="removeBackground()">DELETE BG</button>
    </div>
    <button class="mini-btn gold-btn !opacity-100 shadow-sm !bg-white/80" onclick="saveToBrowser()">FIX SITE</button>
  </div>

  <header class="fixed top-0 left-0 w-full z-40 py-6 px-10 flex justify-between items-center bg-white/10 backdrop-blur-sm">
    <div class="flex flex-col items-start relative group logo-container">
      <div class="absolute -bottom-6 left-0 opacity-0 group-hover:opacity-100 transition-opacity flex space-x-1">
        <button class="mini-btn" onclick="openTextEditor(this.closest('.logo-container'))">EDIT</button>
      </div>
      <h1 class="text-[10px] tracking-[0.4em] font-bold text-[#1a4142] opacity-80 text-target" id="header-title">LACEY FINE ART</h1>
    </div>
    
    <div class="relative">
      <button id="menu-toggle" class="w-10 h-10 rounded-full hover:bg-white/20 transition-colors flex items-center justify-center">
        <div class="w-4 h-[1px] bg-[#1a4142] opacity-40"></div>
      </button>

      <div id="dropdown-menu" class="hidden absolute right-0 mt-4 w-60 bg-white/90 backdrop-blur-xl border border-white/40 shadow-xl rounded-xl flex flex-col z-50 overflow-hidden">
        <div class="p-3 bg-gray-50/50 text-[9px] font-bold uppercase tracking-widest text-gray-400">Directory</div>
        <div class="p-4 space-y-5">
          <div class="flex flex-col space-y-2">
             <a href="#gallery-section" class="text-xs font-bold text-target opacity-80">🌍 COUNTRY</a>
             <div class="pl-2 space-y-1">
                <a href="#gallery-section" class="text-[10px] text-target opacity-60">- [NAME]</a>
             </div>
          </div>
          <div class="flex flex-col space-y-2">
             <a href="#gallery-section" class="text-xs font-bold text-target opacity-80">⏳ ERA</a>
             <div class="pl-2 space-y-1">
                <a href="#gallery-section" class="text-[10px] text-target opacity-60">- [NAME]</a>
             </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="h-[55vh] pointer-events-none"></div>

  <main class="px-4 md:px-10 max-w-7xl mx-auto" id="main-content">
    
    <section class="mb-20">
      <div class="glass-panel rounded-2xl p-6 relative flex flex-col items-center text-center draggable mx-auto max-w-md shadow-sm" id="draggable-desc">
        <div class="absolute -top-7 right-0 flex space-x-1 opacity-0 group-hover:opacity-100 group transition-opacity">
          <button class="mini-btn" onclick="playTTS(this.closest('#draggable-desc'))">VOICE</button>
          <button class="mini-btn" onclick="openStyleEditor(this.closest('#draggable-desc'))">STYLE</button>
          <button class="mini-btn" onclick="openTextEditor(this.closest('#draggable-desc'))">EDIT</button>
        </div>
        <p class="intro-handwriting text-target mb-1">[Label]</p>
        <h2 class="text-lg font-serif text-target mb-4 opacity-90">[Title]</h2>
        <div class="w-8 h-[1px] bg-galleryGold mb-4 opacity-50"></div>
        <div class="w-full">
            <p class="text-xs leading-relaxed text-target intro-desc collapsed-text">[Description]</p>
            <button class="text-[9px] opacity-50 mt-2" onclick="toggleExpand(this)">MORE</button>
        </div>
      </div>
    </section>

    <section class="pb-32" id="gallery-section">
      <div class="text-center mb-12">
        <h3 class="text-[10px] tracking-[0.5em] font-bold opacity-40 text-target uppercase">Exhibition</h3>
      </div>

      <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
        <div class="relative w-full h-[450px] overflow-hidden rounded-xl shadow-lg bg-transparent gallery-item group/item">
          <img id="art-img-base" src="" alt="" class="absolute inset-0 w-full h-full object-contain bg-transparent">
          
          <div class="absolute top-4 left-4 z-20 flex flex-col space-y-1 opacity-0 group-hover/item:opacity-100 transition-opacity">
             <button class="mini-btn" onclick="triggerFileUpload('art-img-base')">IMG</button>
             <button class="mini-btn" onclick="deleteElement(this.closest('.gallery-item'))">DEL</button>
          </div>

          <div class="slide-panel absolute inset-0 w-full h-full flex z-10 slide-hide">
             <div class="w-10 h-full flex flex-col justify-center items-center cursor-pointer bg-white/20 border-r border-white/20" onclick="toggleSlide(this)">
                <svg class="w-4 h-4 text-[#1a4142] arrow-icon rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
             </div>
             <div class="flex-1 h-full px-8 py-10 flex flex-col relative glass-panel-light overflow-hidden">
                <div class="absolute top-4 right-4 flex space-x-1">
                  <button class="mini-btn" onclick="playTTS(this.closest('.flex-1'))">🔊</button>
                  <button class="mini-btn gold-btn" onclick="openStyleEditor(this.closest('.flex-1'))">🎨</button>
                  <button class="mini-btn" onclick="openTextEditor(this.closest('.flex-1'))">📝</button>
                </div>
                <h4 class="text-lg font-serif mb-4 mt-6 text-[#1a4142] text-target">[Title]</h4>
                <div class="flex-1 overflow-y-auto pr-2 custom-scroll">
                  <p class="text-[13px] leading-relaxed text-target opacity-80 collapsed-text">[Description Text]</p>
                  <button class="text-[9px] opacity-50 mt-2" onclick="toggleExpand(this)">MORE</button>
                </div>
             </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="text-editor-modal" class="fixed inset-0 z-[10000] hidden items-center justify-center diary-modal-bg">
    <div class="bg-white/90 backdrop-blur-xl w-[90%] max-w-md p-8 rounded-2xl shadow-2xl">
      <h3 class="text-xs font-bold mb-4 tracking-widest text-gray-400">EDIT TEXT</h3>
      <textarea id="modal-textarea" class="w-full h-64 p-4 border-0 rounded-xl font-serif text-sm text-gray-700 bg-gray-50 focus:ring-1 focus:ring-galleryGold outline-none"></textarea>
      <div class="flex justify-end space-x-2 mt-6">
        <button class="mini-btn" onclick="closeTextEditor()">CANCEL</button>
        <button class="mini-btn gold-btn !opacity-100" onclick="saveTextChanges()">APPLY</button>
      </div>
    </div>
  </div>

  <div id="style-editor-modal" class="fixed inset-0 z-[10000] hidden items-end md:items-center justify-center diary-modal-bg">
    <div id="style-bottom-sheet" class="bottom-sheet bg-white/95 backdrop-blur-2xl w-full md:w-80 p-8 rounded-t-3xl md:rounded-2xl shadow-2xl">
      <div class="flex justify-between items-center mb-8">
        <h3 class="text-[10px] font-bold tracking-[0.2em] text-gray-400">STYLE SETTING</h3>
        <button class="text-gray-300 hover:text-gray-600" onclick="closeStyleEditor()">✕</button>
      </div>
      <div class="space-y-6">
        <div class="flex justify-between items-center"><label class="text-[11px] font-bold opacity-60">COLOR</label><input type="color" id="val-color" class="w-8 h-8 rounded-full border-0 p-0 bg-transparent cursor-pointer"></div>
        <div><label class="text-[11px] font-bold opacity-60 block mb-2">FONT</label><select id="val-font" class="w-full border-0 bg-gray-50 rounded-lg p-2 text-xs focus:ring-1 focus:ring-galleryGold"><option value="'Noto Serif KR', serif">SERIF</option><option value="'Gowun Dodum', sans-serif">SANS</option><option value="'Whisper', cursive">HAND</option></select></div>
        <div><div class="flex justify-between mb-1"><label class="text-[11px] font-bold opacity-60">SIZE</label><span id="label-size" class="text-[10px] opacity-40">16px</span></div><input type="range" id="val-size" min="10" max="60" value="16" class="w-full accent-galleryGold h-1"></div>
        <div><div class="flex justify-between mb-1"><label class="text-[11px] font-bold opacity-60">LINE</label><span id="label-line" class="text-[10px] opacity-40">1.5</span></div><input type="range" id="val-line" min="1" max="3" step="0.1" value="1.5" class="w-full accent-galleryGold h-1"></div>
      </div>
      <button class="mt-10 w-full py-3 bg-galleryGold/80 text-white rounded-xl text-[11px] font-bold tracking-widest" onclick="closeStyleEditor()">DONE</button>
    </div>
  </div>

  <script>
    // ---------------- 🌟 기능 제어 ----------------
    const menuToggle = document.getElementById('menu-toggle');
    const dropdownMenu = document.getElementById('dropdown-menu');

    menuToggle.onclick = (e) => {
        e.stopPropagation();
        dropdownMenu.classList.toggle('hidden');
    };

    document.onclick = (e) => {
        if (!dropdownMenu.contains(e.target) && e.target !== menuToggle) {
            dropdownMenu.classList.add('hidden');
        }
    };

    function toggleSlide(handle) {
      const panel = handle.closest('.slide-panel');
      panel.classList.toggle('slide-hide');
      handle.querySelector('.arrow-icon').classList.toggle('rotate-180');
    }

    function toggleExpand(btn) {
        const p = btn.previousElementSibling;
        p.classList.toggle('collapsed-text');
        btn.innerText = p.classList.contains('collapsed-text') ? 'MORE' : 'FOLD';
    }

    function playTTS(container) {
        window.speechSynthesis.cancel();
        let text = ""; container.querySelectorAll('.text-target').forEach(t => text += t.innerText + " ");
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ko-KR'; 
        utterance.rate = document.getElementById('tts-rate').value;
        window.speechSynthesis.speak(utterance);
    }

    function makeDraggable(el) {
        let p1=0, p2=0, p3=0, p4=0;
        el.onmousedown = (e) => {
            if(e.target.tagName === 'BUTTON') return;
            p3 = e.clientX; p4 = e.clientY;
            document.onmouseup = () => { document.onmousemove = null; };
            document.onmousemove = (e) => {
                p1 = p3 - e.clientX; p2 = p4 - e.clientY;
                p3 = e.clientX; p4 = e.clientY;
                el.style.top = (el.offsetTop - p2) + "px";
                el.style.left = (el.offsetLeft - p1) + "px";
            };
        };
    }

    // ---------------- 🌟 게시판 추가 (미니멀 스타일) ----------------
    function addNewBoard() {
      const id = 'art-' + Date.now();
      const html = `<div class="relative w-full h-[450px] overflow-hidden rounded-xl shadow-lg bg-transparent gallery-item group/item">
          <img id="${id}" src="" class="absolute inset-0 w-full h-full object-contain bg-transparent">
          <div class="absolute top-4 left-4 z-20 flex flex-col space-y-1 opacity-0 group-hover/item:opacity-100 transition-opacity">
             <button class="mini-btn" onclick="triggerFileUpload('${id}')">IMG</button>
             <button class="mini-btn" onclick="deleteElement(this.closest('.gallery-item'))">DEL</button>
          </div>
          <div class="slide-panel absolute inset-0 w-full h-full flex z-10 slide-hide">
             <div class="w-10 h-full flex justify-center items-center cursor-pointer bg-white/20 border-r border-white/20" onclick="toggleSlide(this)"><svg class="w-4 h-4 arrow-icon rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 5l7 7-7 7"/></svg></div>
             <div class="flex-1 h-full px-8 py-10 flex flex-col relative glass-panel-light overflow-hidden">
                <div class="absolute top-4 right-4 flex space-x-1"><button class="mini-btn" onclick="playTTS(this.closest('.flex-1'))">🔊</button><button class="mini-btn gold-btn" onclick="openStyleEditor(this.closest('.flex-1'))">🎨</button><button class="mini-btn" onclick="openTextEditor(this.closest('.flex-1'))">📝</button></div>
                <h4 class="text-lg font-serif mb-4 mt-6 text-target">[Title]</h4>
                <div class="flex-1 overflow-y-auto pr-2 custom-scroll"><p class="text-[13px] text-target opacity-80 collapsed-text">[Description]</p><button class="text-[9px] opacity-50 mt-2" onclick="toggleExpand(this)">MORE</button></div>
             </div>
          </div></div>`;
      document.getElementById('gallery-grid').insertAdjacentHTML('beforeend', html);
    }

    // ---------------- 🌟 사진 제어 ----------------
    let curId = null;
    function triggerFileUpload(id) { curId = id; document.getElementById('hidden-file-input').click(); }
    document.getElementById('hidden-file-input').onchange = (e) => {
      if (e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX = 1000; let w=img.width, h=img.height;
            if (w>h && w>MAX) { h*=MAX/w; w=MAX; } else if (h>w && h>MAX) { w*=MAX/h; h=MAX; }
            canvas.width=w; canvas.height=h;
            canvas.getContext('2d').drawImage(img,0,0,w,h);
            const data = canvas.toDataURL('image/webp', 0.8);
            if (curId === 'global-bg') {
              document.body.style.backgroundImage = `url('${data}')`; 
              document.body.style.backgroundSize='cover'; document.body.style.backgroundAttachment='fixed';
              document.getElementById('global-bg').src=data; document.getElementById('global-bg').style.display='block';
            } else document.getElementById(curId).src = data;
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
      }
    };
    function removeBackground() { document.body.style.backgroundImage = 'none'; document.getElementById('global-bg').style.display='none'; }

    // ---------------- 🌟 편집기 로직 ----------------
    let editTargs = [];
    const textModal = document.getElementById('text-editor-modal');
    function openTextEditor(el) {
      editTargs = el.classList.contains('text-target') ? [el] : Array.from(el.querySelectorAll('.text-target'));
      document.getElementById('modal-textarea').value = editTargs.map(t => t.innerText).join('\n');
      textModal.classList.replace('hidden', 'flex');
    }
    function closeTextEditor() { textModal.classList.replace('flex', 'hidden'); }
    function saveTextChanges() {
      const lines = document.getElementById('modal-textarea').value.split('\n');
      editTargs.forEach((t, i) => t.innerText = lines[i] || "");
      closeTextEditor();
    }
    function deleteElement(el) { if(confirm('Delete this?')) el.remove(); }

    const styleModal = document.getElementById('style-editor-modal');
    const styleSheet = document.getElementById('style-bottom-sheet');
    let styleTargs = [];
    function openStyleEditor(el) {
      styleTargs = el.classList.contains('text-target') ? [el] : el.querySelectorAll('.text-target');
      styleModal.classList.replace('hidden', 'flex'); setTimeout(()=>styleSheet.classList.add('open'), 10);
    }
    function closeStyleEditor() { styleSheet.classList.remove('open'); setTimeout(()=>styleModal.classList.replace('flex', 'hidden'), 300); }
    document.getElementById('val-color').oninput=(e)=>styleTargs.forEach(t=>t.style.setProperty('color', e.target.value, 'important'));
    document.getElementById('val-font').onchange=(e)=>styleTargs.forEach(t=>t.style.fontFamily=e.target.value);
    document.getElementById('val-size').oninput=(e)=>{styleTargs.forEach(t=>t.style.fontSize=e.target.value+'px'); document.getElementById('label-size').innerText=e.target.value+'px';};
    document.getElementById('val-line').oninput=(e)=>{styleTargs.forEach(t=>t.style.lineHeight=e.target.value); document.getElementById('label-line').innerText=e.target.value;};

    // ---------------- 🌟 고정 저장 로직 (업그레이드) ----------------
    function saveToBrowser() {
      try {
        const gridHtml = document.getElementById('gallery-grid').innerHTML;
        localStorage.setItem('gallery_grid_layout_v3', gridHtml);
        const textMap={}; const styleMap={};
        document.querySelectorAll('.text-target').forEach((el, i) => { textMap[i]=el.innerHTML; styleMap[i]=el.getAttribute('style')||''; });
        localStorage.setItem('gallery_texts_v3', JSON.stringify(textMap));
        localStorage.setItem('gallery_styles_v3', JSON.stringify(styleMap));
        const imgMap={}; document.querySelectorAll('img').forEach(img => { if(img.id && img.src.startsWith('data:image')) imgMap[img.id]=img.src; });
        localStorage.setItem('gallery_images_v3', JSON.stringify(imgMap));
        localStorage.setItem('gallery_bg_v3', document.getElementById('global-bg').src);
        alert("✅ SAVED SUCCESSFULLY.");
      } catch(e) { alert("MEMORY FULL. PLEASE USE SMALLER IMAGES."); }
    }

    function loadFromBrowser() {
      const layout = localStorage.getItem('gallery_grid_layout_v3');
      if (layout) document.getElementById('gallery-grid').innerHTML = layout;
      const texts = JSON.parse(localStorage.getItem('gallery_texts_v3'));
      const styles = JSON.parse(localStorage.getItem('gallery_styles_v3'));
      if (texts) document.querySelectorAll('.text-target').forEach((el, i) => { if(texts[i]) el.innerHTML=texts[i]; if(styles[i]) el.setAttribute('style', styles[i]); });
      const imgs = JSON.parse(localStorage.getItem('gallery_images_v3'));
      if (imgs) Object.keys(imgs).forEach(id => { const img=document.getElementById(id); if(img) img.src=imgs[id]; });
      const bg = localStorage.getItem('gallery_bg_v3');
      if (bg && bg.startsWith('data:image')) {
        document.body.style.backgroundImage = `url('${bg}')`; document.body.style.backgroundSize='cover'; document.body.style.backgroundAttachment='fixed';
        document.getElementById('global-bg').src=bg; document.getElementById('global-bg').style.display='block';
      }
      if(document.getElementById("draggable-desc")) makeDraggable(document.getElementById("draggable-desc"));
    }

    window.onload = loadFromBrowser;
  </script>
</body>
</html>
