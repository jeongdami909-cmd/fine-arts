<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Gallery</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }

    /* 전체 배경 영역 */
    .main-background {
      width: 100%;
      min-height: 100vh;
      background-color: #fdfdfd; /* 사진이 없을 때 기본 미색 */
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* 화면 우측 상단: 배경 사진 넣는 버튼 */
    .bg-upload-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid #888;
      color: #333;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
    }

    /* 상단 게시하기 영역 */
    header {
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header span {
      font-weight: bold;
      color: #333;
    }

    /* 게시판 설명창: 다이어리 불투명 달력 느낌 (옅은 회색 유리) */
    .glass-board {
      background: rgba(211, 211, 211, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      flex-grow: 1;
    }

    .item p {
      margin-top: 0;
      color: #333;
    }

    /* 작고 은은한 버튼들 */
    .small-btn, .mini-btn {
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid #888;
      color: #333;
      cursor: pointer;
      border-radius: 4px;
    }
    .post-btn { font-size: 12px; padding: 4px 8px; }
    .mini-btn { font-size: 11px; padding: 2px 6px; margin-right: 5px; }

    /* 하단 (트위터 및 구글 검색창) */
    footer {
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .sns-link a {
      text-decoration: none;
      color: #555;
      font-size: 12px;
    }

    /* 필기체 구글 검색창 */
    .cursive-font {
      font-family: 'Cursive', cursive, sans-serif;
      background: transparent;
      border: none;
      border-bottom: 1px solid #888;
      font-size: 14px;
      color: #333;
      width: 150px;
      text-align: center;
      padding-bottom: 2px;
    }
    .cursive-font:focus {
      outline: none;
    }
  </style>
</head>
<body>

  <input type="file" id="bg-file-input" style="display: none;" accept="image/*">

  <div class="main-background" id="main-bg">
    
    <button class="bg-upload-btn" onclick="document.getElementById('bg-file-input').click()">배경 사진 넣기</button>
    
    <header>
      <span>게시하기</span>
      <button class="small-btn post-btn">게시</button>
    </header>

    <main>
      <section class="glass-board">
        <div class="item">
          <p>게시물 내용이 여기에 들어갑니다. 불투명한 회색 유리 느낌의 배경입니다.</p>
          <div class="edit-delete-group">
            <button class="mini-btn">수정</button>
            <button class="mini-btn">삭제</button>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="sns-link">
        <a href="https://twitter.com" target="_blank">Twitter</a>
      </div>
      <div class="google-search">
        <input type="text" placeholder="Google Search..." class="cursive-font">
      </div>
    </footer>
  </div>

  <script>
    // '배경 사진 넣기' 버튼을 누르면 기기의 사진을 불러와 배경으로 깔아주는 기능
    document.getElementById('bg-file-input').addEventListener('change', function(e) {
      if (e.target.files && e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = function(event) {
          document.getElementById('main-bg').style.backgroundImage = `url('${event.target.result}')`;
        }
        reader.readAsDataURL(e.target.files[0]);
      }
    });
  </script>

</body>
</html>
