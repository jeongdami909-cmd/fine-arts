<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Lacey Fine Art | Gallery</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400;700&family=Whisper&display=swap" rel="stylesheet"/>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            galleryGold: '#cfa752',
            galleryTeal: '#d0e4e0', 
          },
          fontFamily: {
            serif: ['"Noto Serif KR"', 'serif'],
            sans: ['"Gowun Dodum"', 'sans-serif'],
            diary: ['"Whisper"', 'cursive'],
          },
        }
      }
    }
  </script>
  
  <style data-purpose="custom-styles">
    body {
      font-family: 'Noto Serif KR', serif;
      -webkit-font-smoothing: antialiased;
      background-color: #d0e4e0; 
      transition: background-image 0.5s ease-in-out;
      overflow-x: hidden;
    }

    /* 소개글 필기체 */
    .intro-handwriting {
      font-family: 'Whisper', cursive; 
      color: #FF6347; 
      font-size: 1.8rem; 
      font-weight: 500;
      letter-spacing: 0.05em;
      text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.7); 
      line-height: 1.2;
    }

    .intro-desc {
      color: rgba(255, 250, 240, 1);
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3), 0 0 6px rgba(255, 255, 255, 0.4);
      font-weight: 400;
    }

    .text-target {
      transition: all 0.2s ease;
      word-break: break-all;
    }

    /* 유리 패널 스타일 */
    .glass-panel {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    .glass-panel-light {
      background: rgba(240, 240, 240, 0.85);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-left: 1px solid rgba(230, 230, 230, 0.9);
    }

    .slide-panel { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .arrow-icon { transition: transform 0.6s ease; }
    .slide-hide { transform: translateX(calc(100% - 3.5rem)); }

    /* 버튼 스타일 */
    .water-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.35rem 0.75rem; color: #3b6b6d;
      background-color: rgba(255, 255, 255, 0.8); border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 20px; font-size: 0.75rem; font-weight: 700; cursor: pointer;
    }
    
    .ghost-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.4rem 1rem; color: rgba(80, 90, 90, 0.8);
      background-color: rgba(255, 255, 255, 0.3); border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 20px; font-size: 0.75rem; font-weight: 600; cursor: pointer; backdrop-filter: blur(4px);
    }

    /* TTS 컨트롤바 */
    .tts-bar {
      background: rgba(255, 255, 255, 0.4);
      border-radius: 12px;
      padding: 4px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .bottom-sheet {
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .bottom-sheet.open { transform: translateY(0); }

    .draggable { cursor: grab; }
    .draggable:active { cursor: grabbing; }
    .diary-modal-bg { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
    
    /* 무제한 스크롤 영역 */
    .infinite-scroll {
      max-height: 250px;
      overflow-y: auto;
      padding-right: 8px;
    }
    .infinite-scroll::-webkit-scrollbar { width: 4px; }
    .infinite-scroll::-webkit-scrollbar-thumb { background: #cfa752; border-radius: 10px; }
  </style>
</head>
<body class="text-[#1a4142]">

  <input type="file" id="hidden-file-input" style="display: none;" accept="image/*">

  <div class="fixed inset-0 z-[-1] pointer-events-none">
    <img id="global-bg" src="" alt="" class="w-full h-full object-cover opacity-90 transition-opacity duration-1000" style="display:none;" />
  </div>

  <div class="fixed top-[90px] right-4 md:right-8 z-[9999] flex flex-col space-y-2">
    <button class="ghost-btn shadow-sm" onclick="triggerFileUpload('global-bg')">배경 사진 넣기</button>
    <button class="ghost-btn shadow-sm" onclick="removeBackground()">배경 삭제</button>
    <button class="ghost-btn shadow-md border-galleryGold text-galleryGold bg-white/60 font-bold" onclick="saveToBrowser()">
      ✅ 사이트에 고정 (저장)
    </button>
  </div>

  <header class="sticky top-0 z-40 py-6 px-8 flex justify-between items-start bg-[#d0e4e0]/60 backdrop-blur-md border-b border-white/20">
    <div class="flex flex-col items-start relative group logo-container">
      <div class="absolute -top-4 right-0 opacity-0 group-hover:opacity-100 transition-opacity z-10 flex space-x-1">
        <button class="water-btn !text-[10px] !px-2 !py-1" onclick="openTextEditor(this.closest('.logo-container'))">수정</button>
        <button class="water-btn !text-[10px] !px-2 !py-1 !bg-galleryGold !text-white" onclick="openStyleEditor(this.closest('.logo-container'))">스타일</button>
      </div>
      <h1 class="text-xs tracking-widest font-bold text-[#1a4142] text-target" id="header-title">LACEY FINE ART</h1>
    </div>
    
    <button id="menu-toggle" class="water-btn !bg-white/40 !text-[#1a4142]">
      <span class="text-xs font-bold tracking-widest">MENU</span>
    </button>
  </header>

  <main class="px-4 md:px-8 max-w-6xl mx-auto pt-16">
    <section class="py-12">
      <div class="glass-panel rounded-3xl p-8 relative flex flex-col items-center text-center draggable mx-auto max-w-xl shadow-lg bg-white/20" id="draggable-desc">
        <div class="absolute top-4 right-4 flex space-x-1 z-30">
          <button class="water-btn !bg-galleryGold !text-white" onclick="openStyleEditor(this.closest('#draggable-desc'))">스타일</button>
          <button class="water-btn" onclick="openTextEditor(this.closest('#draggable-desc'))">수정</button>
        </div>
        
        <p class="mb-2 intro-handwriting text-target">[라벨]</p>
        <h2 class="mb-4 intro-handwriting text-target" style="font-size: 2.2rem;">[타이틀]</h2>
        <div class="infinite-scroll w-full">
            <p class="text-sm leading-relaxed text-target intro-desc" id="tts-intro">
              [긴 글을 입력해도 스크롤이 생겨 무제한으로 노출됩니다.]
            </p>
        </div>
        <div class="tts-bar">
          <button onclick="speakText('tts-intro')" class="text-xs font-bold">▶ 읽기</button>
          <button onclick="stopSpeak()" class="text-xs font-bold">■ 정지</button>
          <input type="range" class="tts-rate w-16 accent-galleryGold" min="0.5" max="2" step="0.1" value="1" onchange="updateRate(this)">
          <span class="text-[10px] text-gray-500">Speed</span>
        </div>
      </div>
    </section>

    <section class="pb-20">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        
        <div class="relative w-full h-[450px] overflow-hidden rounded-2xl shadow-xl bg-white gallery-item">
          <img id="art-img-1" src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=600" alt="Art 1" class="absolute inset-0 w-full h-full object-cover">
          <div class="absolute top-4 left-4 z-0 flex space-x-2">
             <button class="ghost-btn !text-[10px]" onclick="triggerFileUpload('art-img-1')">사진</button>
          </div>
          <div class="slide-panel absolute inset-0 w-full h-full flex z-10">
             <div class="w-14 h-full flex flex-col justify-center items-center cursor-pointer bg-white/40 backdrop-blur-md border-r border-white/60 hover:bg-white/60" onclick="toggleSlide(this)">
                <svg class="w-6 h-6 text-[#1a4142] arrow-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
             </div>
             <div class="flex-1 h-full px-6 py-8 flex flex-col relative glass-panel-light text-content">
                <div class="absolute top-4 right-4 flex space-x-1 z-20">
                  <button class="water-btn !text-[10px] !bg-galleryGold !text-white" onclick="openStyleEditor(this.closest('.text-content'))">스타일</button>
                  <button class="water-btn !text-[10px]" onclick="openTextEditor(this.closest('.text-content'))">수정</button>
                </div>
                <h4 class="text-xl font-serif mb-3 mt-6 text-[#1a4142] text-target">[작품 제목]</h4>
                <div class="infinite-scroll flex-grow">
                  <p id="tts-art-1" class="text-sm leading-relaxed text-[#555] text-target">
                    [이곳에 아주 긴 글을 넣으세요. 스타일 뷰어에서 색상을 바꾸면 즉시 반영됩니다.]
                  </p>
                </div>
                <div class="tts-bar">
                  <button onclick="speakText('tts-art-1')" class="text-xs font-bold">▶</button>
                  <button onclick="stopSpeak()" class="text-xs font-bold">■</button>
                  <input type="range" class="tts-rate w-12 accent-galleryGold" min="0.5" max="2" step="0.1" value="1" onchange="updateRate(this)">
                </div>
             </div>
          </div>
        </div>

      </div>
    </section>
  </main>

  <div id="text-editor-modal" class="fixed inset-0 z-[10000] hidden items-center justify-center diary-modal-bg">
    <div class="bg-white w-[90%] max-w-md p-6 rounded-2xl shadow-2xl">
      <textarea id="modal-textarea" class="w-full h-48 p-4 border rounded-xl focus:ring-2 focus:ring-[#d0e4e0] font-serif"></textarea>
      <div class="flex justify-end space-x-3 mt-4">
        <button class="px-5 py-2 bg-gray-200 rounded-full font-bold text-sm" onclick="closeTextEditor()">취소</button>
        <button class="px-5 py-2 bg-[#8ac6b8] text-white rounded-full font-bold text-sm" onclick="saveTextChanges()">확인</button>
      </div>
    </div>
  </div>

  <div id="style-editor-modal" class="fixed inset-0 z-[10000] hidden items-end md:items-center justify-center diary-modal-bg">
    <div id="style-bottom-sheet" class="bottom-sheet bg-white w-full md:w-[90%] md:max-w-md p-6 rounded-t-3xl md:rounded-2xl">
      <div class="flex justify-between items-center mb-6">
        <h3 class="font-bold text-[#1a4142] font-serif">🎨 뷰어 설정</h3>
        <button onclick="closeStyleEditor()">✕</button>
      </div>
      
      <div class="space-y-5">
        <div class="flex justify-between items-center">
          <label class="text-sm font-bold">글자색</label>
          <input type="color" id="val-color" class="w-12 h-8 cursor-pointer" oninput="applyRealtimeStyle()">
        </div>
        <div>
          <label class="text-sm font-bold">폰트</label>
          <select id="val-font" class="w-full border-gray-300 rounded-lg p-2" onchange="applyRealtimeStyle()">
            <option value="'Noto Serif KR', serif">기본 명조</option>
            <option value="'Gowun Dodum', sans-serif">깔끔 돋움</option>
            <option value="'Whisper', cursive">감성 필기</option>
          </select>
        </div>
        <div>
          <div class="flex justify-between"><label class="text-sm font-bold">크기</label><span id="label-size" class="text-xs">16px</span></div>
          <input type="range" id="val-size" min="12" max="50" value="16" class="w-full accent-galleryGold" oninput="applyRealtimeStyle()">
        </div>
      </div>
      <button class="mt-6 px-5 py-3 bg-galleryGold text-white rounded-xl font-bold w-full" onclick="closeStyleEditor()">완료</button>
    </div>
  </div>

  <script>
    // ---------------- TTS 기능 ----------------
    let currentRate = 1;
    function updateRate(el) { currentRate = el.value; }
    
    function speakText(elementId) {
      window.speechSynthesis.cancel();
      const text = document.getElementById(elementId).innerText;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'ko-KR';
      utterance.rate = currentRate;
      window.speechSynthesis.speak(utterance);
    }
    
    function stopSpeak() { window.speechSynthesis.cancel(); }

    // ---------------- 스타일 실시간 적용 (버그 수정) ----------------
    let styleTargets = [];
    function openStyleEditor(container) {
      styleTargets = container.classList.contains('text-target') ? [container] : container.querySelectorAll('.text-target');
      styleModal.classList.remove('hidden'); styleModal.classList.add('flex');
      setTimeout(() => document.getElementById('style-bottom-sheet').classList.add('open'), 10);
    }

    function applyRealtimeStyle() {
      const color = document.getElementById('val-color').value;
      const font = document.getElementById('val-font').value;
      const size = document.getElementById('val-size').value;
      
      styleTargets.forEach(el => {
        el.style.color = color;
        el.style.fontFamily = font;
        el.style.fontSize = size + 'px';
      });
      document.getElementById('label-size').innerText = size + 'px';
    }

    function closeStyleEditor() {
      document.getElementById('style-bottom-sheet').classList.remove('open');
      setTimeout(() => styleModal.classList.add('hidden'), 300);
    }

    // ---------------- 기존 유틸리티 ----------------
    function toggleSlide(h) {
      h.closest('.slide-panel').classList.toggle('slide-hide');
      h.querySelector('.arrow-icon').classList.toggle('rotate-180');
    }

    function makeDraggable(el) {
      let p1 = 0, p2 = 0, p3 = 0, p4 = 0;
      el.onmousedown = (e) => {
        if(e.target.closest('button') || e.target.closest('.infinite-scroll')) return;
        p3 = e.clientX; p4 = e.clientY;
        document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
        document.onmousemove = (e) => {
          p1 = p3 - e.clientX; p2 = p4 - e.clientY; p3 = e.clientX; p4 = e.clientY;
          el.style.top = (el.offsetTop - p2) + "px"; el.style.left = (el.offsetLeft - p1) + "px";
        };
      };
    }

    // 사진 업로드 및 저장 로직 (이전과 동일하게 유지)
    let currentImgId = null;
    function triggerFileUpload(id) { currentImgId = id; document.getElementById('hidden-file-input').click(); }
    document.getElementById('hidden-file-input').addEventListener('change', function(e) {
      if (e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            if(currentImgId === 'global-bg') {
                document.body.style.backgroundImage = `url(${ev.target.result})`;
                document.body.style.backgroundSize = 'cover';
                document.getElementById('global-bg').src = ev.target.result;
                document.getElementById('global-bg').style.display = 'block';
            } else { document.getElementById(currentImgId).src = ev.target.result; }
        };
        reader.readAsDataURL(e.target.files[0]);
      }
    });

    const textModal = document.getElementById('text-editor-modal');
    const modalTextarea = document.getElementById('modal-textarea');
    let currentTextTargets = [];

    function openTextEditor(container) {
      currentTextTargets = container.classList.contains('text-target') ? [container] : container.querySelectorAll('.text-target');
      modalTextarea.value = currentTextTargets[0].innerText;
      textModal.classList.remove('hidden'); textModal.classList.add('flex');
    }

    function saveTextChanges() {
      currentTextTargets[0].innerText = modalTextarea.value;
      textModal.classList.add('hidden');
    }

    function saveToBrowser() {
      const texts = {}; document.querySelectorAll('.text-target').forEach((el, i) => texts[i] = {t: el.innerHTML, s: el.getAttribute('style')});
      localStorage.setItem('gallery_data', JSON.stringify(texts));
      alert("기기에 저장되었습니다.");
    }

    window.onload = () => {
      const saved = JSON.parse(localStorage.getItem('gallery_data'));
      if(saved) document.querySelectorAll('.text-target').forEach((el, i) => {
        if(saved[i]) { el.innerHTML = saved[i].t; el.setAttribute('style', saved[i].s); }
      });
      makeDraggable(document.getElementById('draggable-desc'));
    };
  </script>
</body>
</html>
