<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Gallery</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }

    /* 전체 배경 영역 */
    .main-background {
      width: 100%;
      min-height: 100vh;
      background-color: #fdfdfd; 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* 우측 상단 버튼 그룹 */
    .top-btn-group {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
    }

    .action-btn {
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid #888;
      color: #333;
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }
    .action-btn:hover {
      background: rgba(255, 255, 255, 1);
    }

    /* 상단 게시하기 영역 */
    header {
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header span {
      font-weight: bold;
      color: #333;
    }

    /* 게시판 설명창: 불투명 회색 유리 느낌 */
    .glass-board {
      background: rgba(211, 211, 211, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      flex-grow: 1;
    }

    /* 수정 가능한 텍스트 영역 */
    .editable-text {
      margin-top: 0;
      color: #333;
      outline: none; /* 클릭 시 테두리 안 생기게 */
      line-height: 1.6;
      min-height: 50px;
    }

    /* 작고 은은한 버튼들 */
    .small-btn, .mini-btn {
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid #888;
      color: #333;
      cursor: pointer;
      border-radius: 4px;
    }
    .post-btn { font-size: 12px; padding: 4px 8px; }
    .mini-btn { font-size: 11px; padding: 2px 6px; margin-right: 5px; }

    /* 하단 영역 */
    footer {
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .sns-link a {
      text-decoration: none;
      color: #555;
      font-size: 12px;
    }

    .cursive-font {
      font-family: 'Cursive', cursive, sans-serif;
      background: transparent;
      border: none;
      border-bottom: 1px solid #888;
      font-size: 14px;
      color: #333;
      width: 150px;
      text-align: center;
      padding-bottom: 2px;
    }
    .cursive-font:focus { outline: none; }
  </style>
</head>
<body>

  <input type="file" id="bg-file-input" style="display: none;" accept="image/*">

  <div class="main-background" id="main-bg">
    
    <div class="top-btn-group">
      <button class="action-btn" onclick="saveData()">💾 저장하기</button>
      <button class="action-btn" onclick="document.getElementById('bg-file-input').click()">배경 사진 넣기</button>
    </div>
    
    <header>
      <span>게시하기</span>
      <button class="small-btn post-btn">게시</button>
    </header>

    <main>
      <section class="glass-board">
        <div class="item">
          <p id="board-text" class="editable-text" contenteditable="true">
            여기를 클릭해서 내용을 자유롭게 수정해 보세요. 불투명한 회색 유리 느낌의 배경입니다.
          </p>
          <div class="edit-delete-group" style="margin-top: 15px;">
            <button class="mini-btn">수정</button>
            <button class="mini-btn">삭제</button>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="sns-link">
        <a href="https://twitter.com" target="_blank">Twitter</a>
      </div>
      <div class="google-search">
        <input type="text" placeholder="Google Search..." class="cursive-font">
      </div>
    </footer>
  </div>

  <script>
    // 1. 페이지가 열릴 때: 저장된 사진과 글이 있으면 불러오기
    window.onload = function() {
      const savedBg = localStorage.getItem('myGalleryBg');
      if (savedBg) {
        document.getElementById('main-bg').style.backgroundImage = `url('${savedBg}')`;
      }
      
      const savedText = localStorage.getItem('myGalleryText');
      if (savedText) {
        document.getElementById('board-text').innerHTML = savedText;
      }
    };

    // 2. 배경 사진 넣기 (임시 적용)
    document.getElementById('bg-file-input').addEventListener('change', function(e) {
      if (e.target.files && e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = function(event) {
          const base64Image = event.target.result;
          document.getElementById('main-bg').style.backgroundImage = `url('${base64Image}')`;
          // 사진을 선택하자마자 자동으로 기억공간에 저장
          localStorage.setItem('myGalleryBg', base64Image);
        }
        reader.readAsDataURL(e.target.files[0]);
      }
      // 같은 사진을 다시 고를 수 있게 파일 입력창 초기화
      this.value = '';
    });

    // 3. 💾 저장하기 버튼 기능 (글씨 저장)
    function saveData() {
      const currentText = document.getElementById('board-text').innerHTML;
      localStorage.setItem('myGalleryText', currentText);
      alert('저장되었습니다! (새로고침을 해도 유지됩니다)');
    }
  </script>

</body>
</html>
