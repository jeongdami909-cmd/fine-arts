<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Lacey Fine Art | Gallery</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400;700&family=Whisper&display=swap" rel="stylesheet"/>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            galleryGold: '#cfa752',
            galleryTeal: '#d0e4e0', 
          },
          fontFamily: {
            serif: ['"Noto Serif KR"', 'serif'],
            sans: ['"Gowun Dodum"', 'sans-serif'],
            diary: ['"Whisper"', 'cursive'],
          },
        }
      }
    }
  </script>
  
  <style data-purpose="custom-styles">
    body {
      font-family: 'Noto Serif KR', serif;
      -webkit-font-smoothing: antialiased;
      background-color: #d0e4e0; 
      transition: background-image 0.5s ease-in-out;
      overflow-x: hidden;
    }

    .intro-handwriting {
      font-family: 'Whisper', cursive; 
      color: #FF6347; 
      font-size: 1.8rem; 
      font-weight: 500;
      letter-spacing: 0.05em;
      text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.7); 
      line-height: 1.2;
    }

    .intro-desc {
      color: rgba(255, 250, 240, 1); 
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3), 0 0 6px rgba(255, 255, 255, 0.4); 
      font-weight: 400;
    }

    .text-target {
      color: rgba(245, 245, 245, 0.95); 
      font-weight: 300; 
      text-shadow: 0 0 2px rgba(212, 175, 55, 0.4), 1px 1px 1px rgba(0, 0, 0, 0.1);
      letter-spacing: 0.05em;
      transition: all 0.2s ease;
      word-break: break-all;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
    }
    .glass-panel-light {
      background: rgba(240, 240, 240, 0.85);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-left: 1px solid rgba(230, 230, 230, 0.9);
    }

    .slide-panel { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .arrow-icon { transition: transform 0.6s ease; }
    .slide-hide { transform: translateX(calc(100% - 3.5rem)); }

    /* 🌟 게시판 펼치기 애니메이션 */
    .gallery-item {
      transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      height: 400px; /* 기본 높이 */
    }
    .gallery-item.expanded {
      height: 800px; /* 펼쳐졌을 때 높이 (무한으로 하고 싶으면 JS로 조절) */
    }

    .water-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.35rem 0.75rem; color: #3b6b6d;
      background-color: rgba(255, 255, 255, 0.8); border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 20px; font-size: 0.75rem; font-weight: 700; cursor: pointer;
    }
    
    .ghost-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.4rem 1rem; color: rgba(80, 90, 90, 0.8);
      background-color: rgba(255, 255, 255, 0.3); border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 20px; font-size: 0.75rem; font-weight: 600; cursor: pointer; backdrop-filter: blur(4px);
    }

    /* TTS 바 디자인 */
    .tts-controls {
      display: flex; align-items: center; gap: 8px; margin-top: auto;
      background: rgba(255, 255, 255, 0.4); padding: 5px 12px; border-radius: 15px;
    }

    .bottom-sheet {
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .bottom-sheet.open { transform: translateY(0); }

    .draggable { cursor: grab; }
    .draggable:active { cursor: grabbing; }
    .diary-modal-bg { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
  </style>
</head>
<body class="text-[#1a4142]">

  <input type="file" id="hidden-file-input" style="display: none;" accept="image/*">

  <div class="fixed inset-0 z-[-1] pointer-events-none">
    <img id="global-bg" src="" alt="" class="w-full h-full object-cover opacity-90 transition-opacity duration-1000" style="display:none;" />
  </div>

  <div class="fixed top-[90px] right-4 md:right-8 z-[9999] flex flex-col space-y-2">
    <button class="ghost-btn shadow-sm" onclick="triggerFileUpload('global-bg')">배경 사진 넣기</button>
    <button class="ghost-btn shadow-md border-galleryGold text-galleryGold bg-white/70 font-bold" onclick="saveToBrowser()">
      ✅ 전체 고정 (확인)
    </button>
  </div>

  <header class="sticky top-0 z-40 py-6 px-8 flex justify-between items-start bg-[#d0e4e0]/60 backdrop-blur-md border-b border-white/20 shadow-sm">
    <div class="flex flex-col items-start relative group logo-container">
      <div class="absolute -top-4 right-0 opacity-0 group-hover:opacity-100 transition-opacity z-10 flex space-x-1">
        <button class="water-btn !text-[10px] !px-2 !py-1" onclick="openTextEditor(this.closest('.logo-container'))">수정</button>
        <button class="water-btn !text-[10px] !px-2 !py-1 !bg-galleryGold !text-white" onclick="openStyleEditor(this.closest('.logo-container'))">스타일</button>
      </div>
      <div class="mb-1">
        <svg width="30" height="30" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M25 45C36.0457 45 45 36.0457 45 25C45 13.9543 36.0457 5 25 5C13.9543 5 5 13.9543 5 25C5 36.0457 13.9543 45 25 45Z" stroke="#cfa752" stroke-width="2"/>
          <path d="M15 25H35" stroke="#cfa752" stroke-width="2"/>
          <path d="M25 15V35" stroke="#cfa752" stroke-width="2"/>
        </svg>
      </div>
      <h1 class="text-xs tracking-widest font-bold text-[#1a4142] drop-shadow-sm text-target" id="header-title">LACEY FINE ART</h1>
    </div>
    
    <div class="relative">
      <button id="menu-toggle" class="flex items-center space-x-2 water-btn !bg-white/40 !text-[#1a4142] hover:!bg-white/70">
        <span class="text-xs font-bold tracking-widest">MENU</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
      </button>
      </div>
  </header>

  <main class="px-4 md:px-8 max-w-6xl mx-auto pt-16">
    <section class="py-12">
      <div class="glass-panel rounded-3xl p-8 relative flex flex-col items-center text-center draggable mx-auto max-w-xl shadow-lg border-white/40 bg-white/20" id="draggable-desc">
        <div class="absolute top-4 right-4 flex space-x-1 z-30">
          <button class="water-btn !bg-galleryGold !text-white" onclick="openStyleEditor(this.closest('#draggable-desc'))">스타일</button>
          <button class="water-btn" onclick="openTextEditor(this.closest('#draggable-desc'))">수정</button>
        </div>
        <p class="mb-2 intro-handwriting text-target">[라벨 입력]</p>
        <h2 class="mb-4 intro-handwriting text-target" style="font-size: 2.2rem;">[소개글 타이틀 입력]</h2>
        <div class="w-12 h-1 bg-[#cfa752] mb-6 rounded-full opacity-80"></div>
        <p class="text-sm leading-relaxed max-w-md text-target intro-desc" id="intro-p">[상세 소개글]</p>
        
        <div class="tts-controls scale-75">
          <button onclick="speakText('intro-p')" class="text-[10px] font-bold">▶ 재생</button>
          <input type="range" min="0.5" max="2" step="0.1" value="1" class="w-16 accent-galleryGold" onchange="speechRate = this.value">
        </div>
      </div>
    </section>

    <section class="pb-20">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        
        <div class="relative w-full overflow-hidden rounded-2xl shadow-xl bg-white gallery-item" id="item-1">
          <img id="art-img-1" src="5167.png" alt="Art 1" class="absolute inset-0 w-full h-full object-cover">
          <div class="absolute top-4 left-4 z-0 flex flex-col space-y-1">
             <button class="ghost-btn !text-[10px]" onclick="triggerFileUpload('art-img-1')">사진 교체</button>
             <button class="ghost-btn !text-[10px] !bg-white/80" onclick="toggleExpand('item-1')">📏 크기 조절</button>
          </div>

          <div class="slide-panel absolute inset-0 w-full h-full flex z-10">
             <div class="w-14 h-full flex flex-col justify-center items-center cursor-pointer bg-white/40 backdrop-blur-md border-r" onclick="toggleSlide(this)">
                <svg class="w-6 h-6 text-[#1a4142] arrow-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
             </div>
             <div class="flex-1 h-full px-6 py-8 flex flex-col relative glass-panel-light text-content">
                <div class="absolute top-4 right-4 flex space-x-1">
                  <button class="water-btn !text-[10px] !bg-galleryGold !text-white" onclick="openStyleEditor(this.closest('.text-content'))">스타일</button>
                  <button class="water-btn !text-[10px]" onclick="openTextEditor(this.closest('.text-content'))">글 수정</button>
                </div>
                <h4 class="text-2xl font-serif mb-3 mt-6 text-[#1a4142] text-target">[작품 1]</h4>
                <div class="overflow-y-auto flex-grow pr-2">
                  <p id="p-1" class="text-sm leading-relaxed font-medium text-[#555] text-target">
                    [글이 길어지면 '크기 조절' 버튼을 누르거나 내부 스크롤을 이용하세요.]
                  </p>
                </div>
                <div class="tts-controls">
                  <button onclick="speakText('p-1')" class="text-[10px] font-bold">▶ 읽기</button>
                  <input type="range" min="0.5" max="2" step="0.1" value="1" class="w-12 accent-galleryGold" onchange="speechRate = this.value">
                  <span class="text-[9px] text-gray-400">Speed</span>
                </div>
             </div>
          </div>
        </div>

        <div class="relative w-full overflow-hidden rounded-2xl shadow-xl bg-white gallery-item" id="item-2">
          <img id="art-img-2" src="5168.jpg" alt="Art 2" class="absolute inset-0 w-full h-full object-cover">
          <div class="absolute top-4 left-4 z-0 flex flex-col space-y-1">
             <button class="ghost-btn !text-[10px]" onclick="triggerFileUpload('art-img-2')">사진 교체</button>
             <button class="ghost-btn !text-[10px] !bg-white/80" onclick="toggleExpand('item-2')">📏 크기 조절</button>
          </div>
          <div class="slide-panel absolute inset-0 w-full h-full flex z-10">
             <div class="w-14 h-full flex flex-col justify-center items-center cursor-pointer bg-white/40 backdrop-blur-md border-r" onclick="toggleSlide(this)">
                <svg class="w-6 h-6 text-[#1a4142] arrow-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
             </div>
             <div class="flex-1 h-full px-6 py-8 flex flex-col relative glass-panel-light text-content">
                <div class="absolute top-4 right-4 flex space-x-1">
                  <button class="water-btn !text-[10px] !bg-galleryGold !text-white" onclick="openStyleEditor(this.closest('.text-content'))">스타일</button>
                  <button class="water-btn !text-[10px]" onclick="openTextEditor(this.closest('.text-content'))">글 수정</button>
                </div>
                <h4 class="text-2xl font-serif mb-3 mt-6 text-[#1a4142] text-target">[작품 2]</h4>
                <div class="overflow-y-auto flex-grow pr-2">
                  <p id="p-2" class="text-sm leading-relaxed font-medium text-[#555] text-target">[내용]</p>
                </div>
                <div class="tts-controls">
                  <button onclick="speakText('p-2')" class="text-[10px] font-bold">▶ 읽기</button>
                  <input type="range" min="0.5" max="2" step="0.1" value="1" class="w-12 accent-galleryGold" onchange="speechRate = this.value">
                </div>
             </div>
          </div>
        </div>

        <div class="relative w-full overflow-hidden rounded-2xl shadow-xl bg-white gallery-item" id="item-3">
          <img id="art-img-3" src="5170.jpg" alt="Art 3" class="absolute inset-0 w-full h-full object-cover">
          <div class="absolute top-4 left-4 z-0 flex flex-col space-y-1">
             <button class="ghost-btn !text-[10px]" onclick="triggerFileUpload('art-img-3')">사진 교체</button>
             <button class="ghost-btn !text-[10px] !bg-white/80" onclick="toggleExpand('item-3')">📏 크기 조절</button>
          </div>
          <div class="slide-panel absolute inset-0 w-full h-full flex z-10">
             <div class="w-14 h-full flex flex-col justify-center items-center cursor-pointer bg-white/40 backdrop-blur-md border-r" onclick="toggleSlide(this)">
                <svg class="w-6 h-6 text-[#1a4142] arrow-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
             </div>
             <div class="flex-1 h-full px-6 py-8 flex flex-col relative glass-panel-light text-content">
                <div class="absolute top-4 right-4 flex space-x-1">
                  <button class="water-btn !text-[10px] !bg-galleryGold !text-white" onclick="openStyleEditor(this.closest('.text-content'))">스타일</button>
                  <button class="water-btn !text-[10px]" onclick="openTextEditor(this.closest('.text-content'))">글 수정</button>
                </div>
                <h4 class="text-2xl font-serif mb-3 mt-6 text-[#1a4142] text-target">[작품 3]</h4>
                <div class="overflow-y-auto flex-grow pr-2">
                  <p id="p-3" class="text-sm leading-relaxed font-medium text-[#555] text-target">[내용]</p>
                </div>
                <div class="tts-controls">
                  <button onclick="speakText('p-3')" class="text-[10px] font-bold">▶ 읽기</button>
                  <input type="range" min="0.5" max="2" step="0.1" value="1" class="w-12 accent-galleryGold" onchange="speechRate = this.value">
                </div>
             </div>
          </div>
        </div>

      </div>
    </section>
  </main>

  <script>
    // ---------------- 🌟 기능 추가 로직 ----------------
    let speechRate = 1;
    function speakText(elId) {
      window.speechSynthesis.cancel();
      const text = document.getElementById(elId).innerText;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'ko-KR';
      utterance.rate = speechRate;
      window.speechSynthesis.speak(utterance);
    }

    function toggleExpand(id) {
      const item = document.getElementById(id);
      item.classList.toggle('expanded');
      if (item.classList.contains('expanded')) {
          item.style.height = item.scrollHeight + "px"; // 내용에 맞춰 무한 확장
      } else {
          item.style.height = "400px"; // 다시 축소
      }
    }

    // ---------------- 🌟 스타일 버그 수정 ----------------
    // 색상 선택 시 실시간으로 적용되게 수정함
    const colorPicker = document.getElementById('val-color');
    colorPicker.addEventListener('input', (e) => {
        if(styleTargets.length > 0) {
            styleTargets.forEach(t => t.style.color = e.target.value);
        }
    });

    // 기존 슬라이드, 메뉴, 드래그 로직 (생략 - 네 코드 유지)
    function toggleSlide(handle) {
      const panel = handle.closest('.slide-panel');
      panel.classList.toggle('slide-hide'); 
      handle.querySelector('.arrow-icon').classList.toggle('rotate-180'); 
    }
    // ... 이하 기존 스크립트 모두 포함 (saveToBrowser, loadFromBrowser 등)
  </script>

  </body>
</html>
