<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Lacey Fine Art | Gallery</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400;700&family=Whisper&display=swap" rel="stylesheet"/>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { galleryGold: '#cfa752', galleryTeal: '#d0e4e0' },
          fontFamily: {
            serif: ['"Noto Serif KR"', 'serif'],
            sans: ['"Gowun Dodum"', 'sans-serif'],
            diary: ['"Whisper"', 'cursive'],
          },
        }
      }
    }
  </script>
  
  <style data-purpose="custom-styles">
    body {
      font-family: 'Noto Serif KR', serif;
      -webkit-font-smoothing: antialiased;
      background-color: #d0e4e0; 
      transition: background-image 0.5s ease-in-out;
      overflow-x: hidden;
    }
    .intro-handwriting { font-family: 'Whisper', cursive; color: #FF6347; font-size: 1.8rem; font-weight: 500; letter-spacing: 0.05em; text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.7); line-height: 1.2; }
    .intro-desc { color: rgba(255, 250, 240, 1); text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3), 0 0 6px rgba(255, 255, 255, 0.4); font-weight: 400; }
    .text-target { color: rgba(245, 245, 245, 0.95); font-weight: 300; text-shadow: 0 0 2px rgba(212, 175, 55, 0.4), 1px 1px 1px rgba(0, 0, 0, 0.1); letter-spacing: 0.05em; transition: all 0.2s ease; }
    .glass-panel { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.08); }
    .glass-panel-light { background: rgba(240, 240, 240, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-left: 1px solid rgba(230, 230, 230, 0.9); }
    .cursive-search { font-family: 'Whisper', cursive; background: transparent; border: none; border-bottom: 1px solid rgba(26, 65, 66, 0.3); color: rgba(26, 65, 66, 0.7); transition: border-bottom 0.3s ease; }
    .cursive-search:focus { outline: none; border-bottom: 1px solid #cfa752; }
    .slide-panel { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .arrow-icon { transition: transform 0.6s ease; }
    .slide-hide { transform: translateX(calc(100% - 3.5rem)); }
    .water-btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.35rem 0.75rem; color: #3b6b6d; background-color: rgba(255, 255, 255, 0.8); border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 20px; font-size: 0.75rem; font-weight: 700; cursor: pointer; }
    .ghost-btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.4rem 1rem; color: rgba(80, 90, 90, 0.8); background-color: rgba(255, 255, 255, 0.3); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 20px; font-size: 0.75rem; font-weight: 600; cursor: pointer; backdrop-filter: blur(4px); }
    .bottom-sheet { transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .bottom-sheet.open { transform: translateY(0); }
    .draggable { cursor: grab; }
    .diary-modal-bg { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
  </style>
</head>
<body class="text-[#1a4142]">

  <input type="file" id="hidden-file-input" style="display: none;" accept="image/*">

  <div class="fixed inset-0 z-[-1] pointer-events-none">
    <img id="global-bg" src="" alt="" class="w-full h-full object-cover opacity-90 transition-opacity duration-1000" style="display:none;" />
  </div>

  <div class="fixed top-[90px] right-4 md:right-8 z-[9999] flex flex-col space-y-2">
    <button class="ghost-btn shadow-sm" onclick="triggerFileUpload('global-bg')">배경 사진 넣기</button>
    <button class="ghost-btn shadow-md border-galleryGold text-galleryGold bg-white/70 font-bold" onclick="saveToBrowser()">✅ 전체 고정 (확인)</button>
  </div>

  <header class="sticky top-0 z-40 py-6 px-8 flex justify-between items-center bg-[#d0e4e0]/60 backdrop-blur-md border-b border-white/20 shadow-sm">
    <div class="flex flex-col items-start relative group logo-container">
      <div class="absolute -top-4 right-0 opacity-0 group-hover:opacity-100 transition-opacity z-10 flex space-x-1">
        <button class="water-btn !text-[10px] !px-2 !py-1" onclick="openTextEditor(this.closest('.logo-container'))">수정</button>
        <button class="water-btn !text-[10px] !px-2 !py-1 !bg-galleryGold !text-white" onclick="openStyleEditor(this.closest('.logo-container'))">스타일</button>
      </div>
      <div class="mb-1">
        <svg width="30" height="30" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M25 45C36.0457 45 45 36.0457 45 25C45 13.9543 36.0457 5 25 5C13.9543 5 5 13.9543 5 25C5 36.0457 13.9543 45 25 45Z" stroke="#cfa752" stroke-width="2"/><path d="M15 25H35" stroke="#cfa752" stroke-width="2"/><path d="M25 15V35" stroke="#cfa752" stroke-width="2"/></svg>
      </div>
      <h1 class="text-xs tracking-widest font-bold text-[#1a4142] drop-shadow-sm text-target" id="header-title">LACEY FINE ART</h1>
    </div>
    <div class="hidden md:flex items-center space-x-4">
        <input type="text" placeholder="Search Artwork..." class="cursive-search text-xl px-2 w-48 focus:w-64 transition-all">
    </div>
  </header>

  <main class="px-4 md:px-8 max-w-6xl mx-auto pt-10">
    <section class="py-12">
      <div class="glass-panel rounded-[40px] p-12 relative flex flex-col items-center text-center draggable mx-auto max-w-3xl min-h-[450px] justify-center shadow-2xl border-white/40" id="main-board">
        <div class="absolute top-6 right-6 flex space-x-2 z-30">
          <button class="water-btn !bg-galleryGold !text-white !border-galleryGold shadow-sm" onclick="openStyleEditor(this.closest('#main-board'))">스타일</button>
          <button class="water-btn shadow-sm" onclick="openTextEditor(this.closest('#main-board'))">수정</button>
        </div>
        <p class="mb-4 intro-handwriting text-target" style="font-size: 2rem;">[라벨 입력]</p>
        <h2 class="mb-8 intro-handwriting text-target" style="font-size: 3rem;">[소개글 타이틀 입력]</h2>
        <div class="w-20 h-[1.5px] bg-[#cfa752] mb-10 rounded-full opacity-60"></div>
        <div class="w-full">
            <p class="text-lg leading-relaxed text-target intro-desc mb-8 line-clamp-4" id="main-intro-text">
              [여기에 상세 소개글을 입력하세요. '수정' 버튼을 눌러 내용을 바꿀 수 있습니다.]
            </p>
            <button class="water-btn !bg-white/40 !px-6 !py-2.5 !text-xs !rounded-full shadow-inner hover:!bg-white/60" onclick="openDetailedView(this.closest('#main-board'))">📖 소개글 자세히 보기</button>
        </div>
      </div>
    </section>

    <section class="pb-20">
      <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
        <div class="relative w-full h-[450px] overflow-hidden rounded-3xl shadow-xl bg-white gallery-item">
          <img id="art-img-1" src="https://via.placeholder.com/600x800?text=Lacey+Art" class="absolute inset-0 w-full h-full object-cover">
          <div class="absolute top-4 left-4 z-20 flex space-x-2">
               <button class="ghost-btn !px-3 !py-1.5 !text-[10px]" onclick="triggerFileUpload('art-img-1')">사진 넣기</button>
               <button class="ghost-btn !px-3 !py-1.5 !text-[10px] !bg-white/80 !text-[#cfa752] !border-[#cfa752]" onclick="saveToBrowser()">고정 확인</button>
          </div>
          <div class="slide-panel absolute inset-0 w-full h-full flex z-10">
             <div class="w-14 h-full flex flex-col justify-center items-center cursor-pointer bg-white/40 backdrop-blur-md" onclick="toggleSlide(this)">
                <svg class="w-6 h-6 text-[#1a4142] arrow-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
             </div>
             <div class="flex-1 h-full px-6 py-10 flex flex-col relative glass-panel-light text-content">
                <div class="absolute top-4 right-4 flex space-x-1 z-30">
                  <button class="water-btn !px-3 !py-1.5 !text-[10px] !bg-galleryGold !text-white" onclick="openStyleEditor(this.closest('.text-content'))">스타일</button>
                  <button class="water-btn !px-3 !py-1.5 !text-[10px]" onclick="openTextEditor(this.closest('.text-content'))">수정</button>
                </div>
                <h4 class="text-2xl font-serif mb-4 mt-8 text-[#1a4142] text-target">[작품 제목 1]</h4>
                <div class="overflow-y-auto pr-2 max-h-[200px]"><p class="text-sm leading-relaxed text-[#555] text-target">[작품 설명 입력]</p></div>
                <button class="mt-auto water-btn !bg-white/90 !text-[10px] !py-2.5 w-full shadow-sm" onclick="openDetailedView(this.closest('.text-content'))">📖 글 자세히 보기</button>
             </div>
          </div>
        </div>
      </div>
      <div class="mt-16 flex justify-center">
        <button class="ghost-btn !border-galleryGold !text-galleryGold !px-10 !py-4 !text-sm !font-bold" onclick="addNewGalleryItem()">+ 새로운 전시물 추가하기</button>
      </div>
    </section>

    <footer class="py-20 border-t border-white/20 flex flex-col items-center">
        <div class="flex flex-col md:flex-row items-center gap-8">
            <input type="text" placeholder="Find artwork..." class="cursive-search text-2xl w-56 text-center">
            <form action="https://www.google.com/search" method="GET" target="_blank">
                <input type="text" name="q" placeholder="Google Search..." class="cursive-search text-2xl w-56 text-center">
            </form>
        </div>
    </footer>
  </main>

  <div id="text-editor-modal" class="fixed inset-0 z-[10000] hidden items-center justify-center diary-modal-bg">
    <div class="bg-white w-[90%] max-w-md p-8 rounded-3xl shadow-2xl">
      <h3 class="text-lg font-bold mb-6 text-[#1a4142] font-serif">📝 내용 수정</h3>
      <textarea id="modal-textarea" class="w-full h-56 p-5 border border-[#d0e4e0] rounded-2xl focus:ring-2 focus:ring-[#d0e4e0] resize-none font-serif text-gray-700 bg-gray-50/30" placeholder="내용을 입력하세요..."></textarea>
      <div class="flex justify-end space-x-3 mt-6">
        <button class="px-6 py-2.5 bg-gray-100 text-gray-600 rounded-full font-bold text-sm" onclick="closeTextEditor()">취소</button>
        <button class="px-6 py-2.5 bg-[#8ac6b8] text-white rounded-full font-bold text-sm" onclick="saveTextChanges()">확인 (적용)</button>
      </div>
    </div>
  </div>

  <div id="style-editor-modal" class="fixed inset-0 z-[10000] hidden items-end md:items-center justify-center diary-modal-bg">
    <div id="style-bottom-sheet" class="bottom-sheet bg-white w-full md:w-[90%] md:max-w-md p-8 rounded-t-[40px] md:rounded-3xl shadow-2xl">
      <div class="flex justify-between items-center mb-8"><h3 class="text-lg font-bold text-[#1a4142] font-serif">🎨 디자인 설정</h3><button class="text-gray-300 hover:text-gray-600 text-xl" onclick="closeStyleEditor()">✕</button></div>
      <div class="space-y-6 max-h-[60vh] overflow-y-auto">
        <div class="flex justify-between items-center"><label class="text-sm font-bold text-gray-600">글자색</label><input type="color" id="val-color" class="w-10 h-10 cursor-pointer rounded-full overflow-hidden border-0"></div>
        <div><label class="text-sm font-bold text-gray-600 mb-2 block">폰트</label><select id="val-font" class="w-full border-gray-200 bg-gray-50 rounded-xl p-3"><option value="'Noto Serif KR', serif">기본 명조</option><option value="'Gowun Dodum', sans-serif">고운 돋움</option><option value="'Whisper', cursive">필기체</option></select></div>
        <div><div class="flex justify-between mb-2"><label class="text-sm font-bold text-gray-600">크기</label><span id="label-size" class="text-xs text-galleryGold">16px</span></div><input type="range" id="val-size" min="10" max="80" value="16" class="w-full accent-galleryGold"></div>
      </div>
      <button class="mt-8 px-5 py-4 bg-galleryGold text-white rounded-2xl font-bold w-full" onclick="closeStyleEditor()">설정 완료</button>
    </div>
  </div>

  <div id="detail-view-modal" class="fixed inset-0 z-[10001] hidden flex-col diary-modal-bg">
    <div class="bg-[#f4f4f2] w-full h-full md:w-[650px] md:h-[85vh] md:m-auto md:rounded-[40px] overflow-hidden flex flex-col shadow-2xl relative">
        <header class="p-8 flex justify-between items-center border-b border-gray-100 bg-white/40"><h2 id="detail-title" class="font-serif font-bold text-xl text-gray-800">제목</h2><button class="text-gray-400 hover:text-gray-800 p-2 text-2xl" onclick="closeDetailedView()">✕</button></header>
        <div class="flex-1 overflow-y-auto p-10 md:p-14"><div id="detail-content" class="font-serif text-lg leading-loose text-gray-700 whitespace-pre-wrap"></div></div>
    </div>
  </div>

  <script>
    let currentTextTargets = [];
    let styleTargets = [];

    // 텍스트 편집기 열기 (핵심 수정 부분)
    function openTextEditor(container) {
      currentTextTargets = [];
      let combinedText = "";
      
      // container 내에서 모든 text-target을 찾음
      const targets = container.querySelectorAll('.text-target');
      
      if (targets.length > 0) {
        targets.forEach((target, index) => {
          currentTextTargets.push(target);
          combinedText += target.innerText.trim() + (index < targets.length - 1 ? "\n" : "");
        });
      } else if (container.classList.contains('text-target')) {
        currentTextTargets.push(container);
        combinedText = container.innerText.trim();
      }

      document.getElementById('modal-textarea').value = combinedText;
      const modal = document.getElementById('text-editor-modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeTextEditor() { document.getElementById('text-editor-modal').classList.replace('flex', 'hidden'); }

    function saveTextChanges() {
      const newLines = document.getElementById('modal-textarea').value.split('\n');
      currentTextTargets.forEach((target, index) => {
        if (newLines[index] !== undefined) target.innerText = newLines[index];
      });
      closeTextEditor();
    }

    // 디자인 설정 열기
    function openStyleEditor(container) {
      styleTargets = container.querySelectorAll('.text-target');
      if (styleTargets.length === 0 && container.classList.contains('text-target')) styleTargets = [container];
      
      document.getElementById('style-editor-modal').classList.replace('hidden', 'flex');
      setTimeout(() => document.getElementById('style-bottom-sheet').classList.add('open'), 10);
    }

    function closeStyleEditor() {
      document.getElementById('style-bottom-sheet').classList.remove('open');
      setTimeout(() => document.getElementById('style-editor-modal').classList.replace('flex', 'hidden'), 300);
    }

    // 상세 보기
    function openDetailedView(container) {
      const titleEl = container.querySelector('h2') || container.querySelector('h4');
      const textEl = container.querySelector('.intro-desc') || container.querySelector('p');
      
      document.getElementById('detail-title').innerText = titleEl ? titleEl.innerText : "No Title";
      document.getElementById('detail-content').innerText = textEl ? textEl.innerText : "No Content";
      document.getElementById('detail-content').style.cssText = textEl ? textEl.style.cssText : "";
      
      document.getElementById('detail-view-modal').classList.replace('hidden', 'flex');
    }

    function closeDetailedView() { document.getElementById('detail-view-modal').classList.replace('flex', 'hidden'); }

    // 나머지 유틸리티 함수
    function toggleSlide(h) { h.closest('.slide-panel').classList.toggle('slide-hide'); h.querySelector('.arrow-icon').classList.toggle('rotate-180'); }
    
    function triggerFileUpload(id) { document.getElementById('hidden-file-input').click(); window.currentImgId = id; }
    
    document.getElementById('hidden-file-input').onchange = function(e) {
      if (this.files && this.files[0]) {
        const r = new FileReader();
        r.onload = function(ev) {
          if (window.currentImgId === 'global-bg') {
            document.body.style.backgroundImage = `url('${ev.target.result}')`;
            document.getElementById('global-bg').src = ev.target.result;
            document.getElementById('global-bg').style.display = 'block';
          } else { document.getElementById(window.currentImgId).src = ev.target.result; }
        };
        r.readAsDataURL(this.files[0]);
      }
    };

    function addNewGalleryItem() {
      const id = 'art-' + Date.now();
      const div = document.createElement('div');
      div.className = "relative w-full h-[450px] overflow-hidden rounded-3xl shadow-xl bg-white gallery-item";
      div.innerHTML = `
        <img id="${id}" src="https://via.placeholder.com/600x800" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute top-4 left-4 z-20 flex space-x-2">
          <button class="ghost-btn !px-3 !py-1.5 !text-[10px]" onclick="triggerFileUpload('${id}')">사진 넣기</button>
        </div>
        <div class="slide-panel absolute inset-0 w-full h-full flex z-10">
          <div class="w-14 h-full flex flex-col justify-center items-center cursor-pointer bg-white/40" onclick="toggleSlide(this)"><svg class="w-6 h-6 text-[#1a4142] arrow-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 5l7 7-7 7" stroke-width="2"/></svg></div>
          <div class="flex-1 h-full px-6 py-10 flex flex-col relative glass-panel-light text-content">
            <div class="absolute top-4 right-4 flex space-x-1 z-30"><button class="water-btn !px-3 !py-1.5 !text-[10px] !bg-galleryGold !text-white" onclick="openStyleEditor(this.closest('.text-content'))">스타일</button><button class="water-btn !px-3 !py-1.5 !text-[10px]" onclick="openTextEditor(this.closest('.text-content'))">수정</button></div>
            <h4 class="text-2xl font-serif mb-4 mt-8 text-[#1a4142] text-target">[작품 제목]</h4>
            <p class="text-sm leading-relaxed text-[#555] text-target">[설명]</p>
            <button class="mt-auto water-btn !bg-white/90 !text-[10px] !py-2.5 w-full shadow-sm" onclick="openDetailedView(this.closest('.text-content'))">📖 글 자세히 보기</button>
          </div>
        </div>`;
      document.getElementById('gallery-grid').appendChild(div);
    }

    function saveToBrowser() {
      localStorage.setItem('gallery_html', document.getElementById('gallery-grid').innerHTML);
      alert("✅ 저장되었습니다.");
    }

    window.onload = () => {
      const saved = localStorage.getItem('gallery_html');
      if (saved) document.getElementById('gallery-grid').innerHTML = saved;
      // 드래그 기능 (메인보드만)
      const board = document.getElementById('main-board');
      let p1 = 0, p2 = 0, p3 = 0, p4 = 0;
      board.onmousedown = (e) => {
        if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
        p3 = e.clientX; p4 = e.clientY;
        document.onmousemove = (e) => {
          p1 = p3 - e.clientX; p2 = p4 - e.clientY; p3 = e.clientX; p4 = e.clientY;
          board.style.top = (board.offsetTop - p2) + "px"; board.style.left = (board.offsetLeft - p1) + "px";
        };
        document.onmouseup = () => { document.onmousemove = null; };
      };
    };

    // 스타일 적용 이벤트 리스너들
    document.getElementById('val-color').oninput = (e) => styleTargets.forEach(t => t.style.color = e.target.value);
    document.getElementById('val-size').oninput = (e) => {
      styleTargets.forEach(t => t.style.fontSize = e.target.value + 'px');
      document.getElementById('label-size').innerText = e.target.value + 'px';
    };
    document.getElementById('val-font').onchange = (e) => styleTargets.forEach(t => t.style.fontFamily = e.target.value);
  </script>
</body>
</html>
