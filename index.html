<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Lacey Fine Art | Gallery</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400;700&family=Whisper&display=swap" rel="stylesheet"/>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { galleryGold: '#cfa752', galleryTeal: '#d0e4e0' },
          fontFamily: {
            serif: ['"Noto Serif KR"', 'serif'],
            sans: ['"Gowun Dodum"', 'sans-serif'],
            diary: ['"Whisper"', 'cursive'],
          },
        }
      }
    }
  </script>
  
  <style data-purpose="custom-styles">
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Serif KR', serif;
      -webkit-font-smoothing: antialiased;
      background-color: #d0e4e0; 
      transition: background-image 0.5s ease-in-out;
      overflow-x: hidden;
      min-height: 180vh;
    }

    #gallery-section { scroll-margin-top: 120px; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(207, 167, 82, 0.3); border-radius: 10px; }

    .collapsed-text {
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; transition: all 0.3s ease;
    }
    
    .intro-handwriting { font-family: 'Whisper', cursive; color: #FF6347; font-size: 1.5rem; }
    .intro-desc { color: rgba(255, 255, 255, 0.9); text-shadow: 0 1px 2px rgba(0,0,0,0.1); }

    .glass-panel {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .glass-panel-light {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
    }

    /* 🌟 버튼: 터치 영역 확대 및 가시성 개선 */
    .mini-icon-btn {
      font-size: 12px; width: 28px; height: 28px;
      background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(255, 255, 255, 0.9);
      color: #1a4142; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .mini-icon-btn:active { transform: scale(0.9); background: white; }

    .fixed-menu-btn {
      font-size: 10px; font-weight: 800; letter-spacing: 0.1em;
      padding: 6px 14px; border-radius: 8px;
      background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0,0,0,0.05);
      transition: all 0.3s; cursor: pointer;
    }

    .slide-panel { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .slide-hide { transform: translateX(calc(100% - 3rem)); }
    .arrow-icon { transition: transform 0.6s ease; opacity: 0.6; }

    .draggable { cursor: grab; }
    .draggable:active { cursor: grabbing; }
    .diary-modal-bg { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); }
  </style>
</head>
<body class="text-[#1a4142]">

  <input type="file" id="hidden-file-input" style="display: none;" accept="image/*">

  <div class="fixed inset-0 z-[-1] pointer-events-none">
    <img id="global-bg" src="" alt="" class="w-full h-full object-cover opacity-100 transition-opacity duration-1000" style="display:none;" />
  </div>

  <div class="fixed top-24 right-4 z-[10001] flex flex-col items-end space-y-2">
    <div class="bg-white/40 backdrop-blur-xl p-3 rounded-2xl border border-white/50 flex flex-col items-end space-y-2 shadow-xl">
        <div class="flex items-center space-x-2 mb-1">
            <span class="text-[9px] font-bold opacity-50">VOICE SPEED</span>
            <input type="range" id="tts-rate" min="0.5" max="2.0" step="0.1" value="1.0" class="w-16 h-1 accent-galleryGold">
        </div>
        <button class="fixed-menu-btn" onclick="addNewBoard()">+ NEW TAB</button>
        <button class="fixed-menu-btn" onclick="triggerFileUpload('global-bg')">BACKGROUND</button>
        <button class="fixed-menu-btn !bg-galleryGold !text-white !border-0 shadow-lg mt-2 px-5 py-2.5" onclick="saveToBrowser()">FIX SITE</button>
    </div>
  </div>

  <header class="fixed top-0 left-0 w-full z-40 py-6 px-10 flex justify-between items-center bg-white/5 backdrop-blur-md border-b border-white/10">
    <div class="flex items-center space-x-4 group">
      <h1 class="text-[12px] tracking-[0.5em] font-bold text-[#1a4142] opacity-80 text-target" id="header-title">LACEY FINE ART</h1>
      <button class="mini-icon-btn !w-6 !h-6 !text-[10px] opacity-0 group-hover:opacity-100" onclick="openTextEditor(document.getElementById('header-title'))">✎</button>
    </div>
    
    <div class="relative">
      <button id="menu-toggle" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-white/30 transition-all">
        <div class="w-6 h-[1px] bg-[#1a4142] opacity-60"></div>
      </button>

      <div id="dropdown-menu" class="hidden absolute right-0 mt-3 w-64 bg-white/95 backdrop-blur-3xl border border-white/40 shadow-2xl rounded-3xl flex flex-col z-50 overflow-hidden">
        <div class="p-5 space-y-8">
          <div class="flex flex-col space-y-4">
             <div class="flex justify-between items-center group/nav">
                <a href="#gallery-section" class="text-[13px] font-bold text-target opacity-90 flex-grow" onclick="closeMenu()">🌍 COUNTRY</a>
                <button class="mini-icon-btn !w-5 !h-5 !text-[9px] opacity-20 group-hover/nav:opacity-100" onclick="openTextEditor(this.previousElementSibling)">✎</button>
             </div>
             <div class="pl-4 space-y-3 border-l border-gray-100">
                <div class="flex justify-between items-center group/nav">
                   <a href="#gallery-section" class="text-[11px] text-target opacity-60 flex-grow" onclick="closeMenu()">- [NAME]</a>
                   <button class="mini-icon-btn !w-5 !h-5 !text-[9px] opacity-20 group-hover/nav:opacity-100" onclick="openTextEditor(this.previousElementSibling)">✎</button>
                </div>
             </div>
          </div>
          <div class="flex flex-col space-y-4 border-t border-gray-100 pt-6">
             <div class="flex justify-between items-center group/nav">
                <a href="#gallery-section" class="text-[13px] font-bold text-target opacity-90 flex-grow" onclick="closeMenu()">⏳ ERA</a>
                <button class="mini-icon-btn !w-5 !h-5 !text-[9px] opacity-20 group-hover/nav:opacity-100" onclick="openTextEditor(this.previousElementSibling)">✎</button>
             </div>
             <div class="pl-4 space-y-3 border-l border-gray-100">
                <div class="flex justify-between items-center group/nav">
                   <a href="#gallery-section" class="text-[11px] text-target opacity-60 flex-grow" onclick="closeMenu()">- [NAME]</a>
                   <button class="mini-icon-btn !w-5 !h-5 !text-[9px] opacity-20 group-hover/nav:opacity-100" onclick="openTextEditor(this.previousElementSibling)">✎</button>
                </div>
             </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="h-[55vh] pointer-events-none"></div>

  <main class="px-6 md:px-12 max-w-7xl mx-auto" id="main-content">
    
    <section class="mb-24">
      <div class="glass-panel rounded-[3rem] p-12 relative flex flex-col items-center text-center draggable mx-auto max-w-md shadow-2xl group" id="draggable-desc">
        
        <div class="absolute top-6 right-8 flex space-x-3">
          <button class="mini-icon-btn" onclick="playTTS(this.closest('#draggable-desc'))">🔊</button>
          <button class="mini-icon-btn" onclick="openStyleEditor(this.closest('#draggable-desc'))">🎨</button>
          <button class="mini-icon-btn !text-galleryGold !opacity-100" onclick="openTextEditor(this.closest('#draggable-desc'))">✎</button>
        </div>
        
        <p class="intro-handwriting text-target mb-2">[Label]</p>
        <h2 class="text-3xl font-serif text-target mb-6 opacity-90">[Title]</h2>
        <div class="w-12 h-[1px] bg-galleryGold mb-6 opacity-40"></div>
        <div class="w-full">
            <p class="text-[14px] leading-relaxed text-target intro-desc collapsed-text">[Description]</p>
            <button class="text-[11px] opacity-50 mt-5 underline tracking-tight" onclick="toggleExpand(this)">READ MORE</button>
        </div>
      </div>
    </section>

    <section class="pb-40" id="gallery-section">
      <div class="text-center mb-20">
        <h3 class="text-[11px] tracking-[1em] font-bold opacity-30 text-target uppercase">Exhibition</h3>
      </div>

      <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
        <div class="relative w-full h-[480px] overflow-hidden rounded-[2.5rem] shadow-2xl bg-transparent gallery-item group/item">
          <img id="art-img-base" src="" alt="" class="absolute inset-0 w-full h-full object-contain bg-transparent">
          
          <div class="absolute top-6 left-8 z-20 flex flex-col space-y-2 opacity-0 group-hover/item:opacity-100 transition-all">
             <button class="mini-icon-btn" onclick="triggerFileUpload('art-img-base')">🖼</button>
             <button class="mini-icon-btn !text-red-400" onclick="deleteElement(this.closest('.gallery-item'))">✕</button>
          </div>

          <div class="slide-panel absolute inset-0 w-full h-full flex z-10 slide-hide">
             <div class="w-12 h-full flex flex-col justify-center items-center cursor-pointer bg-white/10 border-r border-white/10 backdrop-blur-md" onclick="toggleSlide(this)">
                <svg class="w-5 h-5 text-[#1a4142] arrow-icon rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
             </div>
             <div class="flex-1 h-full px-10 py-14 flex flex-col relative glass-panel-light overflow-hidden">
                <div class="absolute top-6 right-8 flex space-x-2">
                  <button class="mini-icon-btn" onclick="playTTS(this.closest('.flex-1'))">🔊</button>
                  <button class="mini-icon-btn" onclick="openStyleEditor(this.closest('.flex-1'))">🎨</button>
                  <button class="mini-icon-btn !opacity-100" onclick="openTextEditor(this.closest('.flex-1'))">✎</button>
                </div>
                <h4 class="text-2xl font-serif mb-8 mt-4 text-[#1a4142] text-target">[Art Title]</h4>
                <div class="flex-1 overflow-y-auto pr-2 custom-scroll">
                  <p class="text-[14px] leading-relaxed text-target opacity-80 collapsed-text">[Description]</p>
                  <button class="text-[11px] opacity-40 mt-5 underline" onclick="toggleExpand(this)">MORE</button>
                </div>
             </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="text-editor-modal" class="fixed inset-0 z-[10005] hidden items-center justify-center diary-modal-bg">
    <div class="bg-white/95 backdrop-blur-3xl w-[90%] max-w-sm p-10 rounded-[3rem] shadow-2xl border border-white/30">
      <h3 class="text-[11px] font-bold mb-6 tracking-widest text-gray-400">EDIT CONTENT</h3>
      <textarea id="modal-textarea" class="w-full h-56 p-5 border-0 rounded-[1.5rem] font-serif text-[15px] text-gray-700 bg-gray-50/50 focus:ring-1 focus:ring-galleryGold outline-none"></textarea>
      <div class="flex justify-end space-x-3 mt-10">
        <button class="fixed-menu-btn" onclick="closeTextEditor()">CLOSE</button>
        <button id="modal-save-btn" class="fixed-menu-btn !bg-galleryGold !text-white shadow-lg px-6" onclick="saveTextChanges()">SAVE</button>
      </div>
    </div>
  </div>

  <div id="style-editor-modal" class="fixed inset-0 z-[10005] hidden items-end md:items-center justify-center diary-modal-bg">
    <div id="style-bottom-sheet" class="bottom-sheet bg-white/95 backdrop-blur-3xl w-full md:w-80 p-12 rounded-t-[4rem] md:rounded-[3rem] shadow-2xl">
      <div class="flex justify-between items-center mb-10 px-2">
        <h3 class="text-[11px] font-bold tracking-[0.3em] text-gray-400 uppercase">Typography</h3>
        <button class="text-gray-300 text-3xl" onclick="closeStyleEditor()">×</button>
      </div>
      <div class="space-y-10 px-2">
        <div class="flex justify-between items-center"><label class="text-[12px] font-bold opacity-50">COLOR</label><input type="color" id="val-color" class="w-10 h-10 rounded-full border-0 p-0 bg-transparent cursor-pointer shadow-sm"></div>
        <div><label class="text-[12px] font-bold opacity-50 block mb-3">FONT FAMILY</label><select id="val-font" class="w-full border-0 bg-gray-50 rounded-2xl p-4 text-[12px] font-bold focus:ring-1 focus:ring-galleryGold"><option value="'Noto Serif KR', serif">SERIF</option><option value="'Gowun Dodum', sans-serif">SANS</option><option value="'Whisper', cursive">HAND</option></select></div>
        <div><div class="flex justify-between mb-3"><label class="text-[12px] font-bold opacity-50">SIZE</label><span id="label-size" class="text-[11px] font-mono opacity-30">16px</span></div><input type="range" id="val-size" min="10" max="50" value="16" class="w-full accent-galleryGold h-1"></div>
      </div>
      <button class="mt-14 w-full py-5 bg-galleryGold text-white rounded-[1.5rem] text-[12px] font-bold tracking-widest shadow-xl" onclick="closeStyleEditor()">APPLY STYLE</button>
    </div>
  </div>

  <script>
    const menuToggle = document.getElementById('menu-toggle');
    const dropdownMenu = document.getElementById('dropdown-menu');

    menuToggle.onclick = (e) => { e.stopPropagation(); dropdownMenu.classList.toggle('hidden'); };
    function closeMenu() { dropdownMenu.classList.add('hidden'); }
    document.onclick = (e) => { if (!dropdownMenu.contains(e.target)) closeMenu(); };

    function toggleSlide(handle) {
      handle.closest('.slide-panel').classList.toggle('slide-hide');
      handle.querySelector('.arrow-icon').classList.toggle('rotate-180');
    }
    function toggleExpand(btn) {
      const p = btn.previousElementSibling;
      p.classList.toggle('collapsed-text');
      btn.innerText = p.classList.contains('collapsed-text') ? 'READ MORE' : 'FOLD CONTENT';
    }

    function makeDraggable(el) {
        let p1=0, p2=0, p3=0, p4=0;
        el.onmousedown = (e) => {
            if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.tagName === 'A' || e.target.closest('button')) return;
            p3 = e.clientX; p4 = e.clientY;
            document.onmouseup = () => { document.onmousemove = null; };
            document.onmousemove = (e) => {
                p1 = p3 - e.clientX; p2 = p4 - e.clientY; p3 = e.clientX; p4 = e.clientY;
                el.style.top = (el.offsetTop - p2) + "px"; el.style.left = (el.offsetLeft - p1) + "px";
            };
        };
    }

    function addNewBoard() {
      const id = 'art-' + Date.now();
      const html = `<div class="relative w-full h-[480px] overflow-hidden rounded-[2.5rem] shadow-2xl bg-transparent gallery-item group/item">
          <img id="${id}" src="" class="absolute inset-0 w-full h-full object-contain bg-transparent">
          <div class="absolute top-6 left-8 z-20 flex flex-col space-y-2 opacity-0 group-hover/item:opacity-100 transition-all">
             <button class="mini-icon-btn" onclick="triggerFileUpload('${id}')">🖼</button>
             <button class="mini-icon-btn !text-red-400" onclick="deleteElement(this.closest('.gallery-item'))">✕</button>
          </div>
          <div class="slide-panel absolute inset-0 w-full h-full flex z-10 slide-hide">
             <div class="w-12 h-full flex flex-col justify-center items-center cursor-pointer bg-white/10 border-r border-white/10 backdrop-blur-md" onclick="toggleSlide(this)"><svg class="w-5 h-5 text-[#1a4142] arrow-icon rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 5l7 7-7 7"/></svg></div>
             <div class="flex-1 h-full px-10 py-14 flex flex-col relative glass-panel-light overflow-hidden shadow-2xl">
                <div class="absolute top-6 right-8 flex space-x-2"><button class="mini-icon-btn" onclick="playTTS(this.closest('.flex-1'))">🔊</button><button class="mini-icon-btn" onclick="openStyleEditor(this.closest('.flex-1'))">🎨</button><button class="mini-icon-btn !opacity-100" onclick="openTextEditor(this.closest('.flex-1'))">✎</button></div>
                <h4 class="text-2xl font-serif mb-8 mt-4 text-target">[New Title]</h4>
                <div class="flex-1 overflow-y-auto pr-2 custom-scroll"><p class="text-[14px] text-target opacity-80 collapsed-text">[Description]</p><button class="text-[11px] opacity-40 mt-5 underline" onclick="toggleExpand(this)">MORE</button></div>
             </div>
          </div></div>`;
      document.getElementById('gallery-grid').insertAdjacentHTML('beforeend', html);
    }

    function playTTS(container) {
        window.speechSynthesis.cancel();
        let text = ""; container.querySelectorAll('.text-target').forEach(t => text += t.innerText + " ");
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ko-KR'; utterance.rate = document.getElementById('tts-rate').value;
        window.speechSynthesis.speak(utterance);
    }

    let curId = null;
    function triggerFileUpload(id) { curId = id; document.getElementById('hidden-file-input').click(); }
    document.getElementById('hidden-file-input').onchange = (e) => {
      if (e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX = 1000; let w=img.width, h=img.height;
            if (w>h && w>MAX) { h*=MAX/w; w=MAX; } else if (h>w && h>MAX) { w*=MAX/h; h=MAX; }
            canvas.width=w; canvas.height=h;
            canvas.getContext('2d').drawImage(img,0,0,w,h);
            const data = canvas.toDataURL('image/webp', 0.7);
            if (curId === 'global-bg') {
              document.body.style.backgroundImage = `url('${data}')`; document.body.style.backgroundSize='cover'; document.body.style.backgroundAttachment='fixed';
              document.getElementById('global-bg').src=data; document.getElementById('global-bg').style.display='block';
            } else document.getElementById(curId).src = data;
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
      }
    };
    function removeBackground() { document.body.style.backgroundImage = 'none'; document.getElementById('global-bg').style.display='none'; }

    let editTargs = [];
    const textModal = document.getElementById('text-editor-modal');
    const modalTextarea = document.getElementById('modal-textarea');

    function openTextEditor(el) {
      editTargs = el.classList.contains('text-target') ? [el] : Array.from(el.querySelectorAll('.text-target'));
      modalTextarea.value = editTargs.map(t => t.innerText).join('\n');
      textModal.classList.replace('hidden', 'flex');
    }
    function closeTextEditor() { textModal.classList.replace('flex', 'hidden'); }
    function saveTextChanges() {
      const lines = modalTextarea.value.split('\n');
      editTargs.forEach((t, i) => { if(lines[i] !== undefined) t.innerText = lines[i]; });
      closeTextEditor();
    }
    function deleteElement(el) { if(confirm('Delete?')) el.remove(); }

    const styleModal = document.getElementById('style-editor-modal');
    const styleSheet = document.getElementById('style-bottom-sheet');
    let styleTargs = [];
    function openStyleEditor(el) {
      styleTargs = el.querySelectorAll('.text-target');
      styleModal.classList.replace('hidden', 'flex');
      setTimeout(()=>styleSheet.classList.add('open'), 10);
    }
    function closeStyleEditor() { styleSheet.classList.remove('open'); setTimeout(()=>styleModal.classList.replace('flex', 'hidden'), 300); }
    
    document.getElementById('val-color').oninput=(e)=>styleTargs.forEach(t=>t.style.setProperty('color', e.target.value, 'important'));
    document.getElementById('val-font').onchange=(e)=>styleTargs.forEach(t=>t.style.fontFamily=e.target.value);
    document.getElementById('val-size').oninput=(e)=>{styleTargs.forEach(t=>t.style.fontSize=e.target.value+'px'); document.getElementById('label-size').innerText=e.target.value+'px';};

    // 🌟 저장 시스템 개선 (중복 제거 버전 V7)
    function saveToBrowser() {
      try {
        // 1. 레이아웃 저장 (이미지 src는 비우고 저장하여 용량 확보)
        const gridClone = document.getElementById('gallery-grid').cloneNode(true);
        gridClone.querySelectorAll('img').forEach(img => img.src = "");
        localStorage.setItem('gallery_grid_v7', gridClone.innerHTML);

        const textMap={}; const styleMap={};
        document.querySelectorAll('.text-target').forEach((el, i) => { textMap[i]=el.innerHTML; styleMap[i]=el.getAttribute('style')||''; });
        localStorage.setItem('gallery_texts_v7', JSON.stringify(textMap));
        localStorage.setItem('gallery_styles_v7', JSON.stringify(styleMap));

        const imgMap={}; document.querySelectorAll('img').forEach(img => { if(img.id && img.src.startsWith('data:image')) imgMap[img.id]=img.src; });
        localStorage.setItem('gallery_images_v7', JSON.stringify(imgMap));
        localStorage.setItem('gallery_bg_v7', document.getElementById('global-bg').src);
        alert("✅ SITE DATA SECURED.");
      } catch(e) { alert("ERROR: MEMORY FULL. REDUCE IMAGE SIZE."); }
    }

    function loadFromBrowser() {
      const layout = localStorage.getItem('gallery_grid_v7');
      if (layout) document.getElementById('gallery-grid').innerHTML = layout;
      const texts = JSON.parse(localStorage.getItem('gallery_texts_v7'));
      const styles = JSON.parse(localStorage.getItem('gallery_styles_v7'));
      if (texts) document.querySelectorAll('.text-target').forEach((el, i) => { if(texts[i]) el.innerHTML=texts[i]; if(styles[i]) el.setAttribute('style', styles[i]); });
      const imgs = JSON.parse(localStorage.getItem('gallery_images_v7'));
      if (imgs) Object.keys(imgs).forEach(id => { const img=document.getElementById(id); if(img) img.src=imgs[id]; });
      const bg = localStorage.getItem('gallery_bg_v7');
      if (bg && bg.startsWith('data:image')) {
        document.body.style.backgroundImage = `url('${bg}')`; document.body.style.backgroundSize='cover'; document.body.style.backgroundAttachment='fixed';
        document.getElementById('global-bg').src=bg; document.getElementById('global-bg').style.display='block';
      }
      if(document.getElementById("draggable-desc")) makeDraggable(document.getElementById("draggable-desc"));
    }

    window.onload = loadFromBrowser;
  </script>
</body>
</html>
