<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Gallery</title>
  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; }

    .main-background {
      width: 100%;
      min-height: 100vh;
      background-color: #fdfdfd;
      
      /* ▼ 1. 배경 사진 링크를 아래 작은따옴표 사이에 직접 넣어주세요 ▼ */
      background-image: url('여기에_사진_링크_넣어주세요.jpg');
      
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header span { font-weight: bold; color: #333; }

    /* 불투명한 회색 다이어리 창 */
    .glass-board {
      background: rgba(211, 211, 211, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      flex-grow: 1;
    }

    .static-text {
      margin-top: 0;
      color: #333;
      line-height: 1.6;
    }

    .small-btn, .mini-btn {
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid #888;
      color: #333;
      cursor: pointer;
      border-radius: 4px;
    }
    .post-btn { font-size: 12px; padding: 4px 8px; }
    .mini-btn { font-size: 11px; padding: 2px 6px; margin-right: 5px; }

    footer {
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }
    .sns-link a { text-decoration: none; color: #555; font-size: 12px; }

    .cursive-font {
      font-family: 'Cursive', cursive, sans-serif;
      background: transparent;
      border: none;
      border-bottom: 1px solid #888;
      font-size: 14px;
      color: #333;
      width: 150px;
      text-align: center;
      padding-bottom: 2px;
    }
    .cursive-font:focus { outline: none; }
  </style>
</head>
<body>

  <div class="main-background">
    <header>
      <span>게시하기</span>
      <button class="small-btn post-btn">게시</button>
    </header>

    <main>
      <section class="glass-board">
        <div class="item">
          <p class="static-text">
            여기에 글 내용을 깃허브 코드창에 직접 적어주세요.<br>
            줄바꿈이 필요할 때는 이렇게 br 기호를 넣으시면 됩니다.
          </p>
          <div class="edit-delete-group" style="margin-top: 15px;">
            <button class="mini-btn">수정</button>
            <button class="mini-btn">삭제</button>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="sns-link">
        <a href="https://twitter.com" target="_blank">Twitter</a>
      </div>
      <div class="google-search">
        <input type="text" placeholder="Google Search..." class="cursive-font">
      </div>
    </footer>
  </div>

</body>
</html>
