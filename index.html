<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Lacey Fine Art | Gallery</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400;700&family=Whisper&display=swap" rel="stylesheet"/>

<script>
tailwind.config = {
theme: {
extend: {
colors: {
galleryGold: '#cfa752',
galleryTeal: '#d0e4e0'
},
fontFamily: {
serif: ['"Noto Serif KR"', 'serif'],
sans: ['"Gowun Dodum"', 'sans-serif'],
diary: ['"Whisper"', 'cursive']
}
}
}
}
</script>

<style>

body{
font-family:'Noto Serif KR',serif;
background:#d0e4e0;
overflow-x:hidden;
}

/* 카드 자동 높이 */
.gallery-item{
min-height:400px;
height:auto;
transition:all .4s ease;
}

/* 슬라이드 패널 */
.slide-panel{
transition:transform .6s cubic-bezier(.4,0,.2,1);
height:auto;
min-height:100%;
}

.slide-hide{
transform:translateX(calc(100% - 3.5rem));
}

.arrow-icon{
transition:transform .6s ease;
}

/* 유리 패널 */
.glass-panel{
background:rgba(255,255,255,.25);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.4);
}

.glass-panel-light{
background:rgba(240,240,240,.9);
backdrop-filter:blur(12px);
border-left:1px solid rgba(230,230,230,.9);
}

/* 텍스트 */
.text-target{
word-break:break-word;
}

/* 버튼 */
.water-btn{
padding:.35rem .75rem;
border-radius:20px;
font-size:12px;
font-weight:700;
background:white;
cursor:pointer;
}

.ghost-btn{
padding:.4rem 1rem;
border-radius:20px;
font-size:12px;
background:rgba(255,255,255,.5);
cursor:pointer;
}

/* TTS */
.tts-controls{
display:flex;
gap:8px;
margin-top:12px;
background:rgba(255,255,255,.4);
padding:6px 12px;
border-radius:15px;
}

/* 모달 */
.diary-modal-bg{
background:rgba(0,0,0,.5);
backdrop-filter:blur(4px);
}

.bottom-sheet{
transform:translateY(100%);
transition:.3s;
}

.bottom-sheet.open{
transform:translateY(0);
}

</style>
</head>

<body class="text-[#1a4142]">

<input type="file" id="hidden-file-input" style="display:none;" accept="image/*">

<!-- 배경 -->
<div class="fixed inset-0 z-[-1] pointer-events-none">
<img id="global-bg" class="w-full h-full object-cover hidden">
</div>

<!-- 저장 버튼 -->
<div class="fixed top-24 right-4 z-[9999] flex flex-col gap-2">

<button class="ghost-btn" onclick="triggerFileUpload('global-bg')">
배경 사진
</button>

<button class="ghost-btn font-bold border border-yellow-500"
onclick="saveToBrowser()">
✅ 저장
</button>

</div>

<!-- 헤더 -->
<header class="sticky top-0 z-40 py-6 px-8 bg-[#d0e4e0]/70 backdrop-blur">

<h1 class="text-sm font-bold tracking-widest">
LACEY FINE ART
</h1>

</header>

<!-- 메인 -->
<main class="px-4 md:px-8 max-w-6xl mx-auto pt-12">

<!-- 카드 그리드 -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

<!-- 카드 -->
<div class="relative rounded-2xl shadow-xl bg-white gallery-item" id="item-1">

<img id="art-img-1"
src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=600"
class="absolute inset-0 w-full h-full object-cover">

<div class="absolute top-4 left-4 flex flex-col gap-2 z-20">

<button class="ghost-btn"
onclick="triggerFileUpload('art-img-1')">
📸 사진
</button>

</div>

<div class="slide-panel absolute inset-0 flex">

<div class="w-14 flex items-center justify-center bg-white/50 cursor-pointer"
onclick="toggleSlide(this)">

<svg class="w-6 h-6 arrow-icon"
fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-width="2"
d="M9 5l7 7-7 7"/>
</svg>

</div>

<div class="flex-1 p-6 flex flex-col glass-panel-light text-content">

<h4 class="text-xl font-bold mb-4 text-target">
[작품 제목]
</h4>

<p id="p-1" class="text-sm leading-relaxed text-target">
여기에 긴 글을 작성하세요.
글이 아무리 길어도 이제 절대 잘리지 않습니다.
</p>

<div class="tts-controls">
<button onclick="speakText('p-1')">▶</button>
<input type="range" min="0.5" max="2" step="0.1"
value="1"
onchange="speechRate=this.value">
</div>

</div>
</div>
</div>

</div>
</main>

<!-- 텍스트 수정 모달 -->
<div id="text-editor-modal"
class="fixed inset-0 hidden items-center justify-center diary-modal-bg">

<div class="bg-white w-[90%] max-w-md p-6 rounded-2xl">

<textarea id="modal-textarea"
class="w-full h-48 p-4 border rounded-xl"></textarea>

<div class="flex justify-end gap-3 mt-4">

<button onclick="closeTextEditor()">취소</button>

<button onclick="saveTextChanges()">확인</button>

</div>
</div>
</div>

<script>

/* 사진 업로드 */

let currentImgId=null;
const fileInput=document.getElementById('hidden-file-input');

function triggerFileUpload(id){
currentImgId=id;
fileInput.click();
}

fileInput.addEventListener('change',function(e){

if(!e.target.files[0])return;

const reader=new FileReader();

reader.onload=function(ev){

if(currentImgId==='global-bg'){

document.body.style.backgroundImage=`url('${ev.target.result}')`;

const bg=document.getElementById('global-bg');
bg.src=ev.target.result;
bg.classList.remove('hidden');

}else{

document.getElementById(currentImgId).src=ev.target.result;

}
}

reader.readAsDataURL(e.target.files[0]);
fileInput.value='';
});


/* 슬라이드 */

function toggleSlide(btn){

const panel=btn.closest('.slide-panel');

panel.classList.toggle('slide-hide');

btn.querySelector('.arrow-icon').classList.toggle('rotate-180');

}


/* TTS */

let speechRate=1;

function speakText(id){

window.speechSynthesis.cancel();

const ut=new SpeechSynthesisUtterance(
document.getElementById(id).innerText
);

ut.lang='ko-KR';
ut.rate=speechRate;

window.speechSynthesis.speak(ut);

}


/* 저장 */

function saveToBrowser(){

const data={};

document.querySelectorAll('.text-target')
.forEach((el,i)=>{

data['t'+i]=el.innerHTML;

});

localStorage.setItem('gallery_texts',
JSON.stringify(data));

alert('저장 완료');

}


/* 불러오기 */

function loadFromBrowser(){

const data=
JSON.parse(localStorage.getItem('gallery_texts')||'{}');

document.querySelectorAll('.text-target')
.forEach((el,i)=>{

if(data['t'+i]) el.innerHTML=data['t'+i];

});

}

window.addEventListener('DOMContentLoaded',loadFromBrowser);

</script>

</body>
</html>
