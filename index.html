<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Lacey Fine Art | Gallery</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400;700&family=Whisper&display=swap" rel="stylesheet"/>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { galleryGold: '#cfa752', galleryTeal: '#d0e4e0' },
          fontFamily: {
            serif: ['"Noto Serif KR"', 'serif'],
            sans: ['"Gowun Dodum"', 'sans-serif'],
            diary: ['"Whisper"', 'cursive'],
          },
        }
      }
    }
  </script>
  
  <style data-purpose="custom-styles">
    /* 🌟 [GPT 해결법 1] 모바일 렌더러의 높이 계산 오류 해결 */
    html, body {
      height: auto !important;
      min-height: 100%;
    }

    body {
      font-family: 'Noto Serif KR', serif;
      -webkit-font-smoothing: antialiased;
      background-color: #d0e4e0; 
      transition: background-image 0.5s ease-in-out;
      overflow-x: hidden;
    }

    /* 🌟 [GPT 해결법 2] 메인 레이어를 배경 위로 명확히 배치 */
    main {
      position: relative;
      z-index: 1;
    }

    /* 🌟 상단 버튼 디자인 유지 (평소 '-') */
    .minimal-btn {
      width: 32px; height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 999px; font-size: 0.75rem; color: rgba(26, 65, 66, 0.4);
      background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(4px);
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden; white-space: nowrap; border: 1px solid rgba(255,255,255,0.2);
    }
    .minimal-btn::before { content: "-"; }
    .minimal-btn span { width: 0; opacity: 0; transition: all 0.6s; font-weight: 500; }
    
    .minimal-btn:hover, .minimal-btn:active {
      width: 100px; color: rgba(26, 65, 66, 0.8);
      background: rgba(255, 255, 255, 0.6);
    }
    .minimal-btn:hover::before, .minimal-btn:active::before { content: ""; width: 0; opacity: 0; }
    .minimal-btn:hover span, .minimal-btn:active span { width: auto; opacity: 1; margin-left: 4px; }

    /* 🌟 제목 스타일: 주홍빛 + 은은한 은빛 광채 */
    #intro-main-title {
        font-family: 'Whisper', cursive !important;
        color: #FF7F50 !important; 
        text-shadow: 1px 1px 0px rgba(255,255,255,0.8), 0px 0px 8px rgba(192,192,192,0.4) !important;
        font-size: 3.2rem !important;
        font-weight: 400 !important;
        line-height: 1.1 !important;
        display: block !important;
    }

    /* 🌟 메인 소개글 본문: 매우 얇은 인디고 + 미세 골드 테두리 */
    .text-target {
      color: #3A4B7C !important;
      font-weight: 100 !important;
      text-shadow: 0.5px 0.5px 0px rgba(212, 175, 55, 0.2) !important;
      letter-spacing: 0.05em;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .main-wrapper { margin-top: 65vh; } /* */

    /* 🌟 반 불투명 유리창 배경 (메인 소개글용) */
    .glass-panel {
      background: rgba(255, 255, 255, 0.2) !important;
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
      border: 1px solid rgba(255, 255, 255, 0.3) !important;
    }

    /* 🌟 작품 설명판: 더 불투명한 어두운 덮개 */
    .desc-panel {
      background: rgba(15, 15, 20, 0.95) !important;
      backdrop-filter: blur(20px) !important;
      border-left: 1px solid rgba(255,255,255,0.1);
      display: flex; flex-direction: column; 
      height: 100%; 
      min-height: 0 !important; /* */
    }

    /* 🌟 작품 설명글: 튀지 않는 앤티크 골드 */
    .desc-panel .text-target {
        color: #C9B078 !important; 
        font-weight: 300 !important;
        text-shadow: none !important;
    }

    /* 🌟 [GPT 솔루션 3] 내부 스크롤 엔진 완벽 고정 🌟 */
    .scroll-engine {
        overflow-y: auto !important;
        -webkit-overflow-scrolling: touch !important;
        flex: 1 1 0% !important;
        height: 0 !important; 
        min-height: 0 !important;
        max-height: 100% !important;
    }

    .custom-scroll::-webkit-scrollbar { width: 2px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: rgba(201, 176, 120, 0.2); }

    /* 🌟 [GPT 해결법 4] slide-panel에 min-h-0 클래스 보강 */
    .slide-panel { transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    .slide-panel > div { min-height: 0 !important; }
    .slide-hide { transform: translateX(calc(100% - 2.5rem)); }
    .diary-modal-bg { background-color: rgba(0, 0, 0, 0.3); backdrop-filter: blur(8px); }
  </style>
</head>
<body>

  <input type="file" id="hidden-file-input" style="display: none;" accept="image/*">

  <div class="fixed inset-0 z-[-1] pointer-events-none">
    <img id="global-bg" src="" alt="" class="w-full h-full object-cover opacity-90 transition-opacity duration-1000" style="display:none;" />
  </div>

  <div class="fixed top-20 right-4 md:right-8 z-[9999] flex flex-col items-end space-y-3">
    <button class="minimal-btn" onclick="addNewBoard()"><span>작품 추가</span></button>
    <button class="minimal-btn" onclick="triggerFileUpload('global-bg')"><span>배경 설정</span></button>
    <button class="minimal-btn" style="color: #cfa752;" onclick="saveToBrowser()"><span>전체 저장</span></button>
  </div>

  <header class="fixed top-0 left-0 right-0 z-40 py-8 px-10 flex justify-between items-center bg-transparent">
    <div class="flex flex-col items-start relative logo-container group">
        <h1 class="text-[11px] tracking-[0.4em] font-bold opacity-60" id="header-title" style="color: #3A4B7C !important;">FINE ARTS</h1>
    </div>
    <button id="menu-toggle" class="text-[10px] tracking-[0.2em] font-bold opacity-40 hover:opacity-100 transition-opacity flex items-center space-x-2">
      <span>MENU</span>
      <div class="w-4 h-[1px] bg-current"></div>
    </button>
  </header>

  <main class="px-6 md:px-12 max-w-6xl mx-auto main-wrapper" id="main-content">
    <section class="mb-24">
      <div class="glass-panel rounded-[2.5rem] p-12 relative flex flex-col items-center text-center draggable mx-auto max-w-lg" id="main-desc-box">
        <div class="absolute top-6 right-8 flex space-x-3 opacity-0 group-hover:opacity-100 transition-opacity">
          <button class="text-[9px] opacity-30" onclick="openTextEditor(this.closest('#main-desc-box'))">EDIT</button>
        </div>
        <h2 id="intro-main-title" class="mb-8 text-target leading-relaxed">[소개글 타이틀]</h2>
        <div class="w-8 h-[1px] bg-black/10 mb-10"></div>
        <div class="max-h-[250px] scroll-engine custom-scroll w-full px-6">
            <p class="text-[13px] leading-loose text-target opacity-80">여기에 긴 안내글을 작성하세요.</p>
        </div>
      </div>
    </section>

    <section class="pb-40">
      <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
        <div class="relative w-full h-[450px] overflow-hidden rounded-[2rem] art-frame gallery-item group">
          <img id="art-1" src="" class="art-image opacity-0 transition-opacity">
          <div class="absolute top-6 left-6 z-20 flex space-x-3 opacity-0 group-hover:opacity-100 transition-all translate-y-2 group-hover:translate-y-0">
             <button class="text-[9px] font-bold tracking-widest opacity-40 hover:opacity-100" onclick="triggerFileUpload('art-1')">PHOTO</button>
             <button class="text-[9px] font-bold tracking-widest opacity-20 hover:opacity-100 text-red-500" onclick="deleteElement(this.closest('.gallery-item'))">DEL</button>
          </div>
          <div class="slide-panel absolute inset-0 w-full h-full flex z-10 slide-hide min-h-0">
             <div class="w-10 h-full flex items-center justify-center cursor-pointer bg-black/5 backdrop-blur-sm" onclick="toggleSlide(this)">
                <div class="w-[1px] h-8 bg-black/20"></div>
             </div>
             <div class="flex-1 h-full px-10 py-12 flex flex-col desc-panel relative min-h-0">
                <div class="absolute top-4 right-6 flex space-x-2">
                    <button class="text-[8px] opacity-20" onclick="openStyleEditor(this.closest('.flex-col'))">STYLE</button>
                    <button class="text-[8px] opacity-20" onclick="openTextEditor(this.closest('.flex-col'))">EDIT</button>
                </div>
                <h4 class="text-lg font-serif mb-6 mt-6 text-target shrink-0">[작품 제목]</h4>
                <div class="scroll-engine custom-scroll pr-4">
                  <p class="text-[12px] leading-loose text-target">내용을 입력하세요. 이제 스크롤과 레이아웃 버그가 완전히 해결되었습니다.</p>
                </div>
             </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    /* 🌟 IndexedDB 저장 로직 (최종 안정 버전) */
    const DB_NAME = 'GalleryStoreDB_Final_V29';
    const STORE_NAME = 'GalleryAssets';
    function openDB() { return new Promise((res, rej) => { const req = indexedDB.open(DB_NAME, 1); req.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME); req.onsuccess = (e) => res(e.target.result); req.onerror = rej; }); }
    async function dbSet(k, v) { const db = await openDB(); const tx = db.transaction(STORE_NAME, 'readwrite'); tx.objectStore(STORE_NAME).put(v, k); }
    async function dbGet(k) { const db = await openDB(); return new Promise(res => { const req = db.transaction(STORE_NAME).objectStore(STORE_NAME).get(k); req.onsuccess = () => res(req.result); }); }

    document.getElementById('menu-toggle').onclick = (e) => { e.stopPropagation(); document.getElementById('dropdown-menu').classList.toggle('hidden'); };
    function toggleSlide(handle) { handle.closest('.slide-panel').classList.toggle('slide-hide'); }

    const fileInput = document.getElementById('hidden-file-input');
    let currentImgId = null;
    function triggerFileUpload(id) { currentImgId = id; fileInput.click(); }

    fileInput.onchange = (e) => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas'); const MAX = 1000; let w = img.width, h = img.height;
          if (w > h && w > MAX) { h *= MAX/w; w = MAX; } else if (h > w && h > MAX) { w *= MAX/h; h = MAX; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          const data = canvas.toDataURL('image/jpeg', 0.4);
          if (currentImgId === 'global-bg') {
            document.body.style.backgroundImage = `url(${data})`; document.body.style.backgroundSize = 'cover'; document.body.style.backgroundAttachment = 'fixed';
            document.getElementById('global-bg').src = data; document.getElementById('global-bg').style.display = 'block';
          } else {
            const targetImg = document.getElementById(currentImgId); targetImg.src = data; targetImg.style.opacity = "1";
          }
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    };

    /* 🌟 작품 추가 시에도 GPT 해결법(min-h-0) 강제 적용 */
    function addNewBoard() {
      const grid = document.getElementById('gallery-grid');
      const id = 'art-' + Date.now();
      const html = `
        <div class="relative w-full h-[450px] overflow-hidden rounded-[2rem] art-frame gallery-item group">
          <img id="${id}" src="" class="art-image opacity-0 transition-opacity">
          <div class="absolute top-6 left-6 z-20 flex space-x-3 opacity-0 group-hover:opacity-100 transition-all translate-y-2 group-hover:translate-y-0">
             <button class="text-[9px] font-bold tracking-widest opacity-40 hover:opacity-100" onclick="triggerFileUpload('${id}')">PHOTO</button>
             <button class="text-[9px] font-bold tracking-widest opacity-20 hover:opacity-100 text-red-500" onclick="deleteElement(this.closest('.gallery-item'))">DEL</button>
          </div>
          <div class="slide-panel absolute inset-0 w-full h-full flex z-10 slide-hide min-h-0">
             <div class="w-10 h-full flex items-center justify-center cursor-pointer bg-black/5 backdrop-blur-sm" onclick="toggleSlide(this)"><div class="w-[1px] h-8 bg-black/20"></div></div>
             <div class="flex-1 h-full px-10 py-12 flex flex-col desc-panel relative min-h-0">
                <div class="absolute top-4 right-6 flex space-x-2">
                    <button class="text-[8px] opacity-20" onclick="openStyleEditor(this.closest('.flex-col'))">STYLE</button>
                    <button class="text-[8px] opacity-20" onclick="openTextEditor(this.closest('.flex-col'))">EDIT</button>
                </div>
                <h4 class="text-lg font-serif mb-6 mt-6 text-target shrink-0">[작품 제목]</h4>
                <div class="scroll-engine custom-scroll pr-4">
                    <p class="text-[12px] leading-loose text-target">내용 입력</p>
                </div>
             </div>
          </div>
        </div>`;
      grid.insertAdjacentHTML('beforeend', html);
    }
    // ... 나머지 JS 동일
  </script>
</body>
</html>
