<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Lacey Fine Art | Gallery</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400;700&family=Whisper&display=swap" rel="stylesheet"/>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            galleryGold: '#cfa752',
            galleryTeal: '#d0e4e0', 
          },
          fontFamily: {
            serif: ['"Noto Serif KR"', 'serif'],
            sans: ['"Gowun Dodum"', 'sans-serif'],
            diary: ['"Whisper"', 'cursive'],
          },
        }
      }
    }
  </script>
  
  <style data-purpose="custom-styles">
    body {
      font-family: 'Noto Serif KR', serif;
      -webkit-font-smoothing: antialiased;
      background-color: #d0e4e0; 
      transition: background-image 0.5s ease-in-out;
      overflow-x: hidden;
    }

    .intro-handwriting {
      font-family: 'Whisper', cursive; 
      color: #FF6347; 
      font-size: 1.8rem; 
      font-weight: 500;
      letter-spacing: 0.05em;
      text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.7); 
      line-height: 1.2;
    }

    .intro-desc {
      color: rgba(255, 250, 240, 1); 
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3), 0 0 6px rgba(255, 255, 255, 0.4); 
      font-weight: 400;
    }

    .text-target {
      color: rgba(245, 245, 245, 0.95); 
      font-weight: 300; 
      text-shadow: 0 0 2px rgba(212, 175, 55, 0.4), 1px 1px 1px rgba(0, 0, 0, 0.1);
      letter-spacing: 0.05em;
      transition: all 0.2s ease;
      word-break: break-all;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    .glass-panel-light {
      background: rgba(240, 240, 240, 0.85);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-left: 1px solid rgba(230, 230, 230, 0.9);
    }

    .slide-panel { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }
    .arrow-icon { transition: transform 0.6s ease; }
    .slide-hide { transform: translateX(calc(100% - 3.5rem)); }

    /* 🌟 게시판 무제한 크기 조절 애니메이션 */
    .gallery-item {
      transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      height: 400px; 
      min-height: 400px;
    }
    .gallery-item.expanded {
      height: auto; 
      min-height: 800px;
    }

    .water-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.35rem 0.75rem; color: #3b6b6d;
      background-color: rgba(255, 255, 255, 0.8); border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 20px; font-size: 0.75rem; font-weight: 700; cursor: pointer;
    }
    
    .ghost-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.4rem 1rem; color: rgba(80, 90, 90, 0.8);
      background-color: rgba(255, 255, 255, 0.3); border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 20px; font-size: 0.75rem; font-weight: 600; cursor: pointer; backdrop-filter: blur(4px);
    }

    .tts-controls {
      display: flex; align-items: center; gap: 8px; margin-top: auto;
      background: rgba(255, 255, 255, 0.4); padding: 5px 12px; border-radius: 15px;
    }

    .bottom-sheet {
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .bottom-sheet.open { transform: translateY(0); }

    .diary-modal-bg { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
  </style>
</head>
<body class="text-[#1a4142]">

  <input type="file" id="hidden-file-input" style="display: none;" accept="image/*">

  <div class="fixed inset-0 z-[-1] pointer-events-none">
    <img id="global-bg" src="" alt="" class="w-full h-full object-cover opacity-90 transition-opacity duration-1000" style="display:none;" />
  </div>

  <div class="fixed top-[90px] right-4 md:right-8 z-[9999] flex flex-col space-y-2">
    <button class="ghost-btn shadow-sm" onclick="triggerFileUpload('global-bg')">배경 사진 넣기</button>
    <button class="ghost-btn shadow-md border-galleryGold text-galleryGold bg-white/70 font-bold" onclick="saveToBrowser()">
      ✅ 전체 고정 (저장)
    </button>
  </div>

  <header class="sticky top-0 z-40 py-6 px-8 flex justify-between items-start bg-[#d0e4e0]/60 backdrop-blur-md border-b border-white/20">
    <div class="flex flex-col items-start relative group logo-container">
      <div class="absolute -top-4 right-0 opacity-0 group-hover:opacity-100 transition-opacity z-10 flex space-x-1">
        <button class="water-btn !text-[10px] !px-2 !py-1" onclick="openTextEditor(this.closest('.logo-container'))">수정</button>
        <button class="water-btn !text-[10px] !px-2 !py-1 !bg-galleryGold !text-white" onclick="openStyleEditor(this.closest('.logo-container'))">스타일</button>
      </div>
      <div class="mb-1">
        <svg width="30" height="30" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M25 45C36.0457 45 45 36.0457 45 25C45 13.9543 36.0457 5 25 5C13.9543 5 5 13.9543 5 25C5 36.0457 13.9543 45 25 45Z" stroke="#cfa752" stroke-width="2"/>
          <path d="M15 25H35" stroke="#cfa752" stroke-width="2"/>
          <path d="M25 15V35" stroke="#cfa752" stroke-width="2"/>
        </svg>
      </div>
      <h1 class="text-xs tracking-widest font-bold text-[#1a4142] text-target" id="header-title">LACEY FINE ART</h1>
    </div>
    <button class="water-btn !bg-white/40">MENU</button>
  </header>

  <main class="px-4 md:px-8 max-w-6xl mx-auto pt-16">
    <section class="py-12">
      <div class="glass-panel rounded-3xl p-8 relative flex flex-col items-center text-center draggable mx-auto max-w-xl shadow-lg border-white/40 bg-white/20" id="draggable-desc">
        <div class="absolute top-4 right-4 flex space-x-1 z-30">
          <button class="water-btn !bg-galleryGold !text-white" onclick="openStyleEditor(this.closest('#draggable-desc'))">스타일</button>
          <button class="water-btn" onclick="openTextEditor(this.closest('#draggable-desc'))">수정</button>
          <button class="water-btn" onclick="deleteElement(this.closest('#draggable-desc'))">삭제</button>
        </div>
        <p class="mb-2 intro-handwriting text-target">[라벨 입력]</p>
        <h2 class="mb-4 intro-handwriting text-target" style="font-size: 2.2rem;">[소개글 타이틀 입력]</h2>
        <div class="w-12 h-1 bg-[#cfa752] mb-6 rounded-full opacity-80"></div>
        <p class="text-sm leading-relaxed max-w-md text-target intro-desc" id="intro-p">
          [여기에 상세 소개글을 입력하세요. 텍스트를 수정하고 우측 상단의 '전체 고정 (저장)' 버튼을 누르시면 저장됩니다.]
        </p>
        <div class="tts-controls mt-4 scale-90">
          <button onclick="speakText('intro-p')" class="text-[10px] font-bold">▶ 재생</button>
          <input type="range" min="0.5" max="2" step="0.1" value="1" class="w-16 accent-galleryGold" onchange="speechRate = this.value">
        </div>
      </div>
    </section>

    <section class="pb-20">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        
        <div class="relative w-full overflow-hidden rounded-2xl shadow-xl bg-white gallery-item" id="item-1">
          <img id="art-img-1" src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=600" alt="Art 1" class="absolute inset-0 w-full h-full object-cover">
          
          <div class="absolute top-4 left-4 z-20 flex flex-col space-y-2">
             <button class="ghost-btn !text-[10px] !bg-white/90" onclick="triggerFileUpload('art-img-1')">📸 사진 넣기</button>
             <button class="ghost-btn !text-[10px] !bg-white/80" onclick="toggleExpand('item-1')">📏 크기 조절</button>
          </div>

          <div class="slide-panel absolute inset-0 w-full h-full flex z-10">
             <div class="w-14 h-full flex flex-col justify-center items-center cursor-pointer bg-white/40 backdrop-blur-md border-r border-white/60" onclick="toggleSlide(this)">
                <svg class="w-6 h-6 text-[#1a4142] arrow-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
             </div>
             <div class="flex-1 h-full px-6 py-8 flex flex-col relative glass-panel-light text-content">
                <div class="absolute top-4 right-4 flex space-x-1 z-20">
                  <button class="water-btn !text-[10px] !bg-galleryGold !text-white" onclick="openStyleEditor(this.closest('.text-content'))">스타일</button>
                  <button class="water-btn !text-[10px]" onclick="openTextEditor(this.closest('.text-content'))">수정</button>
                </div>
                <h4 class="text-xl font-serif mb-3 mt-6 text-[#1a4142] text-target">[작품 제목 1]</h4>
                <div class="flex-grow overflow-y-auto pr-2">
                  <p id="p-1" class="text-sm leading-relaxed text-[#555] text-target">[여기에 긴 글을 작성하세요.]</p>
                </div>
                <div class="tts-controls mt-4">
                  <button onclick="speakText('p-1')" class="text-[10px] font-bold">▶ 재생</button>
                  <input type="range" min="0.5" max="2" step="0.1" value="1" class="w-12 accent-galleryGold" onchange="speechRate = this.value">
                </div>
             </div>
          </div>
        </div>

        <div class="relative w-full overflow-hidden rounded-2xl shadow-xl bg-white gallery-item" id="item-2">
          <img id="art-img-2" src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=600" alt="Art 2" class="absolute inset-0 w-full h-full object-cover object-top">
          
          <div class="absolute top-4 left-4 z-20 flex flex-col space-y-2">
             <button class="ghost-btn !text-[10px] !bg-white/90" onclick="triggerFileUpload('art-img-2')">📸 사진 넣기</button>
             <button class="ghost-btn !text-[10px] !bg-white/80" onclick="toggleExpand('item-2')">📏 크기 조절</button>
          </div>

          <div class="slide-panel absolute inset-0 w-full h-full flex z-10">
             <div class="w-14 h-full flex flex-col justify-center items-center cursor-pointer bg-white/40 backdrop-blur-md border-r border-white/60" onclick="toggleSlide(this)">
                <svg class="w-6 h-6 text-[#1a4142] arrow-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
             </div>
             <div class="flex-1 h-full px-6 py-8 flex flex-col relative glass-panel-light text-content">
                <div class="absolute top-4 right-4 flex space-x-1 z-20">
                  <button class="water-btn !text-[10px] !bg-galleryGold !text-white" onclick="openStyleEditor(this.closest('.text-content'))">스타일</button>
                  <button class="water-btn !text-[10px]" onclick="openTextEditor(this.closest('.text-content'))">수정</button>
                </div>
                <h4 class="text-xl font-serif mb-3 mt-6 text-[#1a4142] text-target">[작품 제목 2]</h4>
                <div class="flex-grow overflow-y-auto pr-2">
                  <p id="p-2" class="text-sm leading-relaxed text-[#555] text-target">[여기에 긴 글을 작성하세요.]</p>
                </div>
                <div class="tts-controls mt-4">
                  <button onclick="speakText('p-2')" class="text-[10px] font-bold">▶ 재생</button>
                  <input type="range" min="0.5" max="2" step="0.1" value="1" class="w-12 accent-galleryGold" onchange="speechRate = this.value">
                </div>
             </div>
          </div>
        </div>

        <div class="relative w-full overflow-hidden rounded-2xl shadow-xl bg-white gallery-item" id="item-3">
          <img id="art-img-3" src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=600" alt="Art 3" class="absolute inset-0 w-full h-full object-cover object-top">
          
          <div class="absolute top-4 left-4 z-20 flex flex-col space-y-2">
             <button class="ghost-btn !text-[10px] !bg-white/90" onclick="triggerFileUpload('art-img-3')">📸 사진 넣기</button>
             <button class="ghost-btn !text-[10px] !bg-white/80" onclick="toggleExpand('item-3')">📏 크기 조절</button>
          </div>

          <div class="slide-panel absolute inset-0 w-full h-full flex z-10">
             <div class="w-14 h-full flex flex-col justify-center items-center cursor-pointer bg-white/40 backdrop-blur-md border-r border-white/60" onclick="toggleSlide(this)">
                <svg class="w-6 h-6 text-[#1a4142] arrow-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
             </div>
             <div class="flex-1 h-full px-6 py-8 flex flex-col relative glass-panel-light text-content">
                <div class="absolute top-4 right-4 flex space-x-1 z-20">
                  <button class="water-btn !text-[10px] !bg-galleryGold !text-white" onclick="openStyleEditor(this.closest('.text-content'))">스타일</button>
                  <button class="water-btn !text-[10px]" onclick="openTextEditor(this.closest('.text-content'))">수정</button>
                </div>

                <div class="flex-grow overflow-y-auto pr-2">
                  <p id="p-3" class="text-sm leading-relaxed text-[#555] text-target">[여기에 긴 글을 작성하세요.]</p>
                </div>
                <div class="tts-controls mt-4">
                  <button onclick="speakText('p-3')" class="text-[10px] font-bold">▶ 재생</button>
                  <input type="range" min="0.5" max="2" step="0.1" value="1" class="w-12 accent-galleryGold" onchange="speechRate = this.value">

  <div id="text-editor-modal" class="fixed inset-0 z-[10000] hidden items-center justify-center diary-modal-bg">
    <div class="bg-white w-[90%] max-w-md p-6 rounded-2xl shadow-2xl">
      <h3 class="text-lg font-bold mb-4 text-[#1a4142] font-serif">📝 글쓰기 (내용 수정)</h3>
      <textarea id="modal-textarea" class="w-full h-48 p-4 border rounded-xl font-serif" placeholder="내용을 입력하세요..."></textarea>
      <div class="flex justify-end space-x-3 mt-4">
        <button class="px-5 py-2 bg-gray-200 text-gray-700 rounded-full font-bold text-sm" onclick="closeTextEditor()">취소</button>
        <button class="px-5 py-2 bg-[#8ac6b8] text-white rounded-full font-bold text-sm" onclick="saveTextChanges()">확인</button>
      </div>
    </div>
  </div>

  <div id="style-editor-modal" class="fixed inset-0 z-[10000] hidden items-end md:items-center justify-center diary-modal-bg">
    <div id="style-bottom-sheet" class="bottom-sheet bg-white w-full md:w-[90%] md:max-w-md p-6 rounded-t-3xl md:rounded-2xl shadow-2xl">
      <div class="flex justify-between items-center mb-6"><h3 class="font-bold">🎨 스타일 설정</h3><button onclick="closeStyleEditor()">✕</button></div>
      <div class="space-y-4">
        <div class="flex justify-between items-center"><label>글자색</label><input type="color" id="val-color"></div>
        <div><label>글자 크기</label><input type="range" id="val-size" min="10" max="60" value="16" class="w-full accent-galleryGold"></div>
      </div>
      <button class="mt-6 px-5 py-3 bg-galleryGold text-white rounded-xl w-full font-bold" onclick="closeStyleEditor()">설정 완료</button>
    </div>
  </div>

  <script>
    // ---------------- 🌟 사진 업로드 ----------------
    let currentImgId = null;
    const fileInput = document.getElementById('hidden-file-input');

    function triggerFileUpload(imgId) { currentImgId = imgId; fileInput.click(); }
    
    fileInput.addEventListener('change', function(e) {
      if (e.target.files && e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = function(event) {
          if (currentImgId === 'global-bg') {
            document.body.style.backgroundImage = `url('${event.target.result}')`;
            document.body.style.backgroundSize = 'cover';
            document.getElementById('global-bg').src = event.target.result;
            document.getElementById('global-bg').style.display = 'block';
          } else {
            document.getElementById(currentImgId).src = event.target.result;
          }
        }
        reader.readAsDataURL(e.target.files[0]);
      }
      fileInput.value = '';
    });

    // ---------------- TTS & 크기 조절 ----------------
    let speechRate = 1;
    function speakText(id) {
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(document.getElementById(id).innerText);
      utterance.lang = 'ko-KR'; utterance.rate = speechRate;
      window.speechSynthesis.speak(utterance);
    }
    
    function toggleExpand(id) { document.getElementById(id).classList.toggle('expanded'); }

    // ---------------- 스타일 편집기 ----------------
    let styleTargets = [];
    function openStyleEditor(container) {
      styleTargets = container.querySelectorAll('.text-target');
      document.getElementById('style-editor-modal').classList.remove('hidden');
      document.getElementById('style-editor-modal').classList.add('flex');
      setTimeout(() => document.getElementById('style-bottom-sheet').classList.add('open'), 10);
    }
    
    document.getElementById('val-color').addEventListener('input', (e) => { 
        styleTargets.forEach(t => t.style.color = e.target.value); 
    });
    
    document.getElementById('val-size').addEventListener('input', (e) => { 
        styleTargets.forEach(t => t.style.fontSize = e.target.value + 'px'); 
    });
    
    function closeStyleEditor() {
      document.getElementById('style-bottom-sheet').classList.remove('open');
      setTimeout(() => document.getElementById('style-editor-modal').classList.add('hidden'), 300);
    }

    // ---------------- 텍스트 수정 & 슬라이드 & 드래그 ----------------
    function toggleSlide(h) {
      h.closest('.slide-panel').classList.toggle('slide-hide');
      h.querySelector('.arrow-icon').classList.toggle('rotate-180');
    }
    
    let currentTextTargets = [];
    function openTextEditor(container) {
      currentTextTargets = container.classList.contains('text-target') ? [container] : container.querySelectorAll('.text-target');
      document.getElementById('modal-textarea').value = currentTextTargets[0].innerText;
      document.getElementById('text-editor-modal').classList.remove('hidden');
      document.getElementById('text-editor-modal').classList.add('flex');
    }
    
    function closeTextEditor() {
      document.getElementById('text-editor-modal').classList.add('hidden');
      document.getElementById('text-editor-modal').classList.remove('flex');
    }

    function saveTextChanges() {
      if(currentTextTargets.length > 0) currentTextTargets[0].innerText = document.getElementById('modal-textarea').value;
      closeTextEditor();
    }
    
    function deleteElement(element) { if (confirm('정말로 삭제하시겠습니까?')) element.remove(); }

    function makeDraggable(elmnt) {
      var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
      elmnt.onmousedown = dragMouseDown; elmnt.ontouchstart = dragTouchStart; 
      function dragMouseDown(e) { if(e.target.tagName.toLowerCase() === 'button' || e.target.tagName.toLowerCase() === 'input') return; e.preventDefault(); pos3 = e.clientX; pos4 = e.clientY; document.onmouseup = closeDragElement; document.onmousemove = elementDrag; }
      function dragTouchStart(e) { if(e.target.tagName.toLowerCase() === 'button' || e.target.tagName.toLowerCase() === 'input') return; var touch = e.touches[0]; pos3 = touch.clientX; pos4 = touch.clientY; document.ontouchend = closeDragElement; document.ontouchmove = elementTouchDrag; }
      function elementDrag(e) { e.preventDefault(); pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY; pos3 = e.clientX; pos4 = e.clientY; elmnt.style.top = (elmnt.offsetTop - pos2) + "px"; elmnt.style.left = (elmnt.offsetLeft - pos1) + "px"; }
      function elementTouchDrag(e) { var touch = e.touches[0]; pos1 = pos3 - touch.clientX; pos2 = pos4 - touch.clientY; pos3 = touch.clientX; pos4 = touch.clientY; elmnt.style.top = (elmnt.offsetTop - pos2) + "px"; elmnt.style.left = (elmnt.offsetLeft - pos1) + "px"; }
      function closeDragElement() { document.onmouseup = null; document.onmousemove = null; document.ontouchend = null; document.ontouchmove = null; }
    }

    // ---------------- 🌟 브라우저 영구 저장 & 불러오기 ----------------
    function saveToBrowser() {
      try {
        const textMap = {};
        const styleMap = {};
        document.querySelectorAll('.text-target').forEach((el, index) => {
            textMap['text-' + index] = el.innerHTML; 
            styleMap['style-' + index] = el.getAttribute('style') || '';
        });
        localStorage.setItem('gallery_texts', JSON.stringify(textMap));
        localStorage.setItem('gallery_styles', JSON.stringify(styleMap));

        const imageMap = {};
        document.querySelectorAll('img').forEach(img => {
          if (img.id && img.src.startsWith('data:image')) {
            imageMap[img.id] = img.src;
          }
        });
        localStorage.setItem('gallery_images', JSON.stringify(imageMap));

        const bg = document.getElementById('global-bg');
        if (bg && bg.src && bg.src.startsWith('data:image')) {
          localStorage.setItem('gallery_bg', bg.src);
        } else {
          localStorage.removeItem('gallery_bg');
        }

        alert('✅ 저장 완료되었습니다!');
      } catch (e) {
        console.error(e);
        alert('저장 중 오류 발생 (사진 용량이 너무 클 수 있습니다)');
      }
    }

    function loadFromBrowser() {
      try {
        const textMap = JSON.parse(localStorage.getItem('gallery_texts') || '{}');
        const styleMap = JSON.parse(localStorage.getItem('gallery_styles') || '{}');
        const imageMap = JSON.parse(localStorage.getItem('gallery_images') || '{}');
        const bg = localStorage.getItem('gallery_bg');

        document.querySelectorAll('.text-target').forEach((el, index) => {
          if (textMap['text-' + index]) el.innerHTML = textMap['text-' + index];
          if (styleMap['style-' + index]) el.setAttribute('style', styleMap['style-' + index]);
        });

        Object.keys(imageMap).forEach(id => {
          const img = document.getElementById(id);
          if (img) img.src = imageMap[id];
        });

        if (bg) {
          document.body.style.backgroundImage = `url('${bg}')`;
          document.body.style.backgroundSize = 'cover';
          document.body.style.backgroundPosition = 'center';
          document.body.style.backgroundAttachment = 'fixed';

          const bgEl = document.getElementById('global-bg');
          if (bgEl) {
            bgEl.src = bg;
            bgEl.style.display = 'block';
          }
        }
      } catch (e) {
        console.error("저장된 데이터 불러오기 실패:", e);
      }
    }

    // ---------------- 초기 실행 ----------------
    window.addEventListener('DOMContentLoaded', () => {
      loadFromBrowser();
      const draggable = document.getElementById('draggable-desc');
      if (draggable) makeDraggable(draggable);
    });
  </script>
</body>
</html>
