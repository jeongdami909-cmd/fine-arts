<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Lacey Fine Art | Gallery</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400;700&family=Whisper&display=swap" rel="stylesheet"/>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { galleryGold: '#cfa752', galleryTeal: '#d0e4e0' },
          fontFamily: {
            serif: ['"Noto Serif KR"', 'serif'],
            sans: ['"Gowun Dodum"', 'sans-serif'],
            diary: ['"Whisper"', 'cursive'],
          },
        }
      }
    }
  </script>
  
  <style data-purpose="custom-styles">
    body {
      font-family: 'Noto Serif KR', serif;
      -webkit-font-smoothing: antialiased;
      background-color: #d0e4e0; 
      transition: background-image 0.5s ease-in-out;
      overflow-x: hidden;
    }

    /* 🌟 상단 버튼 디자인 유지 */
    .minimal-btn {
      width: 32px; height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 999px; font-size: 0.75rem; color: rgba(26, 65, 66, 0.4);
      background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(4px);
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden; white-space: nowrap; border: 1px solid rgba(255,255,255,0.2);
    }
    .minimal-btn::before { content: "-"; }
    .minimal-btn span { width: 0; opacity: 0; transition: all 0.6s; font-weight: 500; }
    
    .minimal-btn:hover, .minimal-btn:active {
      width: 100px; color: rgba(26, 65, 66, 0.8);
      background: rgba(255, 255, 255, 0.6);
    }
    .minimal-btn:hover::before, .minimal-btn:active::before { content: ""; width: 0; opacity: 0; }
    .minimal-btn:hover span, .minimal-btn:active span { width: auto; opacity: 1; margin-left: 4px; }

    /* 🌟 핵심 변경: 본문 텍스트 색상 및 두께 수정 🌟 */
    .text-target {
      color: #D9CEBD; /* 은은한 회색빛 골드 색상 (절대 튀지 않음) */
      font-weight: 300; /* 얇은 두께 설정 */
      letter-spacing: 0.05em;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* 🌟 주홍빛 필기체 타이틀 고정 스타일 (그대로 유지) */
    #intro-main-title {
        font-family: 'Whisper', cursive !important;
        color: #FF7F50 !important;
        text-shadow: 1px 1px 0px rgba(255,255,255,0.8), 2px 2px 4px rgba(192,192,192,0.5) !important;
        font-size: 3.2rem !important;
        font-weight: 400 !important;
        line-height: 1.1 !important;
        display: block !important;
    }

    .main-wrapper { margin-top: 65vh; }
    .gallery-item { background: transparent !important; box-shadow: none !important; }
    
    .art-frame { 
      background: rgba(255,255,255,0.05) !important; 
      border: 1px solid rgba(255,255,255,0.1); 
      display: flex; align-items: center; justify-content: center;
    }
    .art-image { width: 100%; height: 100%; object-fit: contain !important; }
    
    /* 설명창 배경 (은은한 반투명 유지) */
    .desc-panel {
      background: rgba(0, 0, 0, 0.4) !important;
      backdrop-filter: blur(10px);
      border-left: 1px solid rgba(255,255,255,0.3);
      display: flex; flex-direction: column; 
      height: 100%; min-height: 0;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* 디자인용 커스텀 스크롤바 스타일 (유지) */
    .custom-scroll::-webkit-scrollbar { width: 2px; }
    /* 스크롤바 색상도 본문 색상에 맞춰 살짝 조정 */
    .custom-scroll::-webkit-scrollbar-thumb { background: rgba(217, 206, 189, 0.3); } 

    /* 지피티 솔루션 핵심 CSS: 실제 스크롤 로직만 담당 (유지) */
    .scroll-engine {
        overflow-y: auto !important;
        -webkit-overflow-scrolling: touch !important;
        flex: 1 1 0% !important;
        height: 0 !important;
        min-height: 0 !important;
    }

    .slide-panel { transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    .slide-hide { transform: translateX(calc(100% - 2.5rem)); }
    .diary-modal-bg { background-color: rgba(0, 0, 0, 0.3); backdrop-filter: blur(8px); }
  </style>
</head>
<body>

  <input type="file" id="hidden-file-input" style="display: none;" accept="image/*">

  <div class="fixed inset-0 z-[-1] pointer-events-none">
    <img id="global-bg" src="" alt="" class="w-full h-full object-cover opacity-90 transition-opacity duration-1000" style="display:none;" />
  </div>

  <div class="fixed top-20 right-4 md:right-8 z-[9999] flex flex-col items-end space-y-3">
    <button class="minimal-btn" onclick="addNewBoard()"><span>작품 추가</span></button>
    <button class="minimal-btn" onclick="triggerFileUpload('global-bg')"><span>배경 설정</span></button>
    <button class="minimal-btn" style="color: #cfa752;" onclick="saveToBrowser()"><span>전체 저장</span></button>
  </div>

  <header class="fixed top-0 left-0 right-0 z-40 py-8 px-10 flex justify-between items-center bg-transparent">
    <div class="flex flex-col items-start relative logo-container group">
        <div class="absolute -right-12 top-0 opacity-0 group-hover:opacity-100 transition-opacity">
            <button class="text-[9px] uppercase tracking-tighter opacity-40" onclick="openTextEditor(this.closest('.logo-container'))">edit</button>
        </div>
        <h1 class="text-[11px] tracking-[0.4em] font-bold text-target opacity-60" id="header-title">FINE ARTS</h1>
    </div>
    
    <div class="relative">
      <button id="menu-toggle" class="text-[10px] tracking-[0.2em] font-bold opacity-40 hover:opacity-100 transition-opacity flex items-center space-x-2">
        <span>MENU</span>
        <div class="w-4 h-[1px] bg-current"></div>
      </button>

      <div id="dropdown-menu" class="hidden absolute right-0 mt-6 w-72 bg-white/10 backdrop-blur-2xl border border-white/20 shadow-2xl rounded-2xl overflow-hidden z-50">
        <div class="p-6 bg-white/5 text-[9px] font-bold tracking-[0.2em] opacity-40 border-b border-white/10">DIRECTORY</div>
        <div id="menu-list" class="p-6 space-y-6 custom-scroll max-h-[60vh] overflow-y-auto">
          <div class="space-y-3">
            <div class="flex justify-between items-center group">
              <a href="javascript:void(0)" class="text-xs font-bold text-target opacity-80">[상위 카테고리]</a>
              <button class="text-[8px] opacity-0 group-hover:opacity-30 transition-opacity" onclick="openTextEditor(this.previousElementSibling)">EDIT</button>
            </div>
            <div class="pl-4 space-y-2 border-l border-white/10">
              <div class="flex justify-between items-center group">
                <a href="javascript:void(0)" class="text-[11px] text-target opacity-60 hover:opacity-100 transition-all">- [하위 메뉴]</a>
                <button class="text-[8px] opacity-0 group-hover:opacity-30 transition-opacity" onclick="openTextEditor(this.previousElementSibling)">EDIT</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="px-6 md:px-12 max-w-6xl mx-auto main-wrapper" id="main-content">
    <section class="mb-24">
      <div class="glass-panel rounded-[2.5rem] p-12 relative flex flex-col items-center text-center draggable mx-auto max-w-lg" id="main-desc-box">
        <div class="absolute top-6 right-8 flex space-x-3 opacity-0 group-hover:opacity-100 transition-opacity">
          <button class="text-[9px] opacity-30" onclick="openTextEditor(this.closest('#main-desc-box'))">EDIT</button>
        </div>
        <h2 id="intro-main-title" class="mb-8 text-target leading-relaxed">[소개글 타이틀]</h2>
        <div class="w-8 h-[1px] bg-black/10 mb-10"></div>
        <div class="max-h-[250px] scroll-engine custom-scroll w-full px-6">
            <p class="text-[13px] leading-loose text-target opacity-80">여기에 긴 안내글을 작성하세요.</p>
        </div>
      </div>
    </section>

    <section class="pb-40">
      <div id="gallery-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
        <div class="relative w-full h-[450px] overflow-hidden rounded-[2rem] art-frame gallery-item group">
          <img id="art-1" src="" class="art-image opacity-0 transition-opacity">
          <div class="absolute top-6 left-6 z-20 flex space-x-3 opacity-0 group-hover:opacity-100 transition-all translate-y-2 group-hover:translate-y-0">
             <button class="text-[9px] font-bold tracking-widest opacity-40 hover:opacity-100" onclick="triggerFileUpload('art-1')">PHOTO</button>
             <button class="text-[9px] font-bold tracking-widest opacity-20 hover:opacity-100 text-red-500" onclick="deleteElement(this.closest('.gallery-item'))">DEL</button>
          </div>
          <div class="slide-panel absolute inset-0 w-full h-full flex z-10 slide-hide min-h-0">
             <div class="w-10 h-full flex items-center justify-center cursor-pointer bg-black/5 backdrop-blur-sm" onclick="toggleSlide(this)">
                <div class="w-[1px] h-8 bg-black/20"></div>
             </div>
             <div class="flex-1 h-full px-10 py-12 flex flex-col desc-panel relative min-h-0">
                <div class="absolute top-4 right-6 flex space-x-2">
                    <button class="text-[8px] opacity-20" onclick="openStyleEditor(this.closest('.flex-col'))">STYLE</button>
                    <button class="text-[8px] opacity-20" onclick="openTextEditor(this.closest('.flex-col'))">EDIT</button>
                </div>
                <h4 class="text-lg font-serif mb-6 mt-6 text-target shrink-0">[작품 제목]</h4>
                <div class="scroll-engine custom-scroll pr-4">
                  <p class="text-[12px] leading-loose text-target">내용을 입력하세요. 은은한 골드빛 글씨가 적용되었습니다.</p>
                </div>
             </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="text-editor-modal" class="fixed inset-0 z-[10000] hidden items-center justify-center diary-modal-bg px-6">
    <div class="bg-white/90 backdrop-blur-3xl w-full max-w-md p-10 rounded-[3rem] shadow-2xl">
      <h3 class="text-sm font-bold mb-8 opacity-40 tracking-widest">EDIT CONTENT</h3>
      <textarea id="modal-textarea" class="w-full h-64 p-0 border-none bg-transparent focus:ring-0 resize-none font-serif text-sm custom-scroll leading-relaxed"></textarea>
      <div class="flex justify-end space-x-6 mt-10">
        <button class="text-xs opacity-30" onclick="closeTextEditor()">CANCEL</button>
        <button class="text-xs font-bold text-galleryGold" onclick="saveTextChanges()">APPLY</button>
      </div>
    </div>
  </div>

  <div id="style-editor-modal" class="fixed inset-0 z-[10000] hidden items-center justify-center diary-modal-bg px-6">
    <div id="style-bottom-sheet" class="bg-white/90 backdrop-blur-3xl w-full max-w-sm p-10 rounded-[3rem] shadow-2xl">
      <h3 class="text-sm font-bold mb-8 opacity-40 tracking-widest">STYLE SETTINGS</h3>
      <div class="space-y-8">
        <div class="flex justify-between items-center"><label class="text-[10px] opacity-50 font-bold">COLOR</label><input type="color" id="val-color" class="w-8 h-8 border-none bg-transparent"></div>
        <div class="flex flex-col gap-3"><label class="text-[10px] opacity-50 font-bold">FONT</label>
          <select id="val-font" class="text-xs p-0 bg-transparent border-none focus:ring-0">
            <option value="'Noto Serif KR', serif">Noto Serif</option>
            <option value="'Gowun Dodum', sans-serif">Gowun Dodum</option>
            <option value="'Whisper', cursive">Handwriting</option>
          </select>
        </div>
        <div class="flex flex-col gap-3"><label class="text-[10px] opacity-50 font-bold">SIZE</label><input type="range" id="val-size" min="10" max="40" class="accent-black/10"></div>
      </div>
      <button class="w-full mt-12 text-xs font-bold tracking-widest py-4 border-t border-black/5" onclick="closeStyleEditor()">DONE</button>
    </div>
  </div>

  <script>
    const DB_NAME = 'GalleryStoreDB_Final_V22';
    const STORE_NAME = 'GalleryAssets';
    function openDB() { return new Promise((res, rej) => { const req = indexedDB.open(DB_NAME, 1); req.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME); req.onsuccess = (e) => res(e.target.result); req.onerror = rej; }); }
    async function dbSet(k, v) { const db = await openDB(); const tx = db.transaction(STORE_NAME, 'readwrite'); tx.objectStore(STORE_NAME).put(v, k); }
    async function dbGet(k) { const db = await openDB(); return new Promise(res => { const req = db.transaction(STORE_NAME).objectStore(STORE_NAME).get(k); req.onsuccess = () => res(req.result); }); }

    document.getElementById('menu-toggle').onclick = (e) => { e.stopPropagation(); document.getElementById('dropdown-menu').classList.toggle('hidden'); };
    function toggleSlide(handle) { handle.closest('.slide-panel').classList.toggle('slide-hide'); }

    const fileInput = document.getElementById('hidden-file-input');
    let currentImgId = null;
    function triggerFileUpload(id) { currentImgId = id; fileInput.click(); }

    fileInput.onchange = (e) => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas'); const MAX = 1000; let w = img.width, h = img.height;
          if (w > h && w > MAX) { h *= MAX/w; w = MAX; } else if (h > w && h > MAX) { w *= MAX/h; h = MAX; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          const data = canvas.toDataURL('image/jpeg', 0.4);
          if (currentImgId === 'global-bg') {
            document.body.style.backgroundImage = `url(${data})`; document.body.style.backgroundSize = 'cover'; document.body.style.backgroundAttachment = 'fixed';
            document.getElementById('global-bg').src = data; document.getElementById('global-bg').style.display = 'block';
          } else {
            const targetImg = document.getElementById(currentImgId); targetImg.src = data; targetImg.style.opacity = "1";
          }
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    };

    /* 🌟 모든 게시판 지피티 스크롤 솔루션 완벽 적용 설계 (유지) 🌟 */
    function addNewBoard() {
      const grid = document.getElementById('gallery-grid');
      const id = 'art-' + Date.now();
      const html = `
        <div class="relative w-full h-[450px] overflow-hidden rounded-[2rem] art-frame gallery-item group">
          <img id="${id}" src="" class="art-image opacity-0 transition-opacity">
          <div class="absolute top-6 left-6 z-20 flex space-x-3 opacity-0 group-hover:opacity-100 transition-all translate-y-2 group-hover:translate-y-0">
             <button class="text-[9px] font-bold tracking-widest opacity-40 hover:opacity-100" onclick="triggerFileUpload('${id}')">PHOTO</button>
             <button class="text-[9px] font-bold tracking-widest opacity-20 hover:opacity-100 text-red-500" onclick="deleteElement(this.closest('.gallery-item'))">DEL</button>
          </div>
          <div class="slide-panel absolute inset-0 w-full h-full flex z-10 slide-hide min-h-0">
             <div class="w-10 h-full flex items-center justify-center cursor-pointer bg-black/5 backdrop-blur-sm" onclick="toggleSlide(this)"><div class="w-[1px] h-8 bg-black/20"></div></div>
             <div class="flex-1 h-full px-10 py-12 flex flex-col desc-panel relative min-h-0">
                <div class="absolute top-4 right-6 flex space-x-2">
                    <button class="text-[8px] opacity-20" onclick="openStyleEditor(this.closest('.flex-col'))">STYLE</button>
                    <button class="text-[8px] opacity-20" onclick="openTextEditor(this.closest('.flex-col'))">EDIT</button>
                </div>
                <h4 class="text-lg font-serif mb-6 mt-6 text-target shrink-0">[작품 제목]</h4>
                <div class="scroll-engine custom-scroll pr-4">
                    <p class="text-[12px] leading-loose text-target">내용 입력</p>
                </div>
             </div>
          </div>
        </div>`;
      grid.insertAdjacentHTML('beforeend', html);
    }

    const tModal = document.getElementById('text-editor-modal');
    const tArea = document.getElementById('modal-textarea');
    let tTargets = [];
    function openTextEditor(el) {
      tTargets = el.classList.contains('text-target') ? [el] : Array.from(el.querySelectorAll('.text-target'));
      if(tTargets.length === 0 && (el.tagName === 'A' || el.tagName === 'H1')) tTargets = [el];
      tArea.value = tTargets.map(t => t.innerText).join('\n');
      tModal.classList.replace('hidden', 'flex');
    }
    function closeTextEditor() { tModal.classList.replace('flex', 'hidden'); }
    function saveTextChanges() {
      const lines = tArea.value.split('\n');
      tTargets.forEach((t, i) => { if(i === tTargets.length -1) t.innerText = lines.slice(i).join('\n'); else t.innerText = lines[i] || ""; });
      closeTextEditor();
    }

    const sModal = document.getElementById('style-editor-modal');
    let sTargets = [];
    function openStyleEditor(el) {
      sTargets = el.classList.contains('text-target') ? [el] : Array.from(el.querySelectorAll('.text-target'));
      sModal.classList.replace('hidden', 'flex');
    }
    function closeStyleEditor() { sModal.classList.replace('flex', 'hidden'); }

    document.getElementById('val-color').oninput = (e) => sTargets.forEach(t => t.style.color = e.target.value);
    document.getElementById('val-font').onchange = (e) => sTargets.forEach(t => t.style.fontFamily = e.target.value);
    document.getElementById('val-size').oninput = (e) => sTargets.forEach(t => t.style.fontSize = e.target.value + 'px');

    function deleteElement(el) { if(confirm('Delete?')) el.remove(); }

    async function saveToBrowser() {
      try {
        const mainClone = document.getElementById('main-content').cloneNode(true);
        mainClone.querySelectorAll('img').forEach(img => { if(img.src.startsWith('data:image')) img.src = ''; });
        const menuLayout = document.getElementById('menu-list').innerHTML;
        const txts = {}, stys = {}, imgs = {};
        document.querySelectorAll('.text-target').forEach((t, i) => { txts[i] = t.innerHTML; stys[i] = t.getAttribute('style') || ''; });
        document.querySelectorAll('img').forEach(img => { if(img.id && img.src.startsWith('data:image')) imgs[img.id] = img.src; });
        await dbSet('lay_v22', mainClone.innerHTML); await dbSet('menu_v22', menuLayout); await dbSet('txt_v22', txts); await dbSet('sty_v22', stys); await dbSet('img_v22', imgs);
        if(document.getElementById('global-bg').src.startsWith('data:image')) await dbSet('bg_v22', document.getElementById('global-bg').src);
        alert("✅ 은은한 골드 텍스트 스타일이 저장되었습니다.");
      } catch(e) { alert("⚠️ 저장 실패"); }
    }

    async function loadFromBrowser() {
      const lay = await dbGet('lay_v22'); if(!lay) return;
      document.getElementById('main-content').innerHTML = lay;
      const menuLay = await dbGet('menu_v22'); if(menuLay) document.getElementById('menu-list').innerHTML = menuLay;
      const txts = await dbGet('txt_v22'), stys = await dbGet('sty_v22'), imgs = await dbGet('img_v22'), bg = await dbGet('bg_v22');
      document.querySelectorAll('.text-target').forEach((t, i) => { if(txts && txts[i]) t.innerHTML = txts[i]; if(stys && stys[i]) t.setAttribute('style', stys[i]); });
      if(imgs) Object.keys(imgs).forEach(id => { const el = document.getElementById(id); if(el) { el.src = imgs[id]; el.style.opacity="1"; } });
      if(bg) { document.body.style.backgroundImage = `url(${bg})`; document.body.style.backgroundSize='cover'; document.body.style.backgroundAttachment='fixed'; document.getElementById('global-bg').src=bg; document.getElementById('global-bg').style.display='block'; }
    }
    window.onload = loadFromBrowser;
  </script>
</body>
</html>
